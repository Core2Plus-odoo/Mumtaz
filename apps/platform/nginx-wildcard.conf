# /etc/nginx/sites-available/mumtaz-wildcard
#
# Wildcard subdomain routing for Mumtaz multi-tenant platform.
#
# Handles:
#   {slug}.mumtaz.digital      → corporate tenant or SME org in Odoo
#   admin.mumtaz.digital       → platform control plane (separate vhost below)
#   api.mumtaz.digital         → Mumtaz public API (Odoo JSON-RPC)
#
# Prerequisites:
#   1. DNS: *.mumtaz.digital A record → this server's IP
#   2. Wildcard TLS cert from Let's Encrypt:
#        sudo certbot certonly --nginx \
#          -d "*.mumtaz.digital" -d "mumtaz.digital" \
#          --server https://acme-v02.api.letsencrypt.org/directory
#      (wildcard requires DNS-01 challenge; use your DNS provider plugin)
#   3. Odoo running on localhost:8069
#   4. This file installed:
#        sudo cp apps/platform/nginx-wildcard.conf \
#             /etc/nginx/sites-available/mumtaz-wildcard
#        sudo ln -sf /etc/nginx/sites-available/mumtaz-wildcard \
#             /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
#
# Odoo environment variable to set in odoo.conf:
#   dbfilter = ^mumtaz_%h$
#   (maps slug "acme" → database "mumtaz_acme")
#   proxy_mode = True
# ─────────────────────────────────────────────────────────────────────────────

# ── Shared Odoo proxy settings ────────────────────────────────────────────
# Referenced by all Odoo-proxying server blocks via include.

upstream odoo_backend {
    server 127.0.0.1:8069;
    keepalive 32;
}

upstream odoo_longpolling {
    server 127.0.0.1:8072;
}

# ── 1. admin.mumtaz.digital — Platform Control Plane ────────────────────
# The control-plane Odoo instance (mumtaz_platform DB) used by operators.
server {
    listen 80;
    listen [::]:80;
    server_name admin.mumtaz.digital;

    # Redirect to HTTPS; certbot fills this block in automatically.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.mumtaz.digital;

    ssl_certificate     /etc/letsencrypt/live/mumtaz.digital-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mumtaz.digital-0001/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options         "SAMEORIGIN"        always;
    add_header X-Content-Type-Options  "nosniff"           always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Odoo passes: force the platform database
    set $odoo_db mumtaz_platform;

    client_max_body_size 200m;
    proxy_read_timeout   720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout   720s;

    # Longpolling for bus/live-chat
    location /longpolling/ {
        proxy_pass http://odoo_longpolling;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Odoo-Dbname $odoo_db;
    }

    # Static files served by nginx directly — bypasses Python for speed
    location /web/static/ {
        alias /opt/odoo/odoo/addons/web/static/;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://odoo_backend;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Odoo-Dbname     $odoo_db;
        proxy_buffer_size   128k;
        proxy_buffers       4 256k;
        proxy_busy_buffers_size 256k;
    }
}

# ── 2. api.mumtaz.digital — Public JSON-RPC / REST API ──────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.mumtaz.digital;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.mumtaz.digital;

    ssl_certificate     /etc/letsencrypt/live/mumtaz.digital-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mumtaz.digital-0001/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;

    # CORS for mumtaz.digital and app.mumtaz.digital
    add_header Access-Control-Allow-Origin  "https://mumtaz.digital" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS"      always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    client_max_body_size 10m;
    proxy_read_timeout 60s;

    location / {
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        proxy_pass http://odoo_backend;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── 3. {slug}.mumtaz.digital — Tenant / Org Subdomains ──────────────────
#
# Pattern: acme.mumtaz.digital → database mumtaz_acme
# Odoo's dbfilter in odoo.conf handles the actual DB selection:
#   dbfilter = ^mumtaz_%h$
#   where %h = first component of the Host header (i.e. "acme")
#
# For SME orgs (multi-company in shared DB), dbfilter selects the shared
# "mumtaz_platform" DB and the subdomain is used by mumtaz_portal_routing
# to scope the res.company context.
#
server {
    listen 80;
    listen [::]:80;
    server_name ~^(?<slug>[a-z0-9-]+)\.mumtaz\.digital$;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ~^(?<slug>[a-z0-9-]+)\.mumtaz\.digital$;

    ssl_certificate     /etc/letsencrypt/live/mumtaz.digital-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mumtaz.digital-0001/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options         "SAMEORIGIN"        always;
    add_header X-Content-Type-Options  "nosniff"           always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Forward slug to Odoo so portal_routing can identify the org
    proxy_set_header X-Mumtaz-Slug $slug;

    client_max_body_size 200m;
    proxy_read_timeout   720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout   720s;

    location /longpolling/ {
        proxy_pass http://odoo_longpolling;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Mumtaz-Slug $slug;
    }

    location /web/static/ {
        # Odoo static — served directly; no slug-specific logic needed
        alias /opt/odoo/odoo/addons/web/static/;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://odoo_backend;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Mumtaz-Slug     $slug;
        proxy_buffer_size   128k;
        proxy_buffers       4 256k;
        proxy_busy_buffers_size 256k;
    }
}
