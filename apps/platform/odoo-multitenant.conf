# odoo.conf additions for Mumtaz multi-tenant wildcard subdomain routing
#
# Merge these settings into /etc/odoo/odoo.conf (or the path used on the VPS).
# They must not duplicate keys already present — check first with:
#   grep -E 'dbfilter|proxy_mode|db_name' /etc/odoo/odoo.conf
#
# ── Wildcard DB selection ─────────────────────────────────────────────────
# Maps the subdomain slug to a database name.
# Regex: "^mumtaz_" + first hostname component.
# Examples:
#   acme.mumtaz.digital     → mumtaz_acme  (corporate tenant)
#   admin.mumtaz.digital    → mumtaz_admin (handled separately by admin vhost)
#   (platform DB for SME orgs is selected by the portal_routing module
#    reading the X-Mumtaz-Slug header when the slug has no own DB)
#
dbfilter = ^mumtaz_%(db)s$

# ── Reverse proxy ─────────────────────────────────────────────────────────
# Required so Odoo trusts X-Forwarded-For / X-Forwarded-Proto from nginx.
proxy_mode = True

# ── Workers (tune to server RAM; 2 GB → 2 workers, 4 GB → 4) ────────────
workers = 2
max_cron_threads = 1

# ── Longpolling port (must match upstream odoo_longpolling in nginx) ──────
longpolling_port = 8072

# ── Logging ───────────────────────────────────────────────────────────────
logfile = /var/log/odoo/odoo.log
log_level = info
