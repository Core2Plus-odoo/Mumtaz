<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to Mumtaz — Get started</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; font-family: 'DM Sans', system-ui, sans-serif; font-size: 15px; }
    button { cursor: pointer; border: none; background: none; font: inherit; }
    a { color: inherit; text-decoration: none; }

    :root {
      --gold:   #B8862A;
      --gold2:  #D4A84C;
      --gold-bg: #FDF6E4;
      --teal:   #0B7A64;
      --ink:    #0C1118;
      --ink2:   #3D4A5C;
      --ink3:   #7A8799;
      --bg:     #F5F3EF;
      --white:  #FFFFFF;
      --border: #E4E0D8;
      --radius: 12px;
    }

    body { background: var(--bg); color: var(--ink); }

    /* ── Layout ── */
    .ob-page { min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Top bar ── */
    .ob-top {
      padding: 18px 28px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--white);
    }
    .ob-logo { display: flex; align-items: center; gap: 10px; }
    .ob-logo-mark {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Instrument Serif', serif; font-size: 1rem; color: #fff;
    }
    .ob-logo-name { font-weight: 600; font-size: 1rem; color: var(--ink); }
    .ob-step-count {
      font-family: 'DM Mono', monospace; font-size: .78rem;
      color: var(--ink3); letter-spacing: .07em; text-transform: uppercase;
    }

    /* ── Progress bar ── */
    .ob-progress {
      height: 3px; background: var(--border);
      position: relative;
    }
    .ob-progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2));
      transition: width .3s ease;
    }

    /* ── Main content area ── */
    .ob-main { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 48px 24px; }
    .ob-content { width: 100%; max-width: 760px; }

    /* ── Step header ── */
    .ob-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: .72rem; color: var(--gold);
      letter-spacing: .1em; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .ob-title {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(1.75rem, 3vw, 2.25rem);
      font-weight: 400; line-height: 1.15; color: var(--ink);
      margin-bottom: 10px; letter-spacing: -.015em;
    }
    .ob-sub {
      font-size: 1rem; color: var(--ink2);
      margin-bottom: 36px; line-height: 1.6;
    }

    /* ── Card grid (industry options) ── */
    .ob-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    @media (max-width: 720px) { .ob-grid-3 { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .ob-grid-3 { grid-template-columns: 1fr; } }

    .ob-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 16px;
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .12s;
      display: flex; flex-direction: column; gap: 6px;
      text-align: left;
      width: 100%;
    }
    .ob-card:hover { border-color: var(--ink3); transform: translateY(-1px); }
    .ob-card.selected {
      border-color: var(--gold);
      background: var(--gold-bg);
    }
    .ob-card-icon { font-size: 1.75rem; line-height: 1; margin-bottom: 4px; }
    .ob-card-name { font-size: .95rem; font-weight: 600; color: var(--ink); }
    .ob-card-desc { font-size: .8rem; color: var(--ink3); line-height: 1.4; }

    /* ── Footer / actions ── */
    .ob-actions {
      padding: 18px 28px;
      border-top: 1px solid var(--border);
      background: var(--white);
      display: flex; align-items: center; justify-content: space-between;
    }
    .ob-actions-left { display: flex; align-items: center; gap: 14px; }
    .ob-back {
      font-size: .9rem; color: var(--ink3);
      padding: 9px 16px; border-radius: var(--radius);
      transition: color .15s, background .15s;
    }
    .ob-back:hover { color: var(--ink); background: var(--bg); }
    .ob-back:disabled { opacity: .35; cursor: not-allowed; }
    .ob-skip {
      font-size: .85rem; color: var(--ink3);
      transition: color .15s;
    }
    .ob-skip:hover { color: var(--ink2); text-decoration: underline; }
    .ob-next {
      background: var(--gold); color: #fff;
      font-size: .9rem; font-weight: 600;
      padding: 10px 24px; border-radius: var(--radius);
      transition: opacity .15s;
    }
    .ob-next:hover { opacity: .88; }
    .ob-next:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Steps ── */
    .step { display: none; }
    .step.active { display: block; animation: fadeIn .25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="ob-page">

    <!-- Top bar -->
    <div class="ob-top">
      <div class="ob-logo">
        <div class="ob-logo-mark">م</div>
        <span class="ob-logo-name">Mumtaz</span>
      </div>
      <div class="ob-step-count">Step <span id="step-current">1</span> of <span id="step-total">6</span></div>
    </div>

    <!-- Progress -->
    <div class="ob-progress">
      <div class="ob-progress-fill" id="progress-fill" style="width:16.66%"></div>
    </div>

    <!-- Main -->
    <div class="ob-main">
      <div class="ob-content">

        <!-- ── Step 1: Industry ── -->
        <div class="step active" data-step="1">
          <div class="ob-eyebrow">About your business</div>
          <h1 class="ob-title">What kind of business do you run?</h1>
          <p class="ob-sub">We'll tailor your modules and AI agents based on your industry.</p>

          <div class="ob-grid-3" id="industry-grid">
            <button class="ob-card" data-value="trading">
              <div class="ob-card-icon">📦</div>
              <div class="ob-card-name">Trading &amp; Distribution</div>
              <div class="ob-card-desc">Wholesale, import/export, distribution</div>
            </button>
            <button class="ob-card" data-value="retail">
              <div class="ob-card-icon">🛍️</div>
              <div class="ob-card-name">Retail</div>
              <div class="ob-card-desc">Stores, e-commerce, multi-branch</div>
            </button>
            <button class="ob-card" data-value="services">
              <div class="ob-card-icon">💼</div>
              <div class="ob-card-name">Professional Services</div>
              <div class="ob-card-desc">Consulting, agencies, freelancers</div>
            </button>
            <button class="ob-card" data-value="construction">
              <div class="ob-card-icon">🏗️</div>
              <div class="ob-card-name">Construction</div>
              <div class="ob-card-desc">Contracting, project-based work</div>
            </button>
            <button class="ob-card" data-value="manufacturing">
              <div class="ob-card-icon">🏭</div>
              <div class="ob-card-name">Manufacturing</div>
              <div class="ob-card-desc">Production, assembly, BOM tracking</div>
            </button>
            <button class="ob-card" data-value="realestate">
              <div class="ob-card-icon">🏢</div>
              <div class="ob-card-name">Real Estate</div>
              <div class="ob-card-desc">Property mgmt, leasing, brokerage</div>
            </button>
            <button class="ob-card" data-value="hospitality">
              <div class="ob-card-icon">🍽️</div>
              <div class="ob-card-name">Hospitality &amp; F&amp;B</div>
              <div class="ob-card-desc">Hotels, restaurants, cafes</div>
            </button>
            <button class="ob-card" data-value="finance">
              <div class="ob-card-icon">🏦</div>
              <div class="ob-card-name">Finance</div>
              <div class="ob-card-desc">Banking, lending, investment</div>
            </button>
            <button class="ob-card" data-value="other">
              <div class="ob-card-icon">✨</div>
              <div class="ob-card-name">Other</div>
              <div class="ob-card-desc">Tell us more later</div>
            </button>
          </div>
        </div>

        <!-- Step 2-6 added in next patches -->

      </div>
    </div>

    <!-- Actions -->
    <div class="ob-actions">
      <div class="ob-actions-left">
        <button class="ob-back" id="btn-back" disabled>← Back</button>
        <button class="ob-skip" id="btn-skip">Skip setup</button>
      </div>
      <button class="ob-next" id="btn-next" disabled>Continue →</button>
    </div>

  </div>

  <script>
    /* ── State ── */
    const state = {
      currentStep: 1,
      totalSteps: 6,
      industry: null,
      products: [],
      agents: [],
      modules: [],
      teamSize: null,
    };

    const $ = id => document.getElementById(id);

    /* ── Step 1: Industry selection ── */
    document.querySelectorAll('#industry-grid .ob-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('#industry-grid .ob-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        state.industry = card.dataset.value;
        $('btn-next').disabled = false;
      });
    });

    /* ── Navigation ── */
    function updateProgress() {
      $('step-current').textContent = state.currentStep;
      $('progress-fill').style.width = (state.currentStep / state.totalSteps * 100) + '%';
      $('btn-back').disabled = state.currentStep === 1;
    }

    function gotoStep(n) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      const next = document.querySelector(`.step[data-step="${n}"]`);
      if (next) {
        next.classList.add('active');
        state.currentStep = n;
        updateProgress();
        validateStep();
      }
    }

    function validateStep() {
      const s = state.currentStep;
      let ok = false;
      if (s === 1) ok = !!state.industry;
      // steps 2-6 added in next patches
      $('btn-next').disabled = !ok;
    }

    $('btn-next').addEventListener('click', () => {
      if (state.currentStep < state.totalSteps) gotoStep(state.currentStep + 1);
    });
    $('btn-back').addEventListener('click', () => {
      if (state.currentStep > 1) gotoStep(state.currentStep - 1);
    });
    $('btn-skip').addEventListener('click', () => {
      if (confirm('Skip setup? You can configure these later from Settings.')) {
        window.location.href = '/dashboard.html';
      }
    });
  </script>

</body>
</html>
