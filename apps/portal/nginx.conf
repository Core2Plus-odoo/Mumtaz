# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name app.mumtaz.digital;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name app.mumtaz.digital;

    ssl_certificate     /etc/letsencrypt/live/app.mumtaz.digital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.mumtaz.digital/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/app.mumtaz.digital;
    index index.html;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;

    # Cache static assets
    location ~* \.(css|js|svg|png|jpg|jpeg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Auth API → zaki-server (port 8001)
    location /api/auth/ {
        proxy_pass         http://127.0.0.1:8001/api/v1/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
        proxy_read_timeout 30s;
        proxy_hide_header  X-Powered-By;
    }

    location /api/onboarding {
        proxy_pass         http://127.0.0.1:8001/api/v1/onboarding;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
        proxy_read_timeout 30s;
        proxy_hide_header  X-Powered-By;
    }

    location /api/dashboard {
        proxy_pass         http://127.0.0.1:8001/api/v1/dashboard;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
        proxy_read_timeout 30s;
        proxy_hide_header  X-Powered-By;
    }

    location = /api/plans {
        proxy_pass         http://127.0.0.1:8001/api/v1/plans;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_hide_header  X-Powered-By;
    }

    location = /api/plan {
        proxy_pass         http://127.0.0.1:8001/api/v1/plan;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
        proxy_read_timeout 30s;
        proxy_hide_header  X-Powered-By;
    }

    location /api/admin/ {
        proxy_pass         http://127.0.0.1:8001/api/v1/admin/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
        proxy_read_timeout 30s;
        proxy_hide_header  X-Powered-By;
    }

    location /api/partner/ {
        proxy_pass         http://127.0.0.1:8001/api/v1/partner/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
        proxy_read_timeout 30s;
        proxy_hide_header  X-Powered-By;
    }

    location /api/billing/ {
        proxy_pass         http://127.0.0.1:8001/api/v1/billing/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
        proxy_read_timeout 30s;
        proxy_hide_header  X-Powered-By;
    }

    location /api/zatca/ {
        proxy_pass         http://127.0.0.1:8001/api/v1/zatca/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
        proxy_read_timeout 30s;
        proxy_hide_header  X-Powered-By;
    }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
}
