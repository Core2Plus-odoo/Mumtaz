# /etc/nginx/sites-available/app.mumtaz.digital
#
# Mumtaz hub: login, signup, onboarding, dashboard.
# Static files + reverse proxy to zaki-server (FastAPI on localhost:8001)
# for /api/auth/* and /api/onboarding.
#
# This file starts as HTTP-only.  Run:
#     sudo certbot --nginx -d app.mumtaz.digital
# and certbot will automatically rewrite this file to add the SSL block
# and HTTP→HTTPS redirect.
#
# Install:
#   sudo cp apps/portal/nginx.conf /etc/nginx/sites-available/app.mumtaz.digital
#   sudo ln -sf /etc/nginx/sites-available/app.mumtaz.digital /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d app.mumtaz.digital

server {
    listen 80;
    listen [::]:80;
    server_name app.mumtaz.digital;

    root /var/www/app.mumtaz.digital;
    index index.html;

    # Security headers
    add_header X-Frame-Options         "SAMEORIGIN"        always;
    add_header X-Content-Type-Options  "nosniff"           always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Cache static assets aggressively
    location ~* \.(css|js|svg|png|jpg|jpeg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Auth API → zaki-server (FastAPI on localhost:8001)
    location /api/auth/ {
        proxy_pass http://127.0.0.1:8001/api/v1/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_read_timeout 30s;
    }

    # Onboarding API → zaki-server
    location /api/onboarding {
        proxy_pass http://127.0.0.1:8001/api/v1/onboarding;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_read_timeout 30s;
    }

    # Dashboard live KPIs (Odoo-backed) → zaki-server
    location /api/dashboard {
        proxy_pass http://127.0.0.1:8001/api/v1/dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_read_timeout 30s;
    }

    # Static SPA — fall back to index.html for unknown routes
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
}
