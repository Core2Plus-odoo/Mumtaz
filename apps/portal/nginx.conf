# /etc/nginx/sites-available/app.mumtaz.digital
#
# Serves the Mumtaz hub (login, signup, onboarding, dashboard) at
# https://app.mumtaz.digital. Proxies /api/auth/* and /api/onboarding
# to the zaki-server FastAPI backend on localhost:8001.
#
# Steps to install:
#   1. sudo cp apps/portal/nginx.conf /etc/nginx/sites-available/app.mumtaz.digital
#   2. sudo ln -sf /etc/nginx/sites-available/app.mumtaz.digital /etc/nginx/sites-enabled/
#   3. sudo certbot --nginx -d app.mumtaz.digital   (issues SSL cert)
#   4. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name app.mumtaz.digital;

    # Redirect HTTP to HTTPS (certbot will manage these lines)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.mumtaz.digital;

    # SSL — managed by certbot
    # ssl_certificate     /etc/letsencrypt/live/app.mumtaz.digital/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/app.mumtaz.digital/privkey.pem;

    root /var/www/app.mumtaz.digital;
    index index.html;

    # Security headers
    add_header X-Frame-Options         "SAMEORIGIN"        always;
    add_header X-Content-Type-Options  "nosniff"           always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Cache static assets aggressively
    location ~* \.(css|js|svg|png|jpg|jpeg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Auth + onboarding API → zaki-server (FastAPI on localhost:8001)
    location /api/auth/ {
        proxy_pass http://127.0.0.1:8001/api/v1/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_read_timeout 30s;
    }

    location /api/onboarding {
        proxy_pass http://127.0.0.1:8001/api/v1/onboarding;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_read_timeout 30s;
    }

    # Static SPA — fall back to index.html for unknown routes
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Disable access logs for the favicon
    location = /favicon.ico { access_log off; log_not_found off; }
}
