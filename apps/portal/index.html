<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mumtaz — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'DM Sans', system-ui, sans-serif; font-size: 15px; }
    button { cursor: pointer; border: none; background: none; font: inherit; }
    input { font: inherit; }
    a { color: inherit; text-decoration: none; }

    :root {
      --gold:   #B8862A;
      --gold2:  #D4A84C;
      --teal:   #0B7A64;
      --ink:    #0C1118;
      --ink2:   #3D4A5C;
      --ink3:   #7A8799;
      --bg:     #F5F3EF;
      --white:  #FFFFFF;
      --border: #E4E0D8;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 36px 36px 28px;
      width: 100%; max-width: 420px;
      box-shadow: 0 4px 32px rgba(0,0,0,.06);
    }

    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .logo-mark {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Instrument Serif', serif; font-size: 1.1rem; color: #fff;
    }
    .logo-name { font-weight: 600; font-size: 1.1rem; color: var(--ink); }

    .tabs {
      display: flex; gap: 4px; margin-bottom: 24px;
      background: var(--bg); padding: 4px; border-radius: 10px;
    }
    .tab {
      flex: 1; padding: 9px;
      border-radius: 8px;
      font-size: .875rem; font-weight: 500; color: var(--ink3);
      transition: background .15s, color .15s;
    }
    .tab.active { background: var(--white); color: var(--ink); box-shadow: 0 1px 3px rgba(0,0,0,.06); }

    .title {
      font-family: 'Instrument Serif', serif;
      font-size: 1.5rem; font-weight: 400; color: var(--ink);
      margin-bottom: 4px;
    }
    .subtitle { font-size: .85rem; color: var(--ink3); margin-bottom: 24px; }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label { font-size: .78rem; font-weight: 600; color: var(--ink2); letter-spacing: .03em; }
    .field input {
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: .9375rem; color: var(--ink);
      background: var(--white);
      transition: border-color .15s; outline: none;
    }
    .field input:focus { border-color: var(--gold); }

    .error {
      font-size: .82rem; color: #C0402A;
      background: #FCECEA;
      border: 1px solid rgba(192,64,42,.2);
      border-radius: var(--radius);
      padding: 9px 12px;
      margin-bottom: 14px;
    }
    .success {
      font-size: .82rem; color: #0B7A64;
      background: #E6F4F1;
      border: 1px solid rgba(11,122,100,.2);
      border-radius: var(--radius);
      padding: 9px 12px;
      margin-bottom: 14px;
    }

    .btn-submit {
      width: 100%;
      background: var(--gold); color: #fff;
      font-weight: 600; font-size: .9375rem;
      padding: 11px;
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .15s;
      margin-top: 6px;
    }
    .btn-submit:hover { opacity: .88; }
    .btn-submit:disabled { opacity: .55; cursor: not-allowed; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      margin-top: 22px; padding-top: 20px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: .78rem; color: var(--ink3);
    }
    .footer a { color: var(--gold); font-weight: 500; }

    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>

  <div class="card">

    <div class="logo">
      <div class="logo-mark">م</div>
      <span class="logo-name">Mumtaz</span>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="signin">Sign in</button>
      <button class="tab" data-tab="signup">Create account</button>
    </div>

    <!-- Sign in panel -->
    <div class="panel active" id="panel-signin">
      <h1 class="title">Welcome back</h1>
      <p class="subtitle">Sign in to your Mumtaz account</p>

      <form id="form-signin" autocomplete="on">
        <div class="field">
          <label for="si-email">Email</label>
          <input id="si-email" type="email" placeholder="you@company.com" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="si-password">Password</label>
          <input id="si-password" type="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <div class="error" id="si-error" hidden></div>
        <button class="btn-submit" id="si-btn" type="submit">
          <span id="si-label">Sign in →</span>
          <span id="si-spinner" class="spinner" hidden></span>
        </button>
      </form>
    </div>

    <!-- Sign up panel -->
    <div class="panel" id="panel-signup">
      <h1 class="title">Create your account</h1>
      <p class="subtitle">14-day free trial · no credit card required</p>

      <form id="form-signup" autocomplete="on">
        <div class="field">
          <label for="su-name">Your name</label>
          <input id="su-name" type="text" placeholder="Ahmed Al Mansoori" autocomplete="name" required />
        </div>
        <div class="field">
          <label for="su-company">Company</label>
          <input id="su-company" type="text" placeholder="Your company" autocomplete="organization" />
        </div>
        <div class="field">
          <label for="su-email">Work email</label>
          <input id="su-email" type="email" placeholder="you@company.com" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="su-password">Password</label>
          <input id="su-password" type="password" placeholder="At least 8 characters" autocomplete="new-password" minlength="8" required />
        </div>
        <div class="error"   id="su-error"   hidden></div>
        <div class="success" id="su-success" hidden></div>
        <button class="btn-submit" id="su-btn" type="submit">
          <span id="su-label">Create account →</span>
          <span id="su-spinner" class="spinner" hidden></span>
        </button>
      </form>
    </div>

    <p class="footer">
      By continuing you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy</a>.
    </p>

  </div>

  <script>
    // If already signed in, go straight to dashboard
    (async function checkExistingAuth() {
      const token = localStorage.getItem('mumtaz_token');
      if (!token) return;
      try {
        const r = await fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } });
        if (r.ok) window.location.href = '/dashboard.html';
      } catch {}
    })();

    document.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        document.getElementById('panel-' + t.dataset.tab).classList.add('active');
      });
    });

    function $(id) { return document.getElementById(id); }
    function setSubmitting(prefix, on) {
      $(prefix + '-btn').disabled    = on;
      $(prefix + '-label').hidden    = on;
      $(prefix + '-spinner').hidden  = !on;
    }

    $('form-signin').addEventListener('submit', async e => {
      e.preventDefault();
      $('si-error').hidden = true;
      setSubmitting('si', true);
      try {
        const r = await fetch('/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            email:    $('si-email').value.trim(),
            password: $('si-password').value,
          }),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.detail || data.error || 'Sign in failed');
        localStorage.setItem('mumtaz_token', data.access_token);
        window.location.href = '/dashboard.html';
      } catch (err) {
        $('si-error').textContent = err.message;
        $('si-error').hidden = false;
      } finally {
        setSubmitting('si', false);
      }
    });

    $('form-signup').addEventListener('submit', async e => {
      e.preventDefault();
      $('su-error').hidden   = true;
      $('su-success').hidden = true;
      setSubmitting('su', true);
      try {
        const r = await fetch('/api/auth/signup', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            name:     $('su-name').value.trim(),
            company:  $('su-company').value.trim(),
            email:    $('su-email').value.trim(),
            password: $('su-password').value,
          }),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.detail || data.error || 'Sign up failed');
        localStorage.setItem('mumtaz_token', data.access_token);
        $('su-success').textContent = 'Account created. Setting up your workspace…';
        $('su-success').hidden = false;
        setTimeout(() => { window.location.href = '/onboarding.html'; }, 800);
      } catch (err) {
        $('su-error').textContent = err.message;
        $('su-error').hidden = false;
      } finally {
        setSubmitting('su', false);
      }
    });
  </script>

</body>
</html>
