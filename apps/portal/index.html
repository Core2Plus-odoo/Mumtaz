<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mumtaz — Platform Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Tokens ── */
:root{
  --bg:#f8fafc;--bg-1:#f1f5f9;--surface:#fff;--card:#fff;
  --text:#0f172a;--text-2:#475569;--text-3:#94a3b8;
  --border:#e2e8f0;--border-2:#cbd5e1;
  --blue:#3b82f6;--indigo:#6366f1;--purple:#8b5cf6;
  --green:#10b981;--red:#ef4444;--amber:#f59e0b;--teal:#14b8a6;
  --grad:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);
  --font:'Inter',system-ui,sans-serif;
  --shadow:0 1px 4px rgba(15,23,42,.08),0 4px 16px rgba(15,23,42,.06);
  --shadow-lg:0 8px 32px rgba(15,23,42,.12);
  --tr:.15s ease;--r:10px;
}
body.dark{
  --bg:#07101e;--bg-1:#0b1829;--surface:#111e33;--card:#162338;
  --text:#f0f6ff;--text-2:#94a3b8;--text-3:#64748b;
  --border:rgba(255,255,255,.07);--border-2:rgba(255,255,255,.13);
  --shadow:0 4px 24px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;transition:background var(--tr),color var(--tr)}
a{color:inherit;text-decoration:none}
button{font-family:var(--font);cursor:pointer;border:none;outline:none;transition:all var(--tr)}
input,select,textarea{font-family:var(--font);outline:none}

/* ── Auth ── */
#auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.auth-wrap{width:100%;max-width:420px}
.auth-brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center}
.auth-mark{width:40px;height:40px;background:var(--grad);border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1.1rem}
.auth-name{font-size:1.1rem;font-weight:700}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px;box-shadow:var(--shadow-lg)}
.auth-heading{font-size:1.3rem;font-weight:700;margin-bottom:4px}
.auth-sub{font-size:.83rem;color:var(--text-2);margin-bottom:24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.75rem;font-weight:600;color:var(--text-2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select{width:100%;padding:10px 13px;background:var(--bg-1);border:1px solid var(--border-2);border-radius:8px;font-size:.88rem;color:var(--text);transition:border var(--tr)}
.field input:focus,.field select:focus{border-color:var(--indigo);background:var(--surface)}
.btn-primary{width:100%;padding:11px;background:var(--grad);color:#fff;border-radius:8px;font-size:.9rem;font-weight:600}
.btn-primary:hover{opacity:.88}
.auth-footer{text-align:center;font-size:.82rem;color:var(--text-3);margin-top:16px}
.auth-footer a{color:var(--indigo);font-weight:500;cursor:pointer}
.auth-err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:9px 13px;font-size:.82rem;color:var(--red);margin-bottom:14px;display:none}
.auth-divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--text-3);font-size:.78rem}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── App shell (hidden until login) ── */
#app{display:none;min-height:100vh}
</style>
</head>
<body>

<!-- ══ AUTH ══ -->
<div id="auth">
  <div class="auth-wrap">
    <div class="auth-brand">
      <div class="auth-mark">M</div>
      <span class="auth-name">Mumtaz Platform</span>
    </div>
    <div class="auth-card">
      <!-- Login -->
      <div id="view-login">
        <div class="auth-heading">Welcome back</div>
        <div class="auth-sub">Sign in to manage your Mumtaz subscription</div>
        <div id="login-err" class="auth-err"></div>
        <div class="field"><label>Email</label><input id="l-email" type="email" placeholder="you@company.com"></div>
        <div class="field"><label>Password</label><input id="l-pass" type="password" placeholder="••••••••"></div>
        <button class="btn-primary" onclick="doLogin()">Sign In →</button>
        <div class="auth-footer">No account? <a onclick="showView('signup')">Create one free</a> &nbsp;·&nbsp; <a onclick="showView('forgot')">Forgot password?</a></div>
      </div>
      <!-- Signup -->
      <div id="view-signup" style="display:none">
        <div class="auth-heading">Create your account</div>
        <div class="auth-sub">Start your 14-day free trial — no card required</div>
        <div id="signup-err" class="auth-err"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="field"><label>First Name</label><input id="s-fname" placeholder="Umer"></div>
          <div class="field"><label>Last Name</label><input id="s-lname" placeholder="Sheikh"></div>
        </div>
        <div class="field"><label>Work Email</label><input id="s-email" type="email" placeholder="you@company.com"></div>
        <div class="field"><label>Company Name</label><input id="s-company" placeholder="Acme LLC"></div>
        <div class="field"><label>Password</label><input id="s-pass" type="password" placeholder="Min 8 characters"></div>
        <button class="btn-primary" onclick="doSignup()">Create Account →</button>
        <div class="auth-footer">Already have an account? <a onclick="showView('login')">Sign in</a></div>
      </div>
      <!-- Forgot -->
      <div id="view-forgot" style="display:none">
        <div class="auth-heading">Reset password</div>
        <div class="auth-sub">We'll send a reset link to your email</div>
        <div class="field"><label>Work Email</label><input id="f-email" type="email" placeholder="you@company.com"></div>
        <button class="btn-primary" onclick="doForgot()">Send Reset Link</button>
        <div class="auth-footer"><a onclick="showView('login')">← Back to sign in</a></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ APP (injected by JS) ══ -->
<div id="app"></div>

<script>
// ── State ──────────────────────────────────────────────
const STORE_KEY = 'mumtaz_portal_v2'
let P = {
  user: { name:'', email:'', company:'', role:'Admin', avatar:'' },
  plan: 'growth',
  seats: 10, seatsUsed: 7,
  modules: {},
  theme: 'light'
}

function save(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(P)) }catch(e){} }
function load(){
  try{
    const d = localStorage.getItem(STORE_KEY)
    if(d) Object.assign(P, JSON.parse(d))
  }catch(e){}
}

// ── Auth helpers ───────────────────────────────────────
function showView(v){
  ['login','signup','forgot'].forEach(x => document.getElementById('view-'+x).style.display = x===v?'':'none')
}

function doLogin(){
  const email = document.getElementById('l-email').value.trim()
  const pass  = document.getElementById('l-pass').value
  const err   = document.getElementById('login-err')
  err.style.display = 'none'
  if(!email || !pass){ err.textContent='Enter email and password.'; err.style.display='block'; return }
  // MVP: accept any email+pass, store user
  P.user.email   = email
  P.user.name    = email.split('@')[0].replace(/\./g,' ').replace(/\b\w/g,c=>c.toUpperCase())
  P.user.company = P.user.company || 'My Company'
  save()
  bootApp()
}

function doSignup(){
  const fname   = document.getElementById('s-fname').value.trim()
  const lname   = document.getElementById('s-lname').value.trim()
  const email   = document.getElementById('s-email').value.trim()
  const company = document.getElementById('s-company').value.trim()
  const pass    = document.getElementById('s-pass').value
  const err     = document.getElementById('signup-err')
  err.style.display = 'none'
  if(!fname||!email||!company||!pass){ err.textContent='Fill all fields.'; err.style.display='block'; return }
  if(pass.length < 8){ err.textContent='Password must be at least 8 characters.'; err.style.display='block'; return }
  P.user = { name: fname+' '+lname, email, company, role:'Admin', avatar:'' }
  save()
  bootApp()
}

function doForgot(){
  const email = document.getElementById('f-email').value.trim()
  if(!email){ return }
  alert('Reset link sent to '+email+'\n(Demo mode — no email actually sent)')
  showView('login')
}

function doLogout(){
  P.user.email = ''
  save()
  document.getElementById('app').style.display = 'none'
  document.getElementById('auth').style.display = 'flex'
  showView('login')
}

// ── Boot ───────────────────────────────────────────────
load()
if(P.user.email){
  bootApp()
} else {
  document.getElementById('auth').style.display = 'flex'
}
</script>
</body>
</html>
