<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mumtaz — Your Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; font-family: 'DM Sans', system-ui, sans-serif; font-size: 15px; }
    button { cursor: pointer; border: none; background: none; font: inherit; }
    a { color: inherit; text-decoration: none; }

    :root {
      --gold:   #B8862A;
      --gold2:  #D4A84C;
      --gold-bg: #FDF6E4;
      --teal:   #0B7A64;
      --ink:    #0C1118;
      --ink2:   #3D4A5C;
      --ink3:   #7A8799;
      --bg:     #F5F3EF;
      --white:  #FFFFFF;
      --border: #E4E0D8;
      --radius: 12px;
    }

    body { background: var(--bg); color: var(--ink); }

    /* ── Top bar ── */
    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .tb-left { display: flex; align-items: center; gap: 24px; }
    .tb-logo { display: flex; align-items: center; gap: 10px; }
    .tb-logo-mark {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Instrument Serif', serif; font-size: 1rem; color: #fff;
    }
    .tb-logo-name { font-weight: 600; font-size: 1rem; color: var(--ink); }

    /* Role selector */
    .role-select {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 100px;
      font-size: .85rem; font-weight: 500; color: var(--ink2);
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .role-select:hover { border-color: var(--ink3); }
    .role-select-label {
      font-family: 'DM Mono', monospace; font-size: .68rem;
      color: var(--ink3); letter-spacing: .07em; text-transform: uppercase;
    }
    .role-select select {
      border: none; background: transparent; outline: none;
      font: inherit; font-weight: 600; color: var(--ink);
      cursor: pointer; padding-right: 4px;
    }

    .tb-right { display: flex; align-items: center; gap: 14px; }
    .tb-user {
      display: flex; align-items: center; gap: 10px;
      padding: 5px 12px 5px 5px;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 100px; cursor: pointer;
      transition: border-color .15s;
    }
    .tb-user:hover { border-color: var(--ink3); }
    .tb-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #fff; font-weight: 600; font-size: .8rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .tb-user-name { font-size: .85rem; font-weight: 500; color: var(--ink); }
    .tb-signout {
      font-size: .8rem; color: var(--ink3);
      padding: 6px 12px; border-radius: 8px;
      transition: color .15s, background .15s;
    }
    .tb-signout:hover { color: var(--ink); background: var(--bg); }

    /* ── Main ── */
    .main { max-width: 1100px; margin: 0 auto; padding: 40px 28px 60px; }

    .hello { margin-bottom: 36px; }
    .hello-greeting {
      font-family: 'DM Mono', monospace; font-size: .78rem;
      color: var(--ink3); letter-spacing: .08em; text-transform: uppercase;
      margin-bottom: 8px;
    }
    .hello-title {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(1.75rem, 3vw, 2.25rem);
      font-weight: 400; line-height: 1.15;
      letter-spacing: -.015em; color: var(--ink);
    }
    .hello-title em { font-style: italic; color: var(--gold); }

    /* ── Section header ── */
    .sec-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; margin-top: 32px;
    }
    .sec-label {
      font-family: 'DM Mono', monospace; font-size: .72rem;
      color: var(--ink3); letter-spacing: .1em; text-transform: uppercase;
    }
    .sec-link {
      font-size: .82rem; color: var(--gold); font-weight: 500;
      transition: opacity .15s;
    }
    .sec-link:hover { opacity: .75; }

    /* ── Product cards ── */
    .products-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    }
    @media (max-width: 860px) { .products-grid { grid-template-columns: 1fr; } }

    .product-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      display: flex; flex-direction: column;
      transition: border-color .15s, transform .12s;
    }
    .product-card:hover { border-color: var(--gold); transform: translateY(-2px); }
    .pc-icon {
      width: 44px; height: 44px;
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      margin-bottom: 16px;
    }
    .pc-icon.gold { background: var(--gold-bg); color: var(--gold); }
    .pc-icon.teal { background: rgba(11,122,100,.1); color: var(--teal); }
    .pc-icon.blue { background: #EEF2FF; color: #4F46E5; }
    .pc-name {
      font-size: 1.05rem; font-weight: 600; color: var(--ink);
      margin-bottom: 6px;
    }
    .pc-desc {
      font-size: .875rem; color: var(--ink2);
      line-height: 1.55; margin-bottom: 18px; flex: 1;
    }
    .pc-launch {
      align-self: flex-start;
      background: var(--gold); color: #fff;
      font-size: .85rem; font-weight: 600;
      padding: 8px 18px; border-radius: 100px;
      transition: opacity .15s;
    }
    .pc-launch:hover { opacity: .88; }
    .pc-card-disabled {
      opacity: .55;
    }
    .pc-card-disabled .pc-launch {
      background: var(--bg); color: var(--ink3);
      border: 1.5px solid var(--border);
    }

    /* ── Empty state when no onboarding ── */
    .empty-onboard {
      background: var(--white);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
    }
    .empty-onboard h3 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.25rem; font-weight: 400; color: var(--ink);
      margin-bottom: 6px;
    }
    .empty-onboard p { font-size: .9rem; color: var(--ink3); margin-bottom: 18px; }
    .empty-onboard a {
      display: inline-block;
      background: var(--gold); color: #fff;
      font-size: .875rem; font-weight: 600;
      padding: 9px 20px; border-radius: 100px;
    }

    /* ── Role-specific KPI cards ── */
    .kpi-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
      margin-bottom: 28px;
    }
    @media (max-width: 860px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }

    .kpi-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      position: relative; overflow: hidden;
      transition: border-color .15s;
    }
    .kpi-card:hover { border-color: rgba(184,134,42,.4); }
    .kpi-card::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px; background: var(--accent, var(--gold));
      opacity: .55;
    }
    .kpi-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; margin-bottom: 12px;
      background: var(--gold-bg); color: var(--gold);
    }
    .kpi-label {
      font-family: 'DM Mono', monospace;
      font-size: .68rem; color: var(--ink3);
      letter-spacing: .07em; text-transform: uppercase;
      margin-bottom: 6px;
    }
    .kpi-val {
      font-size: 1.5rem; font-weight: 700;
      color: var(--ink); letter-spacing: -.025em;
      margin-bottom: 4px; line-height: 1.1;
    }
    .kpi-sub {
      font-size: .78rem; color: var(--ink3);
    }
    .kpi-trend-up   { color: var(--teal); }
    .kpi-trend-down { color: #C0402A; }
    .kpi-trend-warn { color: #B45309; }

    .live-pill {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: .62rem; letter-spacing: .07em; text-transform: uppercase;
      padding: 2px 7px; border-radius: 100px;
      background: rgba(11,122,100,.12); color: var(--teal);
      margin-left: 8px; vertical-align: middle;
    }
    .live-pill::before {
      content: '●'; margin-right: 4px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: .35; }
    }

    /* Role hint banner */
    .role-hint {
      background: var(--white);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .82rem; color: var(--ink2);
      margin-bottom: 18px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
    }
    .role-hint strong { color: var(--ink); }

    #role-content { margin-top: 8px; }

    /* ── Role-specific widgets ── */
    .widgets-grid {
      display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px;
      margin-top: 8px;
    }
    @media (max-width: 860px) { .widgets-grid { grid-template-columns: 1fr; } }

    .widget {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
    }
    .widget-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 16px;
    }
    .widget-title {
      font-size: 1rem; font-weight: 600; color: var(--ink);
    }
    .widget-meta {
      font-family: 'DM Mono', monospace; font-size: .68rem;
      color: var(--ink3); letter-spacing: .07em; text-transform: uppercase;
    }

    /* Bar chart (SVG) */
    .bar-chart { width: 100%; height: 180px; display: block; }
    .bar-chart .bar { transition: opacity .15s; }
    .bar-chart .bar:hover { opacity: .8; }
    .bar-chart .axis-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px; fill: var(--ink3); letter-spacing: .05em;
    }
    .bar-legend {
      display: flex; gap: 16px; margin-top: 10px;
      font-size: .78rem; color: var(--ink2);
    }
    .bar-legend-dot {
      display: inline-block; width: 10px; height: 10px;
      border-radius: 2px; margin-right: 6px; vertical-align: middle;
    }

    /* List rows */
    .list-rows { display: flex; flex-direction: column; }
    .list-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .list-row:last-child { border-bottom: none; }
    .list-row-main {
      flex: 1; min-width: 0;
    }
    .list-row-name {
      font-size: .9rem; font-weight: 500; color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .list-row-sub {
      font-size: .78rem; color: var(--ink3); margin-top: 2px;
    }
    .list-row-val {
      font-size: .9rem; font-weight: 600; color: var(--ink);
      flex-shrink: 0; text-align: right;
    }
    .list-row-val small {
      display: block; font-size: .7rem; font-weight: 400;
      color: var(--ink3); margin-top: 2px;
    }
    .pill {
      display: inline-block; padding: 2px 9px;
      font-size: .7rem; font-weight: 600;
      border-radius: 100px;
      background: var(--gold-bg); color: var(--gold);
    }
    .pill.teal  { background: rgba(11,122,100,.12);  color: var(--teal); }
    .pill.warn  { background: #FEF3C7;               color: #92400E; }
    .pill.red   { background: #FEE2E2;               color: #991B1B; }
    .pill.gray  { background: var(--bg);             color: var(--ink3); }

    /* Progress bar */
    .progress-row { padding: 10px 0; border-bottom: 1px solid var(--border); }
    .progress-row:last-child { border-bottom: none; }
    .progress-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 6px;
    }
    .progress-name { font-size: .85rem; font-weight: 500; color: var(--ink); }
    .progress-val  { font-size: .8rem; color: var(--ink3); }
    .progress-bar {
      height: 6px; background: var(--bg); border-radius: 100px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2));
      border-radius: 100px;
    }
    .progress-bar-fill.teal { background: var(--teal); }
    .progress-bar-fill.red  { background: linear-gradient(90deg, #DC2626, #F87171); }

    /* Funnel (vertical) */
    .funnel { display: flex; flex-direction: column; gap: 8px; }
    .funnel-stage {
      display: flex; align-items: center; gap: 12px;
    }
    .funnel-bar {
      height: 32px; border-radius: 6px;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
      display: flex; align-items: center; padding: 0 12px;
      color: #fff; font-weight: 600; font-size: .82rem;
      min-width: 60px;
    }
    .funnel-name {
      font-size: .82rem; color: var(--ink2); width: 88px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <header class="topbar">
    <div class="tb-left">
      <div class="tb-logo">
        <div class="tb-logo-mark">م</div>
        <span class="tb-logo-name">Mumtaz</span>
      </div>
      <div class="role-select">
        <span class="role-select-label">View as</span>
        <select id="role-selector">
          <option value="overview">Overview</option>
          <option value="ceo">CEO</option>
          <option value="cfo">CFO</option>
          <option value="coo">COO / Ops</option>
          <option value="cmo">CMO / Marketing</option>
          <option value="sales">Sales</option>
          <option value="hr">HR</option>
        </select>
      </div>
    </div>
    <div class="tb-right">
      <a href="/admin.html" class="tb-signout" id="admin-link" style="display:none;color:var(--gold);font-weight:600">Admin</a>
      <a href="/billing.html" class="tb-signout">Plan & Billing</a>
      <div class="tb-user">
        <div class="tb-avatar" id="user-avatar">U</div>
        <span class="tb-user-name" id="user-name">User</span>
      </div>
      <button class="tb-signout" id="signout-btn">Sign out</button>
    </div>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- Greeting -->
    <div class="hello">
      <div class="hello-greeting" id="greeting">Good morning</div>
      <h1 class="hello-title">Welcome back, <em id="first-name">there</em>.</h1>
    </div>

    <!-- Products -->
    <div class="sec-head">
      <span class="sec-label">Your products</span>
      <a href="/onboarding.html" class="sec-link">+ Add a product</a>
    </div>
    <div id="products-area">
      <!-- populated by JS -->
    </div>

    <!-- Role-specific content placeholder (filled in patch 2) -->
    <div id="role-content"></div>

  </main>

  <script>
    const $ = id => document.getElementById(id);

    /* ── Auth check ── */
    (async function () {
      const token = localStorage.getItem('mumtaz_token');
      if (!token) { window.location.href = '/'; return; }
      try {
        const r = await fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } });
        if (!r.ok) { localStorage.removeItem('mumtaz_token'); window.location.href = '/'; return; }
        const user = await r.json();
        renderUser(user);
      } catch {
        // offline fallback: read from token payload
        try {
          const payload = JSON.parse(atob(token.split('.')[1]));
          renderUser({ name: payload.name, email: payload.email });
        } catch {
          window.location.href = '/';
        }
      }
    })();

    function renderUser(user) {
      const name  = user.name || 'User';
      const first = name.split(' ')[0];
      $('user-name').textContent  = first;
      $('user-avatar').textContent = (first[0] || 'U').toUpperCase();
      $('first-name').textContent  = first;
      // Greeting by time of day
      const h = new Date().getHours();
      $('greeting').textContent =
        h < 5  ? 'Working late'  :
        h < 12 ? 'Good morning'   :
        h < 17 ? 'Good afternoon' :
        h < 21 ? 'Good evening'   : 'Working late';
    }

    /* ── Sign out ── */
    $('signout-btn').addEventListener('click', () => {
      localStorage.removeItem('mumtaz_token');
      window.location.href = '/';
    });

    /* ── Role selector ── */
    const savedRole = localStorage.getItem('mumtaz_role') || 'overview';
    $('role-selector').value = savedRole;
    $('role-selector').addEventListener('change', e => {
      localStorage.setItem('mumtaz_role', e.target.value);
      renderRoleContent(e.target.value);
    });

    /* ── Products ── */
    const PRODUCTS = {
      erp: {
        name: 'Mumtaz ERP',
        desc: 'Accounting, sales, inventory, HR, payroll — pre-configured for GCC compliance.',
        icon: '⬡', tone: 'teal',
        launchUrl: 'https://app.mumtaz.digital/web/login',
        launchLabel: 'Open ERP →',
      },
      zaki: {
        name: 'ZAKI AI Agents',
        desc: 'Your AI workforce — CFO, marketing, HR, operations. Instant answers from your live data.',
        icon: 'ذ', tone: 'gold',
        launchUrl: 'https://zaki.mumtaz.digital',
        launchLabel: 'Open ZAKI →',
      },
      marketplace: {
        name: 'B2B Marketplace',
        desc: 'Trade with verified GCC businesses. Purchase orders and invoices flow into your ERP.',
        icon: '⟁', tone: 'blue',
        launchUrl: '#',
        launchLabel: 'Coming soon',
        disabled: true,
      },
    };

    function renderProducts() {
      const onboarding = JSON.parse(localStorage.getItem('mumtaz_onboarding') || 'null');
      const area = $('products-area');

      if (!onboarding || !onboarding.products || !onboarding.products.length) {
        area.innerHTML = `
          <div class="empty-onboard">
            <h3>Let's set up your workspace</h3>
            <p>Tell us about your business so we can configure the right products and modules for you.</p>
            <a href="/onboarding.html">Start setup →</a>
          </div>`;
        return;
      }

      area.innerHTML = '<div class="products-grid">' +
        onboarding.products.map(key => {
          const p = PRODUCTS[key]; if (!p) return '';
          return `
            <div class="product-card ${p.disabled ? 'pc-card-disabled' : ''}">
              <div class="pc-icon ${p.tone}">${p.icon}</div>
              <div class="pc-name">${p.name}</div>
              <div class="pc-desc">${p.desc}</div>
              <a href="${p.launchUrl}" class="pc-launch" ${p.disabled ? 'aria-disabled="true"' : ''}>${p.launchLabel}</a>
            </div>`;
        }).join('') + '</div>';
    }

    /* ── Role-specific KPIs ── */
    const ROLE_KPIS = {
      overview: {
        title: 'Overview', accent: '#B8862A',
        hint: 'A quick look at the whole business.',
        kpis: [
          { icon: '💰', label: 'Revenue MTD',     val: 'AED 177K', sub: '↑ 12% vs last month',  trend: 'up' },
          { icon: '🏦', label: 'Cash Position',   val: 'AED 448K', sub: '146 days runway',      trend: 'up' },
          { icon: '👥', label: 'Active Customers', val: '32',       sub: '4 new this month',     trend: 'up' },
          { icon: '⚠️', label: 'Open Alerts',     val: '3',         sub: '1 overdue invoice',    trend: 'warn' },
        ],
      },
      ceo: {
        title: 'CEO View', accent: '#B8862A',
        hint: 'Top-level metrics for executive decisions.',
        kpis: [
          { icon: '📈', label: 'Revenue YTD',  val: 'AED 1.2M',  sub: '↑ 24% vs last year',     trend: 'up'   },
          { icon: '💼', label: 'Net Income',   val: 'AED 340K',  sub: '28% net margin',         trend: 'up'   },
          { icon: '🏦', label: 'Cash Runway',  val: '146 days',  sub: 'AED 448K on hand',        trend: 'up'   },
          { icon: '🚨', label: 'Top Alert',    val: 'ZATCA',     sub: 'Submission due in 3d',   trend: 'warn' },
        ],
      },
      cfo: {
        title: 'CFO View', accent: '#0B7A64',
        hint: 'Cash, receivables, payables — your finance dashboard.',
        kpis: [
          { icon: '🏦', label: 'Cash On Hand',         val: 'AED 448K', sub: 'Across 3 accounts',    trend: 'up'   },
          { icon: '⏳', label: 'Accounts Receivable',  val: 'AED 86K',  sub: '12 invoices',           trend: 'warn' },
          { icon: '📤', label: 'Accounts Payable',     val: 'AED 41K',  sub: 'Due in 14 days',        trend: 'up'   },
          { icon: '📊', label: 'Net Margin YTD',       val: '28.3%',    sub: '↑ 2.1pp vs LY',         trend: 'up'   },
        ],
      },
      coo: {
        title: 'Operations View', accent: '#1E4FA0',
        hint: 'Orders, inventory, fulfilment.',
        kpis: [
          { icon: '📋', label: 'Active Orders',       val: '47',       sub: '12 in production',       trend: 'up'   },
          { icon: '📦', label: 'Inventory Value',     val: 'AED 320K', sub: '4 SKUs low stock',       trend: 'warn' },
          { icon: '🚚', label: 'On-Time Delivery',    val: '94%',      sub: 'Last 30 days',           trend: 'up'   },
          { icon: '✅', label: 'Tasks Due Today',     val: '8',        sub: '2 overdue',              trend: 'warn' },
        ],
      },
      cmo: {

    function barChart({ labels, series, height = 180, formatter = v => v }) {
      const w = 460, h = height, pad = 28, gap = 6;
      const all = series.flatMap(s => s.data);
      const max = Math.max(...all, 1) * 1.1;
      const groupW = (w - pad*2) / labels.length;
      const barW   = (groupW - gap) / series.length;
      let bars = '';
      labels.forEach((lbl, i) => {
        series.forEach((s, j) => {
          const v = s.data[i];
          const bh = (v / max) * (h - pad - 24);
          const x = pad + i*groupW + j*barW + gap/2;
          const y = h - pad - bh;
          bars += `<rect class="bar" x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${(barW-2).toFixed(1)}" height="${bh.toFixed(1)}" rx="2" fill="${s.color}"><title>${lbl}: ${formatter(v)}</title></rect>`;
        });
        bars += `<text class="axis-label" x="${(pad + i*groupW + groupW/2).toFixed(1)}" y="${h - 8}" text-anchor="middle">${lbl}</text>`;
      });
      // y-axis ticks
      let ticks = '';
      for (let t = 0; t <= 3; t++) {
        const y = h - pad - (t/3) * (h - pad - 24);
        const v = (max * t/3);
        ticks += `<line x1="${pad}" x2="${w-4}" y1="${y}" y2="${y}" stroke="#E4E0D8" stroke-dasharray="3 3"/>`;
        ticks += `<text class="axis-label" x="${pad-6}" y="${y+3}" text-anchor="end">${formatter(Math.round(v))}</text>`;
      }
      const legend = series.map(s => `<span><span class="bar-legend-dot" style="background:${s.color}"></span>${s.name}</span>`).join('');
      return `<svg class="bar-chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${ticks}${bars}</svg><div class="bar-legend">${legend}</div>`;
    }

    /* ── Live Odoo data overlay ── */
    // Fetch /api/dashboard once on load. If Odoo is connected, override demo
    // KPI values with real numbers. If not, demo data stays.
    function fmtCurrency(amount, currency = 'AED') {
      const abs = Math.abs(amount);
      if (abs >= 1_000_000) return `${currency} ${(amount/1_000_000).toFixed(2)}M`;
      if (abs >= 1_000)     return `${currency} ${Math.round(amount/1_000)}K`;
      return `${currency} ${Math.round(amount)}`;
    }

    let liveData = null;

    (async function loadLive() {
      const token = localStorage.getItem('mumtaz_token');
      if (!token) return;
      try {
        const r = await fetch('/api/dashboard', { headers: { Authorization: 'Bearer ' + token } });
        if (!r.ok) return;
        const data = await r.json();
        // Only treat as live if any invoice exists
        if (!data.kpis || data.kpis.invoice_count === 0) return;
        liveData = data;
        applyLiveOverlay();
      } catch { /* offline / no Odoo — keep demo */ }
    })();

    function applyLiveOverlay() {
      if (!liveData) return;
      const k = liveData.kpis;
      const cur = k.currency || 'AED';

      // Patch KPI definitions in-place — affects ALL roles consistently.
      const setKpi = (role, label, val, sub) => {
        const view = ROLE_KPIS[role];
        if (!view) return;
        const kpi = view.kpis.find(x => x.label === label);
        if (!kpi) return;
        kpi.val = val;
        if (sub) kpi.sub = sub;
        kpi.live = true;
      };

      // Overview / CEO
      setKpi('overview', 'Revenue MTD',     fmtCurrency(k.invoiced, cur),    `${k.invoice_count} invoices YTD`);
      setKpi('ceo',      'Revenue YTD',     fmtCurrency(k.invoiced, cur),    `${k.invoice_count} invoices`);

      // CFO
      setKpi('cfo', 'Accounts Receivable', fmtCurrency(k.outstanding, cur), `${k.invoice_count} invoices outstanding`);

      // Re-render the current role with live data + add live pill
      patchRender();
    }

    function patchRender() {
      const role = $('role-selector').value;
      renderRoleContent(role);
      // Decorate live KPI cards
      const view = ROLE_KPIS[role] || ROLE_KPIS.overview;
      const cards = document.querySelectorAll('.kpi-card');
      view.kpis.forEach((kpi, i) => {
        if (kpi.live && cards[i]) {
          const label = cards[i].querySelector('.kpi-label');
          if (label && !label.querySelector('.live-pill')) {
            label.innerHTML += '<span class="live-pill">live</span>';
          }
        }
      });
      // Update the "Demo data" tag → "Live · Odoo"
      const tag = document.querySelector('#role-content .sec-link');
      if (tag && view.kpis.some(k => k.live)) {
        tag.textContent = 'Live · Odoo';
        tag.style.color = 'var(--teal)';
      }
    }

    // Re-apply overlay when user switches roles
    $('role-selector').addEventListener('change', () => { if (liveData) patchRender(); });
