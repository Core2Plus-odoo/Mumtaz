services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zaki
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zaki_dev}
      POSTGRES_DB: zaki
    volumes:
      - zaki_db:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://zaki:${POSTGRES_PASSWORD:-zaki_dev}@db:5432/zaki
    depends_on:
      - db
    restart: unless-stopped
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://zaki.mumtaz.digital}
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "3000:3000"

volumes:
  zaki_db:
