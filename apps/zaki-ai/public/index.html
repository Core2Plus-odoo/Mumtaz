<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZAKI — AI CFO · Mumtaz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'DM Sans', system-ui, sans-serif; font-size: 15px; }
    button { cursor: pointer; border: none; background: none; font: inherit; }
    input, textarea { font: inherit; }
    a { color: inherit; text-decoration: none; }

    :root {
      --gold:   #B8862A;
      --gold2:  #D4A84C;
      --teal:   #0B7A64;
      --ink:    #0C1118;
      --ink2:   #3D4A5C;
      --ink3:   #7A8799;
      --bg:     #F5F3EF;
      --white:  #FFFFFF;
      --border: #E4E0D8;
      --sidebar-bg: #0F1520;
      --sidebar-border: rgba(255,255,255,.07);
      --radius: 10px;
    }

    /* ── Login overlay ── */
    #login-overlay {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%; max-width: 400px;
      box-shadow: 0 4px 32px rgba(0,0,0,.08);
    }
    .login-logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px;
    }
    .login-logo-mark {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Instrument Serif', serif;
      font-size: 1.1rem; color: #fff;
    }
    .login-logo-name {
      font-weight: 600; font-size: 1.1rem; color: var(--ink);
    }
    .login-logo-product {
      font-size: .8rem; color: var(--ink3); margin-left: 2px;
    }
    .login-title {
      font-family: 'Instrument Serif', serif;
      font-size: 1.625rem; font-weight: 400;
      color: var(--ink); margin-bottom: 6px;
    }
    .login-sub {
      font-size: .875rem; color: var(--ink3); margin-bottom: 28px;
    }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .field label { font-size: .8rem; font-weight: 600; color: var(--ink2); letter-spacing: .03em; }
    .field input {
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: .9375rem; color: var(--ink);
      background: var(--white);
      transition: border-color .15s;
      outline: none;
    }
    .field input:focus { border-color: var(--gold); }
    #login-error {
      font-size: .85rem; color: #C0402A;
      background: #FCECEA;
      border: 1px solid rgba(192,64,42,.2);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-bottom: 16px;
    }
    #login-btn {
      width: 100%;
      background: var(--gold);
      color: #fff; font-weight: 600; font-size: .9375rem;
      padding: 11px;
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .15s;
    }
    #login-btn:hover { opacity: .88; }
    #login-btn:disabled { opacity: .55; cursor: not-allowed; }
    .login-spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .login-footer {
      margin-top: 20px; text-align: center;
      font-size: .8rem; color: var(--ink3);
    }
    .login-footer a { color: var(--gold); font-weight: 500; }

    /* ── App shell (Piece 2) ── */
    #app {
      display: flex; height: 100vh; overflow: hidden;
    }

    /* ── Hidden utility placeholders (needed by app.js) ── */
    #period-month, #period-year,
    #welcome { display: none; }

  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-overlay">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-mark">م</div>
        <div>
          <span class="login-logo-name">Mumtaz</span>
          <span class="login-logo-product">/ ZAKI</span>
        </div>
      </div>
      <h1 class="login-title">Welcome back</h1>
      <p class="login-sub">Sign in to your ZAKI AI account</p>

      <form id="login-form" autocomplete="on">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@company.com" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>

        <div id="login-error" hidden></div>

        <button id="login-btn" type="submit">
          <span id="login-label">Sign in →</span>
          <span id="login-spinner" class="login-spinner" hidden></span>
        </button>
      </form>

      <p class="login-footer">
        Don't have an account? <a href="https://app.mumtaz.digital/register">Sign up free</a>
      </p>
    </div>
  </div>

  <!-- APP SHELL — filled in Piece 2 -->
  <div id="app" hidden>

    <!-- Sidebar placeholder -->
    <aside id="sidebar"></aside>

    <!-- Main placeholder -->
    <main id="main-area"></main>

    <!-- Required by app.js -->
    <span id="user-name" hidden></span>
    <span id="user-role" hidden></span>
    <span id="user-avatar" hidden></span>
    <div id="history-list" hidden></div>
    <div id="thread" hidden></div>
    <div id="welcome"></div>
    <textarea id="chat-input" hidden></textarea>
    <button id="send-btn" hidden></button>
    <button id="new-chat-btn" hidden></button>
    <button id="logout-btn" hidden></button>
    <div id="reconnect-banner" hidden></div>
    <button id="reconnect-btn" hidden></button>
    <div id="odoo-status" hidden></div>
    <select id="period-month"></select>
    <select id="period-year"></select>

  </div>

  <script src="app.js"></script>
</body>
</html>
