<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CEO Dashboard — ZAKI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; font-family: 'DM Sans', system-ui, sans-serif; font-size: 15px; background: #0C0F16; color: #E4E8F0; }
    a { color: inherit; text-decoration: none; }

    :root {
      --gold:    #B8862A;
      --gold2:   #D4A84C;
      --teal:    #0EA882;
      --red:     #EF4444;
      --amber:   #F59E0B;
      --surface: #131825;
      --card:    #1A2035;
      --border:  rgba(255,255,255,.07);
      --muted:   #5A6478;
      --radius:  12px;
    }

    /* ── Nav ── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .nav-logo-mark {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Instrument Serif', serif; font-size: .95rem; color: #fff;
    }
    .nav-title { font-weight: 600; font-size: .95rem; color: #fff; }
    .nav-company {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 12px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 100px; font-size: .8rem; color: rgba(255,255,255,.6);
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--teal);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .nav-back {
      font-size: .8rem; color: var(--muted);
      padding: 5px 12px; border: 1px solid var(--border);
      border-radius: 8px; transition: color .15s, border-color .15s;
    }
    .nav-back:hover { color: #fff; border-color: rgba(255,255,255,.2); }

    /* ── Layout ── */
    .page { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

    /* ── Section label ── */
    .sec-label {
      font-family: 'DM Mono', monospace;
      font-size: .7rem; letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .sec-label::before {
      content: ''; width: 3px; height: 12px;
      background: var(--gold); border-radius: 2px;
    }

    /* ── Skeleton ── */
    .sk {
      background: linear-gradient(90deg, var(--surface) 25%, var(--card) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite; border-radius: 6px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Company banner ── */
    .company-banner {
      background: linear-gradient(135deg, #17111f, #0d1626);
      border: 1px solid rgba(184,134,42,.15);
      border-radius: 16px; padding: 22px 28px;
      margin-bottom: 28px;
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
      position: relative; overflow: hidden;
    }
    .company-banner::before {
      content: ''; position: absolute; top: -80px; right: -80px;
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(184,134,42,.1), transparent 65%);
      pointer-events: none;
    }
    .co-name { font-family: 'Instrument Serif', serif; font-size: 1.5rem; font-weight: 400; color: #fff; margin-bottom: 4px; }
    .co-sub  { font-size: .83rem; color: var(--muted); }
    .co-website { font-size: .83rem; color: var(--gold2); margin-top: 4px; display: inline-block; }
    .co-website:hover { text-decoration: underline; }
    .co-meta { display: flex; gap: 28px; text-align: right; flex-shrink: 0; }
    .co-meta-item label { display: block; font-size: .68rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 3px; }
    .co-meta-item span  { font-size: .9rem; font-weight: 500; color: rgba(255,255,255,.75); }
    @media (max-width: 640px) { .co-meta { display: none; } }

    /* ── KPI grid ── */
    .kpi-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 14px; margin-bottom: 28px;
    }
    @media (max-width: 860px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
    .kpi {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      position: relative; overflow: hidden;
      transition: border-color .2s;
    }
    .kpi:hover { border-color: rgba(184,134,42,.3); }
    .kpi::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px; background: var(--accent, var(--gold)); opacity: .6;
    }
    .kpi-icon  { font-size: 1.2rem; margin-bottom: 10px; }
    .kpi-label { font-family: 'DM Mono', monospace; font-size: .68rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 8px; }
    .kpi-val   { font-size: 1.5rem; font-weight: 700; letter-spacing: -.025em; color: #fff; margin-bottom: 4px; }
    .kpi-sub   { font-size: .78rem; color: var(--muted); }

    /* ── Overdue alert ── */
    .alert {
      background: rgba(239,68,68,.06); border: 1px solid rgba(239,68,68,.2);
      border-radius: var(--radius); padding: 14px 18px; margin-bottom: 28px;
      display: flex; align-items: center; gap: 14px;
    }
    .alert-icon {
      width: 36px; height: 36px; background: rgba(239,68,68,.15);
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      font-size: .9rem; flex-shrink: 0;
    }
    .alert h4 { font-size: .875rem; font-weight: 600; color: #FCA5A5; margin-bottom: 2px; }
    .alert p  { font-size: .78rem; color: var(--muted); }
    .alert-amt { margin-left: auto; font-size: 1.25rem; font-weight: 700; color: var(--red); flex-shrink: 0; }

    /* ── Two-col grid ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    @media (max-width: 860px) { .two-col { grid-template-columns: 1fr; } }

    /* ── Chart card ── */
    .chart-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
    }
    .chart-card-title {
      font-size: .875rem; font-weight: 600; color: rgba(255,255,255,.75);
      margin-bottom: 16px;
    }
    .chart-wrap { position: relative; height: 200px; }

    /* ── Customers list ── */
    .customers-list { display: flex; flex-direction: column; gap: 10px; }
    .customer-row {
      display: flex; align-items: center; gap: 10px;
    }
    .customer-rank {
      width: 20px; font-family: 'DM Mono', monospace; font-size: .72rem;
      color: var(--muted); text-align: center; flex-shrink: 0;
    }
    .customer-name { flex: 1; font-size: .875rem; color: rgba(255,255,255,.75); min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .customer-bar-wrap { width: 80px; height: 4px; background: rgba(255,255,255,.06); border-radius: 2px; flex-shrink: 0; }
    .customer-bar { height: 100%; background: var(--gold); border-radius: 2px; }
    .customer-amt { font-size: .8rem; font-weight: 600; color: rgba(255,255,255,.5); width: 72px; text-align: right; flex-shrink: 0; }

    /* ── SEO section ── */
    .seo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 28px; }
    @media (max-width: 640px) { .seo-grid { grid-template-columns: 1fr; } }
    .seo-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
    }
    .seo-card-title {
      font-size: .875rem; font-weight: 600; color: rgba(255,255,255,.75);
      margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    }
    .seo-card-tag {
      font-family: 'DM Mono', monospace; font-size: .66rem; padding: 2px 8px;
      border-radius: 4px; letter-spacing: .06em;
    }
    .tag-mobile  { background: rgba(11,168,130,.12); color: var(--teal); }
    .tag-desktop { background: rgba(184,134,42,.12); color: var(--gold2); }
    .score-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
    .score-item { display: flex; flex-direction: column; gap: 4px; }
    .score-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .score-val { font-size: 1.375rem; font-weight: 700; letter-spacing: -.02em; }
    .score-green  { color: #4ADE80; }
    .score-orange { color: var(--amber); }
    .score-red    { color: var(--red); }
    .vitals-list { display: flex; flex-direction: column; gap: 6px; border-top: 1px solid var(--border); padding-top: 12px; }
    .vital-row { display: flex; justify-content: space-between; font-size: .78rem; }
    .vital-name { color: var(--muted); }
    .vital-val  { color: rgba(255,255,255,.6); font-family: 'DM Mono', monospace; }

    /* ── Error state ── */
    .no-odoo {
      text-align: center; padding: 60px 24px;
      color: var(--muted); font-size: .9rem;
    }
    .no-odoo h3 { font-size: 1.1rem; color: rgba(255,255,255,.5); margin-bottom: 8px; }
    .no-odoo a { color: var(--gold2); }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-left">
      <div class="nav-logo-mark">ذ</div>
      <span class="nav-title">CEO Dashboard</span>
      <div class="nav-company">
        <div class="live-dot"></div>
        <span id="nav-co">Loading…</span>
      </div>
    </div>
    <a href="/" class="nav-back">← ZAKI Chat</a>
  </nav>

  <div class="page">

    <!-- Company banner -->
    <div class="company-banner" id="company-banner">
      <div>
        <div id="co-name-sk" class="sk" style="width:180px;height:24px;margin-bottom:8px"></div>
        <div class="co-name" id="co-name" style="display:none"></div>
        <div class="co-sub"  id="co-sub"></div>
        <a class="co-website" id="co-website" target="_blank" rel="noopener" style="display:none"></a>
      </div>
      <div class="co-meta">
        <div class="co-meta-item"><label>Year</label><span id="meta-year"></span></div>
        <div class="co-meta-item"><label>Currency</label><span id="meta-cur">—</span></div>
        <div class="co-meta-item"><label>Updated</label><span id="meta-ts"></span></div>
      </div>
    </div>

    <!-- KPIs -->
    <div class="sec-label">Financial Overview — <span id="fin-year"></span></div>
    <div class="kpi-grid" id="kpi-grid">
      <!-- skeleton placeholders -->
      <div class="kpi"><div class="sk" style="height:20px;width:20px;border-radius:50%;margin-bottom:10px"></div><div class="sk" style="height:10px;width:80px;margin-bottom:10px"></div><div class="sk" style="height:28px;width:110px;margin-bottom:6px"></div><div class="sk" style="height:10px;width:60px"></div></div>
      <div class="kpi"><div class="sk" style="height:20px;width:20px;border-radius:50%;margin-bottom:10px"></div><div class="sk" style="height:10px;width:80px;margin-bottom:10px"></div><div class="sk" style="height:28px;width:110px;margin-bottom:6px"></div><div class="sk" style="height:10px;width:60px"></div></div>
      <div class="kpi"><div class="sk" style="height:20px;width:20px;border-radius:50%;margin-bottom:10px"></div><div class="sk" style="height:10px;width:80px;margin-bottom:10px"></div><div class="sk" style="height:28px;width:110px;margin-bottom:6px"></div><div class="sk" style="height:10px;width:60px"></div></div>
      <div class="kpi"><div class="sk" style="height:20px;width:20px;border-radius:50%;margin-bottom:10px"></div><div class="sk" style="height:10px;width:80px;margin-bottom:10px"></div><div class="sk" style="height:28px;width:110px;margin-bottom:6px"></div><div class="sk" style="height:10px;width:60px"></div></div>
    </div>

    <!-- Overdue alert -->
    <div class="alert" id="overdue-alert" style="display:none">
      <div class="alert-icon">⚠️</div>
      <div>
        <h4 id="overdue-title"></h4>
        <p>Unpaid invoices require attention</p>
      </div>
      <div class="alert-amt" id="overdue-amt"></div>
    </div>

    <!-- Charts + Top customers -->
    <div class="two-col" id="charts-row" style="display:none">
      <div class="chart-card">
        <div class="chart-card-title">Monthly Revenue vs Expenses</div>
        <div class="chart-wrap"><canvas id="monthly-chart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">Top Customers — Revenue YTD</div>
        <div class="customers-list" id="customers-list"></div>
      </div>
    </div>

    <!-- SEO section -->
    <div id="seo-section" style="display:none">
      <div class="sec-label">Website SEO — <span id="seo-url-label"></span></div>
      <div class="seo-grid">
        <div class="seo-card" id="seo-mobile"></div>
        <div class="seo-card" id="seo-desktop"></div>
      </div>
    </div>

    <!-- No Odoo state -->
    <div class="no-odoo" id="no-odoo" style="display:none">
      <h3>Odoo not connected</h3>
      <p>Go to <a href="/">ZAKI Chat → Connect Odoo</a> to see your live financial data.</p>
    </div>

  </div>

  <script>
    const year = new Date().getFullYear();
    document.getElementById('meta-year').textContent = year;
    document.getElementById('fin-year').textContent  = year;
    document.getElementById('meta-ts').textContent   = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    function token() { return localStorage.getItem('mumtaz_token') || ''; }
    function hdrs()  { return { 'Authorization': 'Bearer ' + token() }; }

    function fmt(n, cur) {
      cur = cur || 'AED';
      if (n >= 1e6) return cur + ' ' + (n / 1e6).toFixed(1) + 'M';
      if (n >= 1e3) return cur + ' ' + (n / 1e3).toFixed(0) + 'K';
      return cur + ' ' + Math.round(n).toLocaleString();
    }

    function scoreClass(n) {
      if (n >= 90) return 'score-green';
      if (n >= 50) return 'score-orange';
      return 'score-red';
    }

    /* ── Auth check ── */
    async function checkAuth() {
      const r = await fetch('/auth/me', { headers: hdrs() });
      if (!r.ok) { window.location.href = '/'; return false; }
      return true;
    }

    /* ── Company ── */
    async function loadCompany() {
      try {
        const r = await fetch('/api/company', { headers: hdrs() });
        if (!r.ok) {
          if (r.status === 400) { showNoOdoo(); return null; }
          return null;
        }
        const co = await r.json();
        document.getElementById('co-name-sk').style.display = 'none';
        const el = document.getElementById('co-name');
        el.style.display = 'block';
        el.textContent = co.name || 'Your Company';
        document.getElementById('nav-co').textContent = co.name || 'Company';
        const sub = [co.city, co.country_id ? co.country_id[1] : null].filter(Boolean).join(', ');
        if (sub) document.getElementById('co-sub').textContent = sub;
        if (co.website) {
          const url = co.website.startsWith('http') ? co.website : 'https://' + co.website;
          window._companyWebsite = url;
          const a = document.getElementById('co-website');
          a.textContent = co.website; a.href = url; a.style.display = 'inline-block';
        }
        return co;
      } catch { return null; }
    }

    /* ── Financials ── */
    async function loadFinancials() {
      try {
        const r = await fetch('/api/financials', { headers: hdrs() });
        if (!r.ok) { if (r.status === 400) showNoOdoo(); return; }
        const d = await r.json();

        document.getElementById('meta-cur').textContent = d.currency;

        const margin = d.totalRevenue > 0 ? ((d.netIncome / d.totalRevenue) * 100).toFixed(1) : 0;
        const kpis = [
          { icon: '💰', label: 'Revenue YTD',     val: fmt(d.totalRevenue,  d.currency), sub: d.invoiceCount + ' invoices',     accent: '#0EA882' },
          { icon: '📤', label: 'Expenses YTD',    val: fmt(d.totalExpenses, d.currency), sub: d.billCount + ' bills',           accent: '#EF4444' },
          { icon: d.netIncome >= 0 ? '📈' : '📉',
                        label: 'Net Income',       val: fmt(d.netIncome,     d.currency), sub: margin + '% net margin',          accent: d.netIncome >= 0 ? '#B8862A' : '#EF4444' },
          { icon: '⏳', label: 'Unpaid Invoices', val: fmt(d.unpaidAmount,  d.currency), sub: d.unpaidCount + ' outstanding',   accent: d.unpaidCount > 0 ? '#F59E0B' : '#0EA882' },
        ];
        document.getElementById('kpi-grid').innerHTML = kpis.map(k => `
          <div class="kpi" style="--accent:${k.accent}">
            <div class="kpi-icon">${k.icon}</div>
            <div class="kpi-label">${k.label}</div>
            <div class="kpi-val">${k.val}</div>
            <div class="kpi-sub">${k.sub}</div>
          </div>`).join('');

        if (d.unpaidCount > 0) {
          document.getElementById('overdue-alert').style.display = 'flex';
          document.getElementById('overdue-title').textContent = d.unpaidCount + ' Unpaid Invoice' + (d.unpaidCount > 1 ? 's' : '');
          document.getElementById('overdue-amt').textContent = fmt(d.unpaidAmount, d.currency);
        }

        renderChart(d);
        renderCustomers(d);
      } catch (e) {
        document.getElementById('kpi-grid').innerHTML = '<div style="grid-column:1/-1;color:var(--red);font-size:.85rem;padding:10px">Failed to load financial data.</div>';
      }
    }

    /* ── Monthly chart ── */
    function renderChart(d) {
      document.getElementById('charts-row').style.display = 'grid';
      const labels   = d.chartData.map(r => r.month);
      const revenue  = d.chartData.map(r => r.revenue);
      const expenses = d.chartData.map(r => r.expenses);

      new Chart(document.getElementById('monthly-chart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: 'Revenue',  data: revenue,  backgroundColor: 'rgba(184,134,42,.75)', borderRadius: 4, borderSkipped: false },
            { label: 'Expenses', data: expenses, backgroundColor: 'rgba(239,68,68,.5)',   borderRadius: 4, borderSkipped: false },
          ],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: '#5A6478', font: { size: 11 } } },
            tooltip: { callbacks: { label: ctx => ' ' + fmt(ctx.raw, d.currency) } },
          },
          scales: {
            x: { ticks: { color: '#5A6478', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,.04)' } },
            y: { ticks: { color: '#5A6478', font: { size: 10 }, callback: v => fmt(v, '') }, grid: { color: 'rgba(255,255,255,.04)' } },
          },
        },
      });
    }

    /* ── Top customers ── */
    function renderCustomers(d) {
      const list  = d.topCustomers || [];
      const max   = list[0] ? list[0].amount : 1;
      const el    = document.getElementById('customers-list');
      if (!list.length) { el.innerHTML = '<p style="color:var(--muted);font-size:.83rem">No customer data</p>'; return; }
      el.innerHTML = list.map((c, i) => `
        <div class="customer-row">
          <div class="customer-rank">${i + 1}</div>
          <div class="customer-name" title="${c.name}">${c.name}</div>
          <div class="customer-bar-wrap"><div class="customer-bar" style="width:${Math.round(c.amount / max * 100)}%"></div></div>
          <div class="customer-amt">${fmt(c.amount, d.currency)}</div>
        </div>`).join('');
    }

    /* ── SEO ── */
    async function loadSEO() {
      const url = window._companyWebsite;
      if (!url) return;
      document.getElementById('seo-url-label').textContent = url.replace(/^https?:\/\//, '');
      document.getElementById('seo-section').style.display = 'block';
      document.getElementById('seo-mobile').innerHTML  = '<div class="sk" style="height:120px"></div>';
      document.getElementById('seo-desktop').innerHTML = '<div class="sk" style="height:120px"></div>';
      try {
        const r = await fetch('/api/seo?url=' + encodeURIComponent(url), { headers: hdrs() });
        if (!r.ok) throw new Error();
        const data = await r.json();
        renderSEOCard('seo-mobile',  data.mobile,  'Mobile',  'tag-mobile');
        renderSEOCard('seo-desktop', data.desktop, 'Desktop', 'tag-desktop');
      } catch {
        document.getElementById('seo-mobile').innerHTML  = '<p style="color:var(--muted);font-size:.83rem">SEO data unavailable</p>';
        document.getElementById('seo-desktop').innerHTML = '';
      }
    }

    function renderSEOCard(elId, s, label, tagClass) {
      const scores = [
        { key: 'performance',   name: 'Performance' },
        { key: 'seo',           name: 'SEO' },
        { key: 'accessibility', name: 'Accessibility' },
        { key: 'bestPractices', name: 'Best Practices' },
      ];
      const vitals = [
        { key: 'lcp',  name: 'LCP' },
        { key: 'fcp',  name: 'FCP' },
        { key: 'cls',  name: 'CLS' },
        { key: 'tbt',  name: 'TBT' },
        { key: 'ttfb', name: 'TTFB' },
      ];
      document.getElementById(elId).innerHTML = `
        <div class="seo-card-title">
          ${label} <span class="seo-card-tag ${tagClass}">${label.toUpperCase()}</span>
        </div>
        <div class="score-row">
          ${scores.map(sc => `
            <div class="score-item">
              <div class="score-label">${sc.name}</div>
              <div class="score-val ${scoreClass(s[sc.key])}">${s[sc.key]}</div>
            </div>`).join('')}
        </div>
        <div class="vitals-list">
          ${vitals.map(v => `
            <div class="vital-row">
              <span class="vital-name">${v.name}</span>
              <span class="vital-val">${s[v.key]}</span>
            </div>`).join('')}
        </div>`;
    }

    function showNoOdoo() {
      document.getElementById('no-odoo').style.display = 'block';
      document.getElementById('kpi-grid').innerHTML = '';
      document.getElementById('co-name-sk').style.display = 'none';
      document.getElementById('co-name').style.display = 'none';
    }

    async function init() {
      if (!await checkAuth()) return;
      await loadCompany();
      await loadFinancials();
      await loadSEO();
    }
    init();
  </script>
</body>
