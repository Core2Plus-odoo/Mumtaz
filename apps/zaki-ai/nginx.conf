# /etc/nginx/sites-available/zaki.mumtaz.digital
# Run: sudo ln -s /etc/nginx/sites-available/zaki.mumtaz.digital /etc/nginx/sites-enabled/
# Then: sudo certbot --nginx -d zaki.mumtaz.digital

server {
    listen 80;
    server_name zaki.mumtaz.digital;

    # Redirect to HTTPS (certbot will update this)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zaki.mumtaz.digital;

    # SSL — managed by certbot
    # ssl_certificate     /etc/letsencrypt/live/zaki.mumtaz.digital/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/zaki.mumtaz.digital/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"  always;
    add_header X-Content-Type-Options   "nosniff"     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # Proxy to Node.js app
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Required for SSE (streaming)
        proxy_set_header   Connection     '';
        proxy_set_header   Upgrade        $http_upgrade;
        proxy_set_header   Host           $host;
        proxy_set_header   X-Real-IP      $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE — disable buffering so tokens stream in real time
        proxy_buffering            off;
        proxy_cache                off;
        proxy_read_timeout         300s;
        proxy_connect_timeout      10s;
        chunked_transfer_encoding  on;
    }

    # Static assets — serve directly with cache headers
    location ~* \.(css|js|ico|png|jpg|svg|woff2?)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
