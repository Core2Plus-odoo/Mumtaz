# /etc/nginx/sites-available/mumtaz.digital
#
# Marketing site for Mumtaz: mumtaz.digital + www.mumtaz.digital
# Pure static HTML, no API proxy.
#
# Starts as HTTP-only.  Run:
#     sudo certbot --nginx -d mumtaz.digital -d www.mumtaz.digital
# and certbot will rewrite this file to add SSL + HTTP→HTTPS redirect.
#
# Install:
#   sudo cp apps/website/nginx.conf /etc/nginx/sites-available/mumtaz.digital
#   sudo ln -sf /etc/nginx/sites-available/mumtaz.digital /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d mumtaz.digital -d www.mumtaz.digital

server {
    listen 80;
    listen [::]:80;
    server_name mumtaz.digital www.mumtaz.digital;

    root /var/www/mumtaz.digital;
    index index.html;

    # Security headers
    add_header X-Frame-Options         "SAMEORIGIN"        always;
    add_header X-Content-Type-Options  "nosniff"           always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Cache static assets aggressively
    location ~* \.(css|js|svg|png|jpg|jpeg|webp|woff2?|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Pretty URLs: /about → /about.html
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
