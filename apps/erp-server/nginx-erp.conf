# nginx config for erp.mumtaz.digital → Odoo on port 8069
#
# Deploy on VPS:
#   cp apps/erp-server/nginx-erp.conf /etc/nginx/sites-available/erp.mumtaz.digital
#   ln -sf /etc/nginx/sites-available/erp.mumtaz.digital /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d erp.mumtaz.digital

server {
    listen 80;
    listen [::]:80;
    server_name erp.mumtaz.digital;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name erp.mumtaz.digital;

    ssl_certificate     /etc/letsencrypt/live/erp.mumtaz.digital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.mumtaz.digital/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;

    client_max_body_size 200m;

    # Odoo web interface
    location / {
        proxy_pass         http://127.0.0.1:8069;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout 720s;
    }

    # Odoo longpolling
    location /longpolling {
        proxy_pass         http://127.0.0.1:8072;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 600s;
    }

    # Static assets — serve directly for speed
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:8069;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.ico { access_log off; log_not_found off; }
}
