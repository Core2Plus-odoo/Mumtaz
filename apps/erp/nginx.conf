# HTTP → HTTPS redirect
server {
    listen 80;
    server_name erp.mumtaz.digital;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name erp.mumtaz.digital;

    ssl_certificate     /etc/letsencrypt/live/erp.mumtaz.digital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.mumtaz.digital/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/erp.mumtaz.digital;
    index index.html;

    # ── Security headers ──────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;

    # ── ERP API → uvicorn on port 8002 ────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8002/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
        proxy_set_header   X-Api-Key         $http_x_api_key;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
        proxy_hide_header  X-Powered-By;
    }

    # ── Static assets ─────────────────────────────────────────
    location ~* \.(css|js|svg|png|jpg|jpeg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /favicon.ico { access_log off; log_not_found off; }

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript image/svg+xml application/x-font-ttf;
}
