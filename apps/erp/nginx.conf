# HTTP → HTTPS redirect
server {
    listen 80;
    server_name erp.mumtaz.digital;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name erp.mumtaz.digital;

    ssl_certificate     /etc/letsencrypt/live/erp.mumtaz.digital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.mumtaz.digital/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/erp.mumtaz.digital;
    index index.html;

    # ERP API → uvicorn on port 8002
    location /api/ {
        proxy_pass         http://127.0.0.1:8002/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
}
