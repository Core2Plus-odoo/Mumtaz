# mumtaz.digital — marketing site (static). Applied at Phase 5 cutover.
server {
    listen 443 ssl;
    server_name mumtaz.digital www.mumtaz.digital;

    ssl_certificate     /etc/letsencrypt/live/mumtaz.digital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mumtaz.digital/privkey.pem;

    root  /opt/mumtaz/marketing;
    index index.html;

    location / { try_files $uri $uri/ /index.html; }

    location ~* \.(css|js|svg|png|jpg|jpeg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
    access_log /opt/mumtaz/logs/marketing.log;
}
server {
    listen 80;
    server_name mumtaz.digital www.mumtaz.digital;
    return 301 https://$host$request_uri;
}
