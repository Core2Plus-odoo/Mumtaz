# app.mumtaz.digital — control panel (static UI + /api/ → :8002). Phase 5 cutover.
# Clean canonical routing: ALL /api/* proxied to the backend (no per-path rewrites).
server {
    listen 443 ssl http2;
    server_name app.mumtaz.digital;
    ssl_certificate     /etc/letsencrypt/live/app.mumtaz.digital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.mumtaz.digital/privkey.pem;

    root /opt/mumtaz/platform/frontend;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }

    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    client_max_body_size 20M;
    access_log /opt/mumtaz/logs/platform.log;
}
server { listen 80; server_name app.mumtaz.digital; return 301 https://$host$request_uri; }
