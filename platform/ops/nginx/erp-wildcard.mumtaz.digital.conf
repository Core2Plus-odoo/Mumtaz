# *.erp.mumtaz.digital — wildcard reverse proxy to Odoo (database-per-tenant).
#
# Routes any tenant subdomain (acme.erp.mumtaz.digital) to the single Odoo
# backend. Odoo selects the tenant database from the Host header via the
# mumtaz_subdomain_routing db_filter (requires MUMTAZ_DBFILTER_ROUTING=1 and
# proxy_mode=True in odoo.conf so X-Forwarded-* is trusted).
#
# Prerequisites:
#   * Wildcard DNS A/AAAA record:  *.erp.mumtaz.digital -> this host
#   * Wildcard TLS cert (DNS-01):  certbot certonly --dns-<provider> \
#                                    -d '*.erp.mumtaz.digital' -d erp.mumtaz.digital
#   * odoo.conf:  proxy_mode = True

upstream mumtaz_odoo      { server 127.0.0.1:8069; }
upstream mumtaz_odoo_ws   { server 127.0.0.1:8072; }   # gevent / websocket port

# Long-lived gzip + common proxy headers reused by both locations.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl http2;
    server_name ~^(?<tenant>[^.]+)\.erp\.mumtaz\.digital$ erp.mumtaz.digital;

    ssl_certificate     /etc/letsencrypt/live/erp.mumtaz.digital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.mumtaz.digital/privkey.pem;

    # Pass the real host through so Odoo's db_filter can map subdomain -> db.
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    client_max_body_size 100M;
    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;

    # Websocket / longpolling bus.
    location /websocket {
        proxy_pass http://mumtaz_odoo_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Main application.
    location / {
        proxy_pass http://mumtaz_odoo;
        proxy_redirect off;
    }

    # Cache Odoo's static assets aggressively.
    location ~* /web/static/ {
        proxy_pass http://mumtaz_odoo;
        proxy_cache_valid 200 60m;
        expires 7d;
        add_header Cache-Control public;
    }

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    access_log /opt/mumtaz/logs/erp.log;
}

server {
    listen 80;
    server_name *.erp.mumtaz.digital erp.mumtaz.digital;
    return 301 https://$host$request_uri;
}
