# zaki.mumtaz.digital — ZAKI AI CFO (static UI + streaming API). Phase 5 cutover.
server {
    listen 443 ssl;
    server_name zaki.mumtaz.digital;
    ssl_certificate     /etc/letsencrypt/live/zaki.mumtaz.digital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zaki.mumtaz.digital/privkey.pem;

    root /opt/mumtaz/zaki/frontend;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }

    location ~ ^/(api/|health) {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;          # SSE streaming
        proxy_cache off;
        proxy_read_timeout 300s;
    }
    access_log /opt/mumtaz/logs/zaki.log;
}
server { listen 80; server_name zaki.mumtaz.digital; return 301 https://$host$request_uri; }
