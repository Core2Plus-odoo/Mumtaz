<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ZAKI — AI CFO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15120E; --panel:#1C1917; --panel2:#232019; --line:rgba(245,241,234,.10);
    --gold:#D4A84C; --gold2:#B8862A; --gold-soft:rgba(212,168,76,.14);
    --txt:#F5F1EA; --mut:rgba(245,241,234,.62); --mut2:rgba(245,241,234,.4);
    --green:#3CC78D; --green-bg:rgba(60,199,141,.14); --red:#E06A5A; --red-bg:rgba(224,106,90,.14);
    --amber:#E8B04B; --amber-bg:rgba(232,176,75,.14);
    --r:12px; --r-sm:9px; --r-full:9999px; --font:'Inter',system-ui,sans-serif; --mono:'DM Mono',monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;font-size:15px}
  button{font-family:var(--font);cursor:pointer;border:none}
  input,select,textarea{font-family:var(--font);outline:none}
  .mono{font-family:var(--mono)}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* Wizard */
  #wizard{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px}
  .wz-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;max-width:460px;width:100%;padding:34px}
  .wz-logo{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .zmark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#15120E;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700}
  .wz-step{font-size:.72rem;color:var(--gold);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin:18px 0 6px}
  .wz-card h2{font-size:1.4rem;font-weight:700;margin-bottom:18px}
  .fld{margin-bottom:14px}
  .fld label{display:block;font-size:.72rem;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
  .fld input,.fld select,.fld textarea{width:100%;padding:11px 13px;background:var(--panel2);border:1px solid var(--line);border-radius:var(--r-sm);color:var(--txt);font-size:.92rem}
  .ind-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .ind{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r-sm);padding:12px 8px;text-align:center;font-size:.78rem;cursor:pointer}
  .ind.sel{border-color:var(--gold);background:var(--gold-soft);color:var(--gold)}
  .btn{padding:11px 20px;border-radius:var(--r-sm);font-weight:600;font-size:.9rem}
  .btn-gold{background:var(--gold);color:#15120E}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  .wz-foot{display:flex;justify-content:space-between;margin-top:22px}

  /* App shell */
  #app{display:none;min-height:100vh}
  .wrap2{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
  aside{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:18px 14px}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 18px}
  .brand .nm{font-weight:700}.brand .sub{font-size:.68rem;color:var(--gold)}
  .co-card{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 12px;margin-bottom:16px;font-size:.82rem}
  .co-card .live{font-size:.7rem;color:var(--green);display:flex;align-items:center;gap:6px;margin-top:4px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pl 2s infinite}
  @keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}
  .nav{display:flex;flex-direction:column;gap:2px}
  .nv{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r-sm);color:var(--mut);font-size:.88rem;font-weight:500;cursor:pointer;border-left:2px solid transparent}
  .nv:hover{background:var(--panel2);color:var(--txt)}
  .nv.active{background:var(--gold-soft);color:var(--gold);border-left-color:var(--gold)}
  .nv .bdg{margin-left:auto;background:var(--red);color:#fff;font-size:.62rem;font-weight:700;border-radius:var(--r-full);padding:1px 7px}
  main{padding:0}
  .top{height:56px;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 26px;gap:14px}
  .top .ttl{font-weight:700;font-size:1.05rem}
  .top .rt{margin-left:auto;display:flex;align-items:center;gap:12px;font-size:.8rem;color:var(--mut)}
  .content{padding:26px;max-width:980px}
  .panel{display:none}.panel.active{display:block}
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px}
  .kpi .l{font-size:.7rem;color:var(--mut);text-transform:uppercase;letter-spacing:.05em}
  .kpi .v{font-size:1.35rem;font-weight:800;margin-top:6px}
  .v.green{color:var(--green)}.v.red{color:var(--red)}.v.amber{color:var(--amber)}.v.gold{color:var(--gold)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:22px;margin-top:18px}
  .ctrls{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}
  .wave{display:flex;align-items:flex-end;gap:3px;height:30px;margin:14px 0}
  .wave i{width:3px;background:var(--gold);border-radius:2px;animation:wv 1.1s ease infinite}
  @keyframes wv{0%,100%{height:18%}50%{height:100%}}
  .stream{font-size:1rem;line-height:1.75;color:var(--txt);white-space:pre-wrap;min-height:40px}
  .cursor::after{content:'▋';color:var(--gold);animation:bl 1s steps(2) infinite}
  @keyframes bl{50%{opacity:0}}
  .date{font-size:.8rem;color:var(--mut)}
  .greet{font-size:1.7rem;font-weight:700;margin:4px 0 6px}

  /* chat */
  .chat{display:flex;flex-direction:column;height:calc(100vh - 220px);min-height:360px}
  .msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding:6px 2px}
  .m{max-width:78%;padding:12px 15px;border-radius:14px;font-size:.92rem;line-height:1.6;white-space:pre-wrap}
  .m.u{align-self:flex-end;background:var(--gold-soft);border:1px solid rgba(212,168,76,.3)}
  .m.z{align-self:flex-start;background:var(--panel2);border:1px solid var(--line)}
  .m .who{font-size:.66rem;color:var(--gold);font-weight:700;margin-bottom:3px}
  .qa{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
  .qa button{background:transparent;border:1px solid var(--line);color:var(--mut);border-radius:var(--r-full);padding:7px 12px;font-size:.78rem}
  .qa button:hover{border-color:var(--gold);color:var(--gold)}
  .chat-in{display:flex;gap:10px;margin-top:12px}
  .chat-in input{flex:1;padding:12px 14px;background:var(--panel2);border:1px solid var(--line);border-radius:var(--r-sm);color:var(--txt)}

  /* health donut */
  .donut-wrap{display:flex;align-items:center;gap:30px;flex-wrap:wrap}
  .signals{flex:1;min-width:260px;display:flex;flex-direction:column;gap:12px}
  .sig{font-size:.85rem}
  .bar{height:8px;background:var(--panel2);border-radius:6px;overflow:hidden;margin-top:5px}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:6px}
  .opp,.alert{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-top:12px}
  .tag{display:inline-block;font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 9px;border-radius:var(--r-full);background:var(--gold-soft);color:var(--gold)}
  .tag.red{background:var(--red-bg);color:var(--red)}.tag.amber{background:var(--amber-bg);color:var(--amber)}
  .opp .impact{font-size:1.3rem;font-weight:800;color:var(--gold);margin:6px 0}
  .invest-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
  @media(max-width:820px){ .wrap2{grid-template-columns:1fr} aside{display:none} .kpis{grid-template-columns:1fr} .invest-grid{grid-template-columns:1fr} }
  @media print{ aside,.top,.ctrls,.qa,.chat-in{display:none!important} .content{max-width:100%} }
</style>
</head>
<body>

<!-- WIZARD -->
<div id="wizard">
  <div class="wz-card">
    <div class="wz-logo"><div class="zmark">ذ</div><div><div class="nm" style="font-weight:700">ZAKI</div><div style="font-size:.7rem;color:var(--gold)">AI CFO</div></div></div>
    <div id="wz-body"></div>
  </div>
</div>

<!-- APP -->
<div id="app"><div class="wrap2">
  <aside>
    <div class="brand"><div class="zmark">ذ</div><div><div class="nm">ZAKI</div><div class="sub">AI CFO</div></div></div>
    <div class="co-card"><div id="co-name">—</div><div class="live"><span class="dot"></span> Live</div></div>
    <nav class="nav" id="nav"></nav>
  </aside>
  <main>
    <div class="top"><div class="ttl" id="ptitle">Morning Briefing</div>
      <div class="rt"><span id="refreshed">—</span><button class="btn btn-ghost" style="padding:6px 12px" onclick="resetCfg()">⚙</button></div></div>
    <div class="content" id="content"></div>
  </main>
</div></div>

<script>
const API='/api/v1';
const NAV=[['briefing','🌅','Morning Briefing'],['health','❤','Business Health'],['chat','💬','Chat with ZAKI'],
['opportunities','✨','Opportunities'],['risks','⚠','Risks & Alerts'],['invest','📈','Where to Invest'],
['intel','🌐','Market Intel'],['board','📋','Board Pack']];
const INDUSTRIES=['Trading','Technology','F&B','Real Estate','Construction','Manufacturing','Healthcare','Retail','Consulting'];

function urlTid(){ const m=new URLSearchParams(location.search).get('tid'); return m?parseInt(m):null; }
function loadS(){ try{return JSON.parse(localStorage.getItem('zaki_v2')||'{}')}catch(e){return{}} }
function saveS(){ localStorage.setItem('zaki_v2', JSON.stringify(S)); }
let S = loadS();
if(urlTid()){ S.config=S.config||{}; S.config.tenant_id=urlTid(); }
S.cache=S.cache||{}; S.chat=S.chat||{hist:[]};
function esc(t){return String(t==null?'':t).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function money(v,c){return (c||(S.config&&S.config.currency)||'AED')+' '+Number(v||0).toLocaleString(undefined,{maximumFractionDigits:0})}

/* ---- streaming ---- */
async function streamSSE(path, body, onTok, onDone){
  const r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const rd=r.body.getReader(); const dec=new TextDecoder(); let buf='',full='';
  while(true){ const{value,done}=await rd.read(); if(done)break; buf+=dec.decode(value,{stream:true});
    let i; while((i=buf.indexOf('\n\n'))>=0){ const line=buf.slice(0,i).replace(/^data: ?/,''); buf=buf.slice(i+2);
      if(line==='[DONE]'){ onDone&&onDone(full); return; }
      try{ const d=JSON.parse(line); if(d.text){ full+=d.text; onTok(full); } }catch(e){} } }
  onDone&&onDone(full);
}
async function apiGet(p){ const r=await fetch(API+p); if(!r.ok)throw 0; return r.json(); }

/* ---- snapshot ---- */
async function snapshot(force){
  if(!force && S.cache.snap && Date.now()-S.cache.ts<300000) return S.cache.snap;
  const d=await apiGet('/financials/'+S.config.tenant_id); S.cache={snap:d.data,ts:Date.now()}; saveS();
  document.getElementById('refreshed').textContent='Updated just now'; return d.data;
}

/* ---- WIZARD ---- */
const wzState={step:1,cfg:{tenant_id:S.config?.tenant_id||urlTid()||1,currency:'AED',country:'UAE',industry:'Trading'}};
function wz(){
  const b=document.getElementById('wz-body'); const c=wzState.cfg;
  if(wzState.step===1) b.innerHTML=`<div class="wz-step">Step 1 of 4 · About you</div><h2>Welcome — let's set up.</h2>
    <div class="fld"><label>Company name</label><input id="w-co" value="${esc(c.company_name||'')}" placeholder="C2P Consultants"></div>
    <div class="fld"><label>Your full name</label><input id="w-nm" value="${esc(c.ceo_name||'')}" placeholder="Muhammad Umar"></div>
    <div class="fld"><label>What should ZAKI call you?</label><input id="w-fn" value="${esc(c.first_name||'')}" placeholder="Muhammad"></div>
    <div class="wz-foot"><span></span><button class="btn btn-gold" onclick="wzNext(1)">Continue →</button></div>`;
  if(wzState.step===2) b.innerHTML=`<div class="wz-step">Step 2 of 4 · Region</div><h2>Where do you operate?</h2>
    <div class="fld"><label>Country</label><select id="w-ct">${['UAE','Saudi Arabia','Pakistan','Other'].map(x=>`<option ${c.country===x?'selected':''}>${x}</option>`).join('')}</select></div>
    <div class="fld"><label>Currency</label><select id="w-cu">${['AED','SAR','PKR','USD'].map(x=>`<option ${c.currency===x?'selected':''}>${x}</option>`).join('')}</select></div>
    <div class="wz-foot"><button class="btn btn-ghost" onclick="wzBack()">← Back</button><button class="btn btn-gold" onclick="wzNext(2)">Continue →</button></div>`;
  if(wzState.step===3) b.innerHTML=`<div class="wz-step">Step 3 of 4 · Industry</div><h2>What's your sector?</h2>
    <div class="ind-grid">${INDUSTRIES.map(x=>`<div class="ind ${c.industry===x?'sel':''}" onclick="pickInd('${x}')">${x}</div>`).join('')}</div>
    <div class="wz-foot"><button class="btn btn-ghost" onclick="wzBack()">← Back</button><button class="btn btn-gold" onclick="wzNext(3)">Continue →</button></div>`;
  if(wzState.step===4) b.innerHTML=`<div class="wz-step">Step 4 of 4 · Focus</div><h2>What keeps you up at night?</h2>
    <div class="fld"><label>Your main worries (optional)</label><textarea id="w-wo" rows="4" placeholder="Cash flow, collecting receivables, hiring…">${esc(c.worries||'')}</textarea></div>
    <div class="wz-foot"><button class="btn btn-ghost" onclick="wzBack()">← Back</button><button class="btn btn-gold" onclick="wzFinish()">Meet ZAKI →</button></div>`;
}
function pickInd(x){ wzState.cfg.industry=x; wz(); }
function wzBack(){ wzState.step--; wz(); }
function wzNext(s){
  const c=wzState.cfg;
  if(s===1){ c.company_name=v('w-co'); c.ceo_name=v('w-nm'); c.first_name=v('w-fn')||(v('w-nm')||'there').split(' ')[0]; }
  if(s===2){ c.country=v('w-ct'); c.currency=v('w-cu'); }
  wzState.step++; wz();
}
function v(id){ const e=document.getElementById(id); return e?e.value.trim():''; }
function wzFinish(){ wzState.cfg.worries=v('w-wo'); S.config=wzState.cfg; saveS(); document.getElementById('wizard').style.display='none'; boot(); }
function resetCfg(){ if(confirm('Reset ZAKI setup?')){ localStorage.removeItem('zaki_v2'); location.reload(); } }

/* ---- APP ---- */
function boot(){
  document.getElementById('app').style.display='block';
  document.getElementById('co-name').textContent=S.config.company_name||'Your company';
  document.getElementById('nav').innerHTML=NAV.map(([k,i,l])=>`<div class="nv" data-k="${k}" onclick="show('${k}')"><span>${i}</span>${l}<span class="bdg" id="bdg-${k}" style="display:none"></span></div>`).join('');
  show('briefing');
}
function show(k){
  document.querySelectorAll('.nv').forEach(n=>n.classList.toggle('active',n.dataset.k===k));
  document.getElementById('ptitle').textContent=(NAV.find(n=>n[0]===k)||[])[2]||'';
  const fns={briefing:pBrief,health:pHealth,chat:pChat,opportunities:pOpp,risks:pRisk,invest:pInvest,intel:pIntel,board:pBoard};
  (fns[k]||(()=>{}))();
}
function setHTML(h){ document.getElementById('content').innerHTML=h; }
function kpis(s){ return `<div class="kpis">
  <div class="kpi"><div class="l">Revenue MTD</div><div class="v gold">${money(s.monthly_revenue)}</div></div>
  <div class="kpi"><div class="l">Cash Runway</div><div class="v ${s.cash_runway<45?'red':s.cash_runway<90?'amber':'green'}">${s.cash_runway} days</div></div>
  <div class="kpi"><div class="l">AR Overdue</div><div class="v ${s.ar_overdue>0?'red':'green'}">${money(s.ar_overdue)}</div></div></div>`; }

/* Panel: Briefing */
async function pBrief(){
  const d=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  setHTML(`<div class="date">${d}</div><div class="greet">Good ${ampm()}, ${esc(S.config.first_name)}.</div>
    <div class="wave" id="wave"></div>
    <div class="ctrls"><button class="btn btn-gold" onclick="runBrief()">▶ Play Briefing</button>
      <button class="btn btn-ghost" onclick="snapshot(true).then(()=>show('briefing'))">⟳ Refresh</button>
      <button class="btn btn-ghost" onclick="copyBrief()">📋 Copy</button></div>
    <div class="card"><div class="stream" id="brief">Press play for your briefing.</div></div>
    <div id="brief-kpis"></div>`);
  document.getElementById('wave').innerHTML=Array.from({length:11}).map((_,i)=>`<i style="animation-delay:${i*.09}s"></i>`).join('');
  try{ const s=await snapshot(); document.getElementById('brief-kpis').innerHTML=kpis(s);}catch(e){}
}
function ampm(){ const h=new Date().getHours(); return h<12?'morning':h<18?'afternoon':'evening'; }
async function runBrief(){
  const el=document.getElementById('brief'); el.textContent=''; el.classList.add('cursor');
  await streamSSE('/briefing/stream',{...S.config},t=>el.textContent=t,full=>{el.classList.remove('cursor'); S._brief=full; if(S.prefs?.voice) playVoice(full);});
}
function copyBrief(){ navigator.clipboard.writeText(document.getElementById('brief').textContent||''); }
async function playVoice(text){ try{ const r=await fetch(API+'/voice',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})}); const b=await r.blob(); new Audio(URL.createObjectURL(b)).play(); }catch(e){} }

/* Panel: Health */
async function pHealth(){
  setHTML(`<div class="card"><div style="text-align:center"><span class="spin"></span> Loading health…</div></div>`);
  try{ const d=await apiGet('/health-score/'+S.config.tenant_id); const sc=d.score; const col=sc>=70?'var(--green)':sc>=45?'var(--amber)':'var(--red)';
    const circ=2*Math.PI*92, off=circ*(1-sc/100);
    setHTML(`<div class="card"><div class="donut-wrap">
      <svg width="210" height="210" viewBox="0 0 210 210"><circle cx="105" cy="105" r="92" fill="none" stroke="var(--panel2)" stroke-width="16"/>
      <circle cx="105" cy="105" r="92" fill="none" stroke="${col}" stroke-width="16" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${off}" transform="rotate(-90 105 105)"/>
      <text x="105" y="100" text-anchor="middle" font-size="48" font-weight="800" fill="${col}">${sc}</text>
      <text x="105" y="128" text-anchor="middle" font-size="13" fill="var(--mut)">${d.interpretation}</text></svg>
      <div class="signals">${Object.entries(d.breakdown).map(([k,vv])=>`<div class="sig"><div style="display:flex;justify-content:space-between"><span style="text-transform:capitalize">${k.replace('_',' ')}</span><b>${vv}</b></div><div class="bar"><i style="width:${vv}%"></i></div></div>`).join('')}</div>
    </div></div>
    <div class="ctrls"><button class="btn btn-gold" onclick="genAnalysis()">Generate Full Assessment</button></div>
    <div class="card" id="assess" style="display:none"><div class="stream" id="assess-s"></div></div>`);
  }catch(e){ setHTML('<div class="card">Could not load health score.</div>'); }
}
async function genAnalysis(){
  document.getElementById('assess').style.display='block'; const el=document.getElementById('assess-s'); el.textContent=''; el.classList.add('cursor');
  await streamSSE('/chat/stream',{...S.config,message:'Generate a complete business health assessment. Assess each of the 4 health signals with specific numbers, root causes, and corrective actions. Direct.',history:[]},t=>el.textContent=t,()=>el.classList.remove('cursor'));
}

/* Panel: Chat */
function pChat(){
  const qas=['What is my top priority today?','Analyse my cash position','How do I collect the overdue AR?','How do I improve our margin?','Should I hire right now?','Write my board summary'];
  setHTML(`<div class="chat"><div class="msgs" id="msgs"></div>
    <div class="qa">${qas.map(q=>`<button onclick="ask(this.textContent)">${q}</button>`).join('')}</div>
    <div class="chat-in"><input id="chat-i" placeholder="Ask ZAKI anything…" onkeydown="if(event.key==='Enter')send()"><button class="btn btn-gold" onclick="send()">Send</button></div></div>`);
  const m=document.getElementById('msgs'); m.innerHTML=(S.chat.hist||[]).map(x=>bubble(x.role,x.content)).join('')||`<div class="m z"><div class="who">ZAKI</div>Good ${ampm()}, ${esc(S.config.first_name)}. Ask me anything about our numbers.</div>`;
  m.scrollTop=m.scrollHeight;
}
function bubble(role,txt){ return `<div class="m ${role==='user'?'u':'z'}">${role==='user'?'':'<div class="who">ZAKI</div>'}${esc(txt)}</div>`; }
function ask(q){ document.getElementById('chat-i').value=q; send(); }
async function send(){
  const inp=document.getElementById('chat-i'); const msg=inp.value.trim(); if(!msg)return; inp.value='';
  const m=document.getElementById('msgs');
  m.insertAdjacentHTML('beforeend',bubble('user',msg));
  m.insertAdjacentHTML('beforeend',`<div class="m z" id="live"><div class="who">ZAKI</div><span class="stream cursor" id="live-s"></span></div>`);
  m.scrollTop=m.scrollHeight;
  const el=document.getElementById('live-s');
  await streamSSE('/chat/stream',{...S.config,message:msg,history:(S.chat.hist||[]).slice(-10)},t=>{el.textContent=t;m.scrollTop=m.scrollHeight;},full=>{
    el.classList.remove('cursor'); document.getElementById('live').removeAttribute('id');
    S.chat.hist=(S.chat.hist||[]).concat([{role:'user',content:msg},{role:'assistant',content:full}]); saveS();
  });
}

/* Panel: Opportunities */
async function pOpp(){
  setHTML('<div class="card"><span class="spin"></span> Finding opportunities…</div>');
  try{ const d=await apiGet('/opportunities/'+S.config.tenant_id); const o=d.opportunities||[];
    setHTML(o.length? o.map(x=>`<div class="opp"><span class="tag">${x.type}</span>
      <div style="font-weight:700;margin-top:8px">${esc(x.title)}</div>
      <div class="impact">${money(x.impact)}</div>
      <div style="font-size:.85rem;color:var(--mut)">Effort: ${x.effort} · Confidence ${x.confidence}%</div>
      <div style="font-size:.88rem;margin-top:8px">${esc(x.action)}</div></div>`).join('')
      : '<div class="card">✓ Looking good — no major opportunities flagged right now.</div>');
  }catch(e){ setHTML('<div class="card">Could not load opportunities.</div>'); }
}

/* Panel: Risks */
async function pRisk(){
  try{ const s=await snapshot(); const a=[];
    if(s.cash_runway<45)a.push(['red','CRITICAL','Cash runway critical',`Only ${s.cash_runway} days of runway left.`]);
    if(s.ar_overdue>20000)a.push(['red','HIGH','Overdue receivables',`${money(s.ar_overdue)} is overdue — chase it now.`]);
    if(s.net_margin<5)a.push(['amber','MEDIUM','Net margin below 5%',`Margin is ${s.net_margin}% — thin.`]);
    if(s.cash_runway>=45&&s.cash_runway<90)a.push(['amber','MEDIUM','Runway under 90 days',`${s.cash_runway} days — build a buffer.`]);
    if(s.payroll_pct>50)a.push(['amber','LOW','High payroll ratio',`Payroll is ${s.payroll_pct}% of revenue.`]);
    const dismissed=S.dismissed||[];
    const live=a.filter(x=>!dismissed.includes(x[2]));
    document.getElementById('bdg-risks').style.display=live.length?'':'none';
    document.getElementById('bdg-risks').textContent=live.length;
    setHTML(live.length? live.map(x=>`<div class="alert"><span class="tag ${x[0]}">${x[1]}</span>
      <div style="font-weight:700;margin-top:8px">${esc(x[2])}</div><div style="font-size:.88rem;color:var(--mut);margin-top:4px">${esc(x[3])}</div>
      <button class="btn btn-ghost" style="margin-top:10px;padding:6px 12px" onclick="dismiss('${esc(x[2])}')">Dismiss</button></div>`).join('')
      : '<div class="card">✓ All signals normal.</div>');
  }catch(e){ setHTML('<div class="card">Could not load risks.</div>'); }
}
function dismiss(t){ S.dismissed=(S.dismissed||[]).concat([t]); saveS(); pRisk(); }

/* Panel: Invest */
async function pInvest(){
  try{ const s=await snapshot(); const investable=Math.max(0,(s.cash||0)-(s.monthly_expenses||0)*3);
    const opts=[['UAE T-Bills','4.5–5.5%','Low'],['UAE Fixed Deposits','4–6%','Low'],['DFM Blue Chips','8–15%','Medium'],['Saudi Tadawul','8–16%','Medium'],['US S&P 500 ETF','10–12%','Medium']];
    setHTML(`<div class="kpis"><div class="kpi"><div class="l">Total Cash</div><div class="v gold">${money(s.cash)}</div></div>
      <div class="kpi"><div class="l">3-Month Reserve</div><div class="v">${money((s.monthly_expenses||0)*3)}</div></div>
      <div class="kpi"><div class="l">Investable</div><div class="v green">${money(investable)}</div></div></div>
      <div class="ctrls"><button class="btn btn-gold" onclick="genInvest(${investable})">Generate Recommendations</button></div>
      <div class="card" id="inv" style="display:none"><div class="stream" id="inv-s"></div></div>
      <div class="invest-grid">${opts.map(o=>`<div class="opp"><div style="font-weight:700">${o[0]}</div><div style="color:var(--gold);font-weight:700;margin:4px 0">${o[1]}</div><span class="tag ${o[2]==='Low'?'':'amber'}">${o[2]} risk</span></div>`).join('')}</div>`);
  }catch(e){ setHTML('<div class="card">Could not load.</div>'); }
}
async function genInvest(amt){ document.getElementById('inv').style.display='block'; const el=document.getElementById('inv-s'); el.textContent=''; el.classList.add('cursor');
  await streamSSE('/chat/stream',{...S.config,message:`I have roughly ${money(amt)} investable. Recommend how to allocate it for a ${S.config.industry} business in ${S.config.country}, balancing safety and return. Specific.`,history:[]},t=>el.textContent=t,()=>el.classList.remove('cursor')); }

/* Panel: Intel */
function pIntel(){
  setHTML(`<div class="card"><h3 style="margin-bottom:10px">GCC</h3><p style="color:var(--mut);font-size:.9rem">UAE GDP +3.5–4% · Dubai CPI ~2.1% · AED/USD peg stable · Oil $70–85.</p></div>
    <div class="card"><h3 style="margin-bottom:10px">Pakistan</h3><p style="color:var(--mut);font-size:.9rem">PKR/USD watch · SBP policy rate elevated · FBR filing calendar active.</p></div>
    <div class="card"><h3 style="margin-bottom:10px">Your sector — ${esc(S.config.industry)}</h3><p style="color:var(--mut);font-size:.9rem">Sector-specific demand and margin trends for ${esc(S.config.country)}.</p></div>
    <div class="ctrls"><button class="btn btn-gold" onclick="askIntel()">Ask ZAKI about current market</button></div>`);
}
function askIntel(){ show('chat'); setTimeout(()=>ask(`What market conditions should I watch right now for a ${S.config.industry} business in ${S.config.country}?`),120); }

/* Panel: Board */
async function pBoard(){
  try{ const s=await snapshot();
    const cells=[['Revenue',money(s.monthly_revenue)],['Expenses',money(s.monthly_expenses)],['Net Profit',money(s.net_profit)],['Net Margin',s.net_margin+'%'],
      ['Cash',money(s.cash)],['Runway',s.cash_runway+' days'],['AR Overdue',money(s.ar_overdue)],['Pipeline',money(s.pipeline)]];
    setHTML(`<div class="kpis" style="grid-template-columns:repeat(4,1fr)">${cells.map(c=>`<div class="kpi"><div class="l">${c[0]}</div><div class="v" style="font-size:1.05rem">${c[1]}</div></div>`).join('')}</div>
      <div class="ctrls"><button class="btn btn-gold" onclick="genBoard()">Generate Board Report</button><button class="btn btn-ghost" onclick="window.print()">🖨 Print</button></div>
      <div class="card" id="brd" style="display:none"><div class="stream" id="brd-s"></div></div>`);
  }catch(e){ setHTML('<div class="card">Could not load.</div>'); }
}
async function genBoard(){ document.getElementById('brd').style.display='block'; const el=document.getElementById('brd-s'); el.textContent=''; el.classList.add('cursor');
  await streamSSE('/chat/stream',{...S.config,message:'Write a professional monthly board report. Sections: Executive Summary, Revenue & Profitability, Cash & Liquidity, Accounts Receivable, Key Risks, Strategic Priorities, Outlook. Board-level language, specific numbers, flowing paragraphs.',history:[]},t=>el.textContent=t,()=>el.classList.remove('cursor')); }

/* init */
if(S.config && S.config.company_name){ document.getElementById('wizard').style.display='none'; boot(); }
else { wzState.cfg.tenant_id=S.config?.tenant_id||urlTid()||1; wz(); }
</script>
