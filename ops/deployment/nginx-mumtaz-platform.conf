# =============================================================
#  Mumtaz Platform — Unified Nginx Configuration
#  Covers: mumtaz.digital, app, zaki, marketplace, admin
#
#  VPS IP: 187.77.128.199
#  Odoo:   127.0.0.1:8069 (same server)
#
#  DEPLOY:
#    sudo cp nginx-mumtaz-platform.conf /etc/nginx/sites-available/mumtaz
#    sudo ln -sf /etc/nginx/sites-available/mumtaz /etc/nginx/sites-enabled/mumtaz
#    sudo rm -f /etc/nginx/sites-enabled/default
#    sudo nginx -t && sudo systemctl reload nginx
#
#  SSL (run after DNS propagates):
#    sudo certbot --nginx \
#      -d mumtaz.digital -d www.mumtaz.digital \
#      -d app.mumtaz.digital \
#      -d zaki.mumtaz.digital \
#      -d marketplace.mumtaz.digital \
#      -d admin.mumtaz.digital
# =============================================================

upstream odoo_app {
    server 127.0.0.1:8069;
    keepalive 32;
}

upstream odoo_longpoll {
    server 127.0.0.1:8072;
    keepalive 8;
}

# ── Shared proxy settings (included in each server block) ────
# (nginx doesn't support include inside server blocks cleanly,
#  so proxy headers are repeated per block — keeps it explicit)

# =============================================================
#  mumtaz.digital — Static Marketing Website
# =============================================================
server {
    listen 80;
    server_name mumtaz.digital www.mumtaz.digital;

    # Redirect www → apex
    if ($host = www.mumtaz.digital) {
        return 301 $scheme://mumtaz.digital$request_uri;
    }

    root /var/www/mumtaz.digital;
    index index.html;

    # Serve static site
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public";
    }

    # Static assets — long cache
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Public API (demo/contact forms from static site → Odoo CRM)
    location /api/mumtaz/ {
        proxy_pass         http://odoo_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

# =============================================================
#  app.mumtaz.digital — Mumtaz Platform Portal (static)
# =============================================================
server {
    listen 80;
    server_name app.mumtaz.digital;

    root /var/www/app.mumtaz.digital;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Proxy ZAKI API calls — same origin, no CORS or SSL issues
    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Proxy Odoo JSON-RPC — enables live module sync from portal
    location /odoo/ {
        proxy_pass         http://127.0.0.1:8069/;
        proxy_set_header   Host              erp.mumtaz.digital;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location ~* \.(css|js|png|jpg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# =============================================================
#  erp.mumtaz.digital — Odoo ERP (moved from app.)
# =============================================================
server {
    listen 80;
    server_name erp.mumtaz.digital;

    client_max_body_size 100m;
    location ~* /web/static/ {
        proxy_pass          http://odoo_app;
        proxy_set_header    Host $host;
        proxy_cache_valid   200 90d;
        expires             90d;
        add_header          Cache-Control "public, immutable";
    }

    # Longpolling / websocket
    location /websocket {
        proxy_pass          http://odoo_longpoll;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  720s;
    }

    location /longpolling {
        proxy_pass         http://odoo_longpoll;
        proxy_set_header   Host $host;
        proxy_read_timeout 720s;
    }

    # Root redirect → ERP backend (avoids Odoo website module homepage)
    location = / {
        return 302 /web;
    }

    # Everything else → Odoo
    location / {
        proxy_pass          http://odoo_app;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout  720s;
        proxy_redirect      off;
    }
}

# =============================================================
#  zaki.mumtaz.digital — ZAKI AI CFO (standalone)
# =============================================================
server {
    listen 80;
    server_name zaki.mumtaz.digital;

    client_max_body_size 50m;

    # Serve standalone ZAKI CFO app (no Docker needed)
    root /var/www/zaki.mumtaz.digital;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "SAMEORIGIN";

        # Allow Anthropic + ElevenLabs API calls from browser
        add_header Access-Control-Allow-Origin "*";
    }

    # Static assets — cache fonts/images
    location ~* \.(woff2?|ttf|eot|svg|png|jpg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ZAKI FastAPI backend
    location /api/ {
        proxy_pass          http://127.0.0.1:8001;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
    }

}

# =============================================================
#  marketplace.mumtaz.digital — B2B Marketplace (static)
# =============================================================
server {
    listen 80;
    server_name marketplace.mumtaz.digital;

    root /var/www/marketplace.mumtaz.digital;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location ~* \.(css|js|png|jpg|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Marketplace API calls → ZAKI server
    location /api/ {
        proxy_pass          http://127.0.0.1:8001;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
    }
}

# =============================================================
#  admin.mumtaz.digital — Control Plane (restricted)
# =============================================================
server {
    listen 80;
    server_name admin.mumtaz.digital;

    client_max_body_size 100m;

    # SECURITY: Uncomment and set your office/VPN IP to restrict access
    # allow 1.2.3.4/32;
    # deny all;

    # Block customer-facing portal routes on the admin domain
    location ~ ^/(app|zaki|marketplace|mumtaz/portal/erp|mumtaz/portal/zaki|mumtaz/portal/marketplace|mumtaz/onboard) {
        return 403;
    }

    # Redirect root to Odoo backend
    location = / {
        return 302 /web;
    }

    # Odoo static assets
    location ~* /web/static/ {
        proxy_pass        http://odoo_app;
        proxy_set_header  Host $host;
        expires           90d;
        add_header        Cache-Control "public, immutable";
    }

    location /websocket {
        proxy_pass          http://odoo_longpoll;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  720s;
    }

    location /longpolling {
        proxy_pass         http://odoo_longpoll;
        proxy_set_header   Host $host;
        proxy_read_timeout 720s;
    }

    location / {
        proxy_pass          http://odoo_app;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout  720s;
        proxy_redirect      off;
    }
}
