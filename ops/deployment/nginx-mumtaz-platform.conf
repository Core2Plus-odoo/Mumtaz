# =============================================================
#  Mumtaz Platform — Unified Nginx Configuration
#  Covers: mumtaz.digital, app, zaki, marketplace, admin, erp
#
#  DEPLOY:
#    sudo cp nginx-mumtaz-platform.conf /etc/nginx/sites-available/mumtaz
#    sudo ln -sf /etc/nginx/sites-available/mumtaz /etc/nginx/sites-enabled/mumtaz
#    sudo rm -f /etc/nginx/sites-enabled/default
#    sudo nginx -t && sudo systemctl reload nginx
#
#  SSL (run after DNS propagates):
#    sudo certbot --nginx \
#      -d mumtaz.digital -d www.mumtaz.digital \
#      -d app.mumtaz.digital \
#      -d zaki.mumtaz.digital \
#      -d marketplace.mumtaz.digital \
#      -d admin.mumtaz.digital \
#      -d erp.mumtaz.digital
# =============================================================

# ── Rate limiting zones ───────────────────────────────────────────────
# auth_zone:    5 req/min  — login, signup, password reset
# api_zone:     60 req/min — general API calls
# general_zone: 120 req/min — static pages
limit_req_zone $binary_remote_addr zone=auth_zone:10m    rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_zone:10m     rate=60r/m;
limit_req_zone $binary_remote_addr zone=general_zone:10m rate=120r/m;

# ── Upstreams ─────────────────────────────────────────────────────────
upstream odoo_app {
    server 127.0.0.1:8069;
    keepalive 32;
}

upstream odoo_longpoll {
    server 127.0.0.1:8072;
    keepalive 8;
}

# ── HTTP → HTTPS redirect (all vhosts) ───────────────────────────────
# Certbot will convert these to HTTPS blocks when SSL certs are issued.
# Until then, traffic serves over HTTP — run certbot immediately after DNS.
server {
    listen 80 default_server;
    server_name _;
    # Certbot will replace this with a proper redirect once certs exist
    # return 301 https://$host$request_uri;
}

# =============================================================
#  mumtaz.digital — Static Marketing Website
# =============================================================
server {
    listen 80;
    server_name mumtaz.digital www.mumtaz.digital;

    # Redirect www → apex
    if ($host = www.mumtaz.digital) {
        return 301 $scheme://mumtaz.digital$request_uri;
    }

    root /var/www/mumtaz.digital;
    index index.html;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"                         always;
    add_header X-Content-Type-Options    "nosniff"                            always;
    add_header X-XSS-Protection          "1; mode=block"                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self';" always;

    limit_req zone=general_zone burst=20 nodelay;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control         "public"                             always;
        add_header X-Frame-Options       "SAMEORIGIN"                         always;
        add_header X-Content-Type-Options "nosniff"                           always;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control         "public, immutable"                  always;
    }

    # Public API (demo/contact forms → Odoo CRM)
    location /api/mumtaz/ {
        limit_req zone=api_zone burst=10 nodelay;
        proxy_pass         http://odoo_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

# =============================================================
#  app.mumtaz.digital — Mumtaz Platform Portal (static)
# =============================================================
server {
    listen 80;
    server_name app.mumtaz.digital;

    root /var/www/app.mumtaz.digital;
    index index.html;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"                         always;
    add_header X-Content-Type-Options    "nosniff"                            always;
    add_header X-XSS-Protection          "1; mode=block"                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    limit_req zone=general_zone burst=20 nodelay;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control         "no-cache"                           always;
        add_header X-Frame-Options       "SAMEORIGIN"                         always;
        add_header X-Content-Type-Options "nosniff"                           always;
    }

    # Auth endpoints — tight rate limiting
    location ~ ^/api/v1/auth/(login|signup|register|forgot|reset) {
        limit_req zone=auth_zone burst=3 nodelay;
        proxy_pass         http://127.0.0.1:8002;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Platform API
    location /api/ {
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass         http://127.0.0.1:8002;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Odoo JSON-RPC — enables live module sync from portal
    location /odoo/ {
        limit_req zone=api_zone burst=10 nodelay;
        proxy_pass         http://127.0.0.1:8069/;
        proxy_set_header   Host              erp.mumtaz.digital;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location ~* \.(css|js|png|jpg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
    }
}

# =============================================================
#  erp.mumtaz.digital — Odoo ERP
# =============================================================
server {
    listen 80;
    server_name erp.mumtaz.digital;

    client_max_body_size 100m;

    # Security headers
    add_header X-Content-Type-Options "nosniff"                           always;
    add_header Referrer-Policy        "same-origin"                       always;

    location ~* /web/static/ {
        proxy_pass          http://odoo_app;
        proxy_set_header    Host $host;
        proxy_cache_valid   200 90d;
        expires             90d;
        add_header          Cache-Control "public, immutable" always;
    }

    location /websocket {
        proxy_pass          http://odoo_longpoll;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  720s;
    }

    location /longpolling {
        proxy_pass         http://odoo_longpoll;
        proxy_set_header   Host $host;
        proxy_read_timeout 720s;
    }

    location = / {
        return 302 /web;
    }

    location / {
        limit_req zone=general_zone burst=30 nodelay;
        proxy_pass          http://odoo_app;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout  720s;
        proxy_redirect      off;
    }
}

# =============================================================
#  zaki.mumtaz.digital — ZAKI AI CFO (standalone)
# =============================================================
server {
    listen 80;
    server_name zaki.mumtaz.digital;

    client_max_body_size 50m;

    root /var/www/zaki.mumtaz.digital;
    index index.html;

    # Security headers — NOTE: CORS is handled by the Express app; do NOT add
    # Access-Control-Allow-Origin here as it duplicates and can conflict.
    add_header X-Frame-Options           "SAMEORIGIN"                         always;
    add_header X-Content-Type-Options    "nosniff"                            always;
    add_header X-XSS-Protection          "1; mode=block"                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    limit_req zone=general_zone burst=20 nodelay;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control         "no-cache"                           always;
        add_header X-Frame-Options       "SAMEORIGIN"                         always;
        add_header X-Content-Type-Options "nosniff"                           always;
    }

    location ~* \.(woff2?|ttf|eot|svg|png|jpg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
    }

    # Auth endpoints — tight rate limiting
    location ~ ^/auth/(login|register) {
        limit_req zone=auth_zone burst=3 nodelay;
        proxy_pass          http://127.0.0.1:8002;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
    }

    # AI chat (SSE streaming) — generous timeout, disable buffering
    location /api/chat {
        limit_req zone=api_zone burst=5 nodelay;
        proxy_pass          http://127.0.0.1:3000;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  300s;
        proxy_buffering     off;
        add_header          X-Accel-Buffering "no" always;
    }

    location /api/ {
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass          http://127.0.0.1:3000;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
    }
}

