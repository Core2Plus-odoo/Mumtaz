# =============================================================
#  admin.mumtaz.digital — Control Plane (restricted access)
# =============================================================
server {
    listen 80;
    server_name admin.mumtaz.digital;

    client_max_body_size 100m;

    # SECURITY: Restrict to office/VPN IP — UNCOMMENT AND SET before going live
    # Replace 0.0.0.0/0 with your office IP range (e.g. 1.2.3.4/32)
    # allow 1.2.3.4/32;
    # deny all;

    # Security headers
    add_header X-Frame-Options           "DENY"                               always;
    add_header X-Content-Type-Options    "nosniff"                            always;
    add_header X-XSS-Protection          "1; mode=block"                      always;
    add_header Referrer-Policy           "no-referrer"                        always;
    add_header Cache-Control             "no-store"                           always;

    limit_req zone=general_zone burst=10 nodelay;

    # Block all customer-facing portal routes on admin domain
    location ~ ^/(app|zaki|marketplace|mumtaz/portal) {
        return 403;
    }

    location = / {
        return 302 /web;
    }

    location ~* /web/static/ {
        proxy_pass        http://odoo_app;
        proxy_set_header  Host $host;
        expires           90d;
        add_header        Cache-Control "public, immutable" always;
    }

    location /websocket {
        proxy_pass          http://odoo_longpoll;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  720s;
    }

    location /longpolling {
        proxy_pass         http://odoo_longpoll;
        proxy_set_header   Host $host;
        proxy_read_timeout 720s;
    }

    location / {
        proxy_pass          http://odoo_app;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout  720s;
        proxy_redirect      off;
    }
}
