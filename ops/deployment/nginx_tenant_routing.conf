# ============================================================
# Mumtaz SaaS — Nginx Tenant Routing Configuration
# ============================================================
#
# Architecture:
#   Each tenant maps to an isolated Odoo database.
#   Database naming convention: mumtaz_<tenant_code>
#   Subdomain convention:        <tenant_code>.mumtaz.io
#
# Odoo's `dbfilter` setting in odoo.conf:
#   dbfilter = ^mumtaz_%d$
#
# The %d placeholder in Odoo's dbfilter is replaced by the first
# segment of the Host header (i.e. the subdomain).
# Example: Host: acme.mumtaz.io  →  dbfilter matches mumtaz_acme
#
# ============================================================

upstream odoo_backend {
    server 127.0.0.1:8069;
    keepalive 32;
}

upstream odoo_longpoll {
    server 127.0.0.1:8072;
    keepalive 32;
}

# ── Master / admin control plane ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name admin.mumtaz.io;

    ssl_certificate     /etc/letsencrypt/live/mumtaz.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mumtaz.io/privkey.pem;

    # Restrict access to internal IPs for the master admin interface
    # allow 10.0.0.0/8;
    # deny all;

    location / {
        proxy_pass         http://odoo_backend;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout 720s;
    }

    location /longpolling {
        proxy_pass http://odoo_longpoll;
        proxy_set_header Host $host;
    }

    location ~* /web/static/ {
        proxy_cache_valid 200 90d;
        proxy_buffering   on;
        proxy_pass        http://odoo_backend;
        proxy_set_header  Host $host;
        expires           90d;
    }
}

# ── Tenant wildcard routing ───────────────────────────────────────────────
# Matches any <subdomain>.mumtaz.io and forwards with the Host header intact.
# Odoo's dbfilter extracts the subdomain and resolves the correct database.
server {
    listen 443 ssl http2;
    server_name ~^(?P<tenant>[a-z0-9-]+)\.mumtaz\.io$;

    ssl_certificate     /etc/letsencrypt/live/mumtaz.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mumtaz.io/privkey.pem;

    client_max_body_size 100m;

    location / {
        proxy_pass          http://odoo_backend;
        proxy_set_header    Host            $host;
        proxy_set_header    X-Real-IP       $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto https;
        proxy_read_timeout  720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout  720s;
        proxy_redirect      off;
    }

    location /longpolling {
        proxy_pass http://odoo_longpoll;
        proxy_set_header Host $host;
    }

    location ~* /web/static/ {
        proxy_cache_valid 200 90d;
        proxy_buffering   on;
        proxy_pass        http://odoo_backend;
        proxy_set_header  Host $host;
        expires           90d;
    }
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
server {
    listen 80;
    server_name *.mumtaz.io mumtaz.io;
    return 301 https://$host$request_uri;
}
