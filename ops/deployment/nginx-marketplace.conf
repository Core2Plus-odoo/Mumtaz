# =============================================================
#  marketplace.mumtaz.digital — standalone vhost
# =============================================================
#  The TLS cert is already issued; this file attaches it and
#  serves the static marketplace. It is intentionally SEPARATE
#  from the main `mumtaz` site file so it does not disturb the
#  certbot-managed 443 blocks for app / erp / zaki.
#
#  Install on the VPS:
#    sudo cp ops/deployment/nginx-marketplace.conf \
#            /etc/nginx/sites-available/marketplace.mumtaz.digital
#    sudo ln -sf /etc/nginx/sites-available/marketplace.mumtaz.digital \
#                /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
# =============================================================

# HTTP → HTTPS
server {
    listen 80;
    server_name marketplace.mumtaz.digital;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name marketplace.mumtaz.digital;

    ssl_certificate     /etc/letsencrypt/live/marketplace.mumtaz.digital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marketplace.mumtaz.digital/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/marketplace.mumtaz.digital;
    index index.html;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options "nosniff"                          always;
    add_header X-XSS-Protection       "1; mode=block"                    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
    }

    # Marketplace / ZAKI API → FastAPI on 8002
    location /api/ {
        proxy_pass         http://127.0.0.1:8002;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
