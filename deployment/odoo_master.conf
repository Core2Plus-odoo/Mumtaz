[options]
; ── Mumtaz Master Instance (Control Plane) ──────────────────────────────
; This is the MASTER Odoo instance that runs the mumtaz_tenant_manager
; module.  It does NOT serve tenant application workloads.
; Tenant workloads run in isolated databases managed by this instance.

; Database
db_host     = localhost
db_port     = 5432
db_user     = odoo
db_password = <CHANGE_ME>

; dbfilter restricts which databases this instance can serve.
; The master instance serves the master control-plane database only.
; To serve tenant databases, deploy a separate Odoo worker instance
; with: dbfilter = ^mumtaz_%d$
dbfilter    = ^mumtaz_master$

; Server
http_port   = 8069
longpolling_port = 8072
workers     = 4

; Addons
addons_path = /opt/odoo/odoo/addons,/opt/custom_addons/Mumtaz

; Logging
logfile     = /var/log/odoo/odoo-master.log
log_level   = info

; Security — disable public DB manager in production
list_db     = False

; Limits
limit_memory_hard  = 2684354560
limit_memory_soft  = 2147483648
limit_request      = 8192
limit_time_cpu     = 60
limit_time_real    = 120
