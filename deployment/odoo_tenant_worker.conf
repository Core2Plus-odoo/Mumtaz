[options]
; ── Mumtaz Tenant Worker Instance ────────────────────────────────────────
; This Odoo instance serves TENANT databases.
; It runs on a different port from the master instance (or the same port
; behind a load balancer that routes by Host header).
;
; dbfilter uses Odoo's %d placeholder, which is substituted with the first
; segment of the incoming Host header (i.e. the subdomain).
;
; Example:
;   Host: acme.mumtaz.io   → dbfilter resolves to ^mumtaz_acme$
;   Host: beta.mumtaz.io   → dbfilter resolves to ^mumtaz_beta$

db_host     = localhost
db_port     = 5432
db_user     = odoo
db_password = <CHANGE_ME>

; Wildcard dbfilter — maps subdomain to tenant database.
; IMPORTANT: The pattern must match mumtaz_<subdomain> exactly.
dbfilter    = ^mumtaz_%d$

; Server
http_port   = 8069
longpolling_port = 8072
workers     = 8

; Addons — include the Mumtaz custom addons path
addons_path = /opt/odoo/odoo/addons,/opt/custom_addons/Mumtaz

; Logging
logfile     = /var/log/odoo/odoo-tenant.log
log_level   = info

; Disable DB manager — tenants are provisioned via mumtaz_tenant_manager
list_db     = False

; Limits
limit_memory_hard  = 2684354560
limit_memory_soft  = 2147483648
limit_request      = 8192
limit_time_cpu     = 60
limit_time_real    = 120
