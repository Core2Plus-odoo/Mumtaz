<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C2P · Delivery Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
    --charcoal:#1A1D21;--ink:#0C111B;--ink-2:#141a24;--teal:#00B3B3;--deep-teal:#008080;
    --paper:#F6F7F9;--surface:#fff;--line:#ECEDF0;--line-soft:#F3F4F6;
    --muted:#5B6470;--muted-2:#9aa1ac;--green:#1f9d6b;--amber:#c98a1e;--rust:#c2492f;--purple:#534AB7;--blue:#2f6fc2;
    --code-bg:#0f1722;--code-line:#1e2a38;--code-text:#d7dde2;--code-gutter:#5b6670;
    --shadow:0 1px 2px rgba(16,24,40,.04),0 1px 3px rgba(16,24,40,.06);
    --shadow-lg:0 16px 48px rgba(16,24,40,.14);
    --display:'Inter',system-ui,sans-serif;--body:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;
    --sb:256px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);color:var(--charcoal);background:var(--paper);-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh}
  ::selection{background:rgba(0,179,179,.18)}
  a{color:inherit}

  /* ---------- app shell ---------- */
  .app{display:grid;grid-template-columns:var(--sb) 1fr;min-height:100vh}
  .sidebar{background:#FBFBFC;color:var(--charcoal);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;border-right:1px solid var(--line)}
  .sb-brand{padding:20px 18px 6px}
  .sb-logo{height:30px;width:auto;display:block}
  .sb-strap{padding:0 18px 16px;display:flex;flex-direction:column;gap:1px}
  .sb-strap b{font-family:var(--body);font-weight:600;font-size:13px;color:var(--charcoal)}
  .sb-strap span{font-size:10px;letter-spacing:.2px;color:var(--deep-teal);font-weight:500}

  .sb-eng{margin:6px 12px 10px;padding:11px 12px;background:var(--surface);border:1px solid var(--line);border-radius:11px}
  .sb-eng .lbl{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted-2);margin-bottom:6px}
  .sb-eng select{width:100%;font-family:var(--body);font-size:12.5px;color:var(--charcoal);background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:8px 9px;outline:none}
  .sb-eng select option{color:#1a1a1a}
  .sb-eng .row{display:flex;gap:7px;margin-top:8px}
  .sb-eng .db{font-family:var(--mono);font-size:10px;color:var(--deep-teal);background:rgba(0,179,179,.08);border:1px solid rgba(0,179,179,.22);padding:3px 7px;border-radius:6px}
  .sb-eng .nodb{font-size:10px;color:var(--muted-2)}

  .nav{flex:1;overflow-y:auto;padding:6px 10px}
  .nav-sec{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted-2);padding:14px 10px 6px}
  .nav-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:none;color:var(--muted);font-family:var(--body);font-weight:500;font-size:13.5px;padding:8px 11px;border-radius:8px;cursor:pointer;transition:background .12s,color .12s;position:relative}
  .nav-item:hover{background:#F1F2F4;color:var(--charcoal)}
  .nav-item.active{background:rgba(0,179,179,.1);color:var(--deep-teal);font-weight:600}
  .nav-item.active::before{content:"";position:absolute;left:0;top:7px;bottom:7px;width:3px;border-radius:0 3px 3px 0;background:var(--teal)}
  .ni-ico{width:18px;text-align:center;flex:none;opacity:.85}
  .ni-name{flex:1}
  .ni-st{width:18px;height:18px;border-radius:50%;border:2px solid var(--line);flex:none;display:grid;place-items:center;font-size:10px;color:#fff}
  .ni-st.done{background:var(--green);border-color:var(--green)}
  .ni-st.running{border-color:var(--teal);border-top-color:transparent;animation:spin .7s linear infinite}
  .ni-count{font-family:var(--mono);font-size:10px;color:var(--muted);background:#EEF0F2;padding:1px 6px;border-radius:20px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .sb-foot{padding:11px 14px;border-top:1px solid var(--line)}
  .api-chip{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10.5px;color:var(--muted);cursor:pointer}
  .api-dot{width:8px;height:8px;border-radius:50%;background:var(--muted-2);flex:none}
  .api-dot.ok{background:var(--green);box-shadow:0 0 0 3px rgba(31,157,107,.15)}.api-dot.bad{background:var(--rust);box-shadow:0 0 0 3px rgba(194,73,47,.15)}
  .api-input{font-family:var(--mono);font-size:10.5px;background:var(--surface);border:1px solid var(--line);color:var(--charcoal);border-radius:6px;padding:4px 7px;width:100%;outline:none}

  /* ---------- main ---------- */
  .main{display:flex;flex-direction:column;min-width:0}
  .scrim{display:none}   /* mobile-only overlay; never an in-flow grid cell on desktop */
  .topbar{display:flex;align-items:center;gap:14px;padding:14px 26px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;flex-wrap:wrap}
  .tb-title{font-family:var(--display);font-weight:600;font-size:17px;color:var(--charcoal);letter-spacing:-.3px}
  .tb-sub{font-family:var(--mono);font-size:11px;color:var(--muted-2)}
  .tb-prog{display:flex;align-items:center;gap:9px;margin-left:6px}
  .tb-bar{width:130px;height:6px;border-radius:6px;background:var(--line);overflow:hidden}
  .tb-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--deep-teal));border-radius:6px;transition:width .4s ease}
  .tb-actions{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .menu-btn{display:none}

  .content{padding:22px 26px 60px;max-width:1120px;width:100%}
  select,input[type=text],textarea{font-family:var(--body);font-size:13.5px;color:var(--charcoal);background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:9px 11px;outline:none;transition:border-color .15s,box-shadow .15s}
  select:focus,input:focus,textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,179,179,.12)}
  textarea{font-size:13px;font-family:var(--body);line-height:1.6;resize:vertical;width:100%}
  .btn{font-family:var(--body);font-weight:600;font-size:12.5px;border-radius:8px;padding:9px 14px;cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--charcoal);display:inline-flex;align-items:center;gap:7px;transition:border-color .12s,background .12s,box-shadow .12s,transform .06s;box-shadow:0 1px 1px rgba(16,24,40,.03)}
  .btn:hover{background:#F7F8FA;border-color:#D9DBE0}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--teal);color:#fff;border:1px solid var(--teal);box-shadow:0 1px 2px rgba(0,179,179,.25)}
  .btn.primary:hover{background:var(--deep-teal);border-color:var(--deep-teal)}
  .btn.dark{background:var(--charcoal);color:#fff;border-color:var(--charcoal)}
  .btn.dark:hover{background:#000}
  .btn.ghost{background:transparent}
  .btn.sm{padding:6px 10px;font-size:11.5px}
  .ap-log{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12.5px;line-height:1.5;max-height:340px;overflow-y:auto;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .ap-row{padding:3px 0;color:var(--charcoal);border-bottom:1px dashed transparent}
  .ap-row.head{font-weight:700;color:var(--deep-teal)}
  .ap-row.ok{color:var(--charcoal)}
  .ap-row.done{color:#1f9d6b;font-weight:600}
  .ap-row.warn{color:#b9770a}
  .ap-row.bad{color:var(--rust)}
  .ap-row.muted{color:var(--muted-2);font-style:italic}
  .ap-row a{color:var(--deep-teal);text-decoration:underline}
  .doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .doc-card{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:12px;padding:14px;background:#fff}
  .doc-card.on{border-color:var(--deep-teal);background:linear-gradient(0deg,rgba(0,179,179,.03),rgba(0,179,179,.03)),#fff}
  .doc-ic{width:38px;height:38px;border-radius:9px;background:var(--paper);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--deep-teal);flex:none}
  .doc-meta{flex:1;min-width:0}
  .doc-name{font-weight:600;font-size:13.5px}
  .doc-sub{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .doc-actions{display:flex;gap:6px;flex:none}
  .doc-frame{width:100%;height:70vh;border:1px solid var(--line);border-radius:10px;background:#fff;box-shadow:var(--shadow-xs)}
  .doc-refine{display:flex;gap:8px;margin-bottom:12px}
  .doc-refine input{flex:1;padding:9px 12px;border:1px solid var(--line);border-radius:9px;font:inherit;font-size:13px}
  .rfi-card{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;background:#fff}
  .rfi-card.answered{background:var(--paper);border-style:dashed}
  .rfi-top{display:flex;gap:10px;justify-content:space-between;align-items:flex-start}
  .rfi-q{font-weight:600;font-size:13.5px;line-height:1.45}
  .rfi-why{font-size:12px;color:var(--muted);margin-top:6px}
  .rfi-input{margin-top:10px;display:flex;gap:8px;align-items:flex-start}
  .rfi-input textarea{flex:1;resize:vertical;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font:inherit;font-size:12.5px}
  .rfi-answer{margin-top:9px;font-size:12.5px;color:var(--charcoal);background:rgba(0,179,179,.06);border-left:3px solid var(--deep-teal);padding:8px 11px;border-radius:6px}
  .ba-area{border:1px solid var(--line);border-radius:9px;padding:8px 12px;margin-bottom:7px;background:#fff}
  .ba-area summary{cursor:pointer;font-size:13px}
  .ba-area ul{margin-top:7px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.copied{border-color:var(--green);color:var(--green)}

  /* panel */
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .panel-head{padding:18px 20px;border-bottom:1px solid var(--line-soft);display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
  .panel-head h2{font-family:var(--display);font-weight:600;font-size:18px;color:var(--charcoal);letter-spacing:-.3px}
  .panel-head p{font-size:13px;color:var(--muted);margin-top:3px;max-width:560px}
  .panel-head .run-area{margin-left:auto;display:flex;align-items:center;gap:10px}
  .persona{display:inline-flex;align-items:center;gap:9px}
  .pavatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--deep-teal));color:#04201f;font-family:var(--display);font-weight:700;font-size:11px;display:grid;place-items:center;flex:none}
  .pname{font-family:var(--display);font-weight:600;font-size:12.5px;color:var(--charcoal);line-height:1.1}
  .prole{font-family:var(--mono);font-size:9.5px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted-2)}
  .set-h{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted-2);margin:4px 0 11px;padding-bottom:6px;border-bottom:1px solid var(--line-soft)}
  .logo-slot{border-radius:10px;padding:16px;display:flex;align-items:center;justify-content:center;min-height:74px}
  input[type=color]{border:1px solid var(--line);border-radius:9px;background:var(--surface);cursor:pointer}
  .panel-body{padding:20px}
  .input-block{margin-bottom:18px}
  .input-block label{display:block;font-size:12.5px;font-weight:600;margin-bottom:7px}
  .input-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .hint{font-size:12px;color:var(--muted-2);font-style:italic;margin-top:4px}
  .dropzone{border:1.5px dashed var(--line);border-radius:10px;padding:11px 13px;font-size:12.5px;color:var(--muted);background:var(--paper);margin-top:9px;transition:border-color .15s,background .15s}
  .dropzone.drag{border-color:var(--teal);background:rgba(0,179,179,.06)}
  .dz-cta{display:inline-flex;align-items:center;gap:6px}
  .linkbtn{background:none;border:none;color:var(--deep-teal);font-weight:600;cursor:pointer;font-size:12.5px;padding:0;text-decoration:underline}
  .dz-files{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .dz-file{font-family:var(--mono);font-size:10.5px;background:rgba(0,179,179,.1);border:1px solid rgba(0,179,179,.25);color:var(--deep-teal);padding:3px 8px;border-radius:6px;display:inline-flex;gap:6px;align-items:center}

  .out{animation:rise .3s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){.out,.view{animation:none}}
  .view{animation:rise .25s ease both}
  .placeholder{color:var(--muted-2);font-size:13.5px;text-align:center;padding:40px 0}

  .badge{font-family:var(--display);font-weight:700;font-size:12px;letter-spacing:.3px;text-transform:uppercase;color:#fff;padding:6px 12px;border-radius:8px}
  .b-pursue,.b-done{background:var(--green)}.b-nurture{background:var(--amber)}.b-pass{background:var(--rust)}
  .score{font-family:var(--mono);font-weight:600;font-size:13px;border:1px solid var(--line);border-radius:8px;padding:6px 11px;color:var(--charcoal)}
  .score b{color:var(--deep-teal)}

  .sec{margin-bottom:16px}
  .sec h3{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted-2);margin-bottom:9px}
  .card{background:var(--paper);border:1px solid var(--line-soft);border-radius:11px;padding:14px 16px;font-size:13.5px;line-height:1.6}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{font-family:var(--mono);font-size:11.5px;background:rgba(0,179,179,.08);border:1px solid rgba(0,179,179,.25);color:var(--deep-teal);padding:5px 9px;border-radius:7px}
  ul.clean{list-style:none}
  ul.clean li{font-size:13px;padding-left:16px;position:relative;margin-bottom:6px;line-height:1.5}
  ul.clean li::before{content:"";position:absolute;left:0;top:8px;width:6px;height:6px;border-radius:2px;background:var(--teal)}
  ul.warn li::before{background:var(--amber)}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:640px){.two-col,.input-grid{grid-template-columns:1fr}}

  .req-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line-soft);border-radius:9px;margin-bottom:7px}
  .req-row .rq-text{flex:1;font-size:13px}
  .pri{font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 7px;border-radius:5px;letter-spacing:.3px}
  .pri-High{background:rgba(194,73,47,.12);color:var(--rust)}.pri-Medium{background:rgba(201,138,30,.14);color:var(--amber)}.pri-Low{background:rgba(108,116,112,.12);color:var(--muted)}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--line-soft)}
  th{font-family:var(--mono);font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted-2)}
  td.num,th.num{text-align:right;font-family:var(--mono)}
  tr.total td{border-top:2px solid var(--line);border-bottom:none;font-weight:600}

  .callout{background:linear-gradient(180deg,rgba(0,179,179,.05),rgba(0,179,179,.02));border:1px solid rgba(0,179,179,.22);border-radius:11px;padding:13px 16px;font-size:13.5px}
  .callout b{color:var(--deep-teal)}

  /* ---------- overview ---------- */
  .ov-hero{display:grid;grid-template-columns:auto 1fr;gap:22px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:22px 24px;margin-bottom:18px}
  @media(max-width:640px){.ov-hero{grid-template-columns:1fr;text-align:center;justify-items:center}}
  .ring{--p:0;width:104px;height:104px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--teal) calc(var(--p)*1%),var(--line) 0);position:relative}
  .ring::before{content:"";position:absolute;inset:9px;border-radius:50%;background:var(--surface)}
  .ring .rv{position:relative;text-align:center}
  .ring .rv b{font-family:var(--display);font-size:24px;color:var(--charcoal);display:block;line-height:1}
  .ring .rv span{font-family:var(--mono);font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted-2)}
  .ov-hero .co{font-family:var(--display);font-weight:600;font-size:22px;color:var(--charcoal);letter-spacing:-.4px}
  .ov-hero .meta{font-family:var(--mono);font-size:11.5px;color:var(--muted-2);margin-top:4px;display:flex;gap:10px;flex-wrap:wrap}
  .ov-steps{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap}
  .ov-step{flex:1;min-width:92px;border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:var(--paper)}
  .ov-step .n{font-family:var(--display);font-weight:600;font-size:12.5px}
  .ov-step .s{font-family:var(--mono);font-size:9.5px;letter-spacing:.4px;text-transform:uppercase;margin-top:3px}
  .ov-step.done{border-color:rgba(31,157,107,.4);background:rgba(31,157,107,.05)} .ov-step.done .s{color:var(--green)}
  .ov-step.idle .s{color:var(--muted-2)}

  .kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:13px;margin-bottom:18px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:15px 16px;box-shadow:var(--shadow)}
  .kpi .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.7px;text-transform:uppercase;color:var(--muted-2)}
  .kpi .v{font-family:var(--display);font-weight:600;font-size:22px;color:var(--charcoal);margin-top:7px;line-height:1.1}
  .kpi .d{font-size:11.5px;color:var(--muted);margin-top:4px}
  .kpi.accent{border-left:3px solid var(--teal)}

  .odoo-rec{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1px solid var(--line-soft);border-radius:10px;margin-bottom:8px;background:var(--paper)}
  .odoo-rec .ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:none;color:#fff;font-size:13px}
  .odoo-rec .nm{flex:1;font-size:13px}
  .odoo-rec .id{font-family:var(--mono);font-size:11px;color:var(--deep-teal);background:rgba(0,179,179,.1);padding:3px 8px;border-radius:6px}
  .odoo-rec .pend{font-family:var(--mono);font-size:10.5px;color:var(--muted-2)}

  /* verdict ladder (functional) */
  .verdict-top{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:14px}
  .v-badge{font-family:var(--display);font-weight:700;font-size:12px;text-transform:uppercase;color:#fff;padding:7px 13px;border-radius:8px;flex:none}
  .ladder{display:flex;gap:7px;margin:12px 0 16px}
  .rung{flex:1;border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:var(--paper)}
  .rung .rt{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted-2)}
  .rung .rn{font-size:11.5px;font-weight:600;color:var(--muted);margin-top:2px}
  .rung.on .rn{color:#fff}.rung.on .rt{color:rgba(255,255,255,.7)}
  .option{border:1px solid var(--line);border-radius:11px;padding:13px 15px;margin-bottom:9px}
  .option.rec{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,179,179,.07)}
  .opt-h{display:flex;align-items:center;gap:9px;margin-bottom:7px;flex-wrap:wrap}
  .opt-t{font-family:var(--display);font-weight:700;font-size:12px;width:22px;height:22px;border-radius:6px;background:var(--paper);display:grid;place-items:center;border:1px solid var(--line)}
  .eff{font-family:var(--mono);font-size:10px;padding:3px 7px;border-radius:5px}
  .eff-Low{background:rgba(31,157,107,.12);color:var(--green)}.eff-Medium{background:rgba(201,138,30,.14);color:var(--amber)}.eff-High{background:rgba(194,73,47,.12);color:var(--rust)}
  .recflag{margin-left:auto;font-family:var(--mono);font-size:9.5px;font-weight:600;text-transform:uppercase;color:var(--deep-teal);background:rgba(0,179,179,.1);padding:3px 7px;border-radius:5px}

  /* developer file viewer */
  .wb{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:8px}
  .wb-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);background:var(--paper)}
  .wb-bar .t{font-family:var(--display);font-weight:600;font-size:13px}
  .wb-body{display:grid;grid-template-columns:210px 1fr;min-height:300px}
  @media(max-width:720px){.wb-body{grid-template-columns:1fr}}
  .flist{border-right:1px solid var(--line);padding:8px;max-height:440px;overflow-y:auto}
  @media(max-width:720px){.flist{border-right:none;border-bottom:1px solid var(--line);display:flex;gap:6px;overflow-x:auto}}
  .fitem{width:100%;text-align:left;background:none;border:none;border-radius:7px;padding:7px 9px;cursor:pointer;display:flex;gap:7px;align-items:center;font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}
  .fitem:hover{background:var(--paper);color:var(--charcoal)}.fitem.on{background:rgba(0,179,179,.1);color:var(--deep-teal);font-weight:600}
  .fext{font-size:8.5px;font-weight:600;padding:2px 5px;border-radius:4px}
  .e-py{background:rgba(31,157,107,.15);color:var(--green)}.e-xml{background:rgba(201,138,30,.16);color:var(--amber)}.e-csv{background:rgba(0,179,179,.14);color:var(--deep-teal)}.e-txt{background:rgba(108,116,112,.14);color:var(--muted)}
  .cpane{background:var(--code-bg);display:flex;flex-direction:column;min-width:0}
  .chead{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--code-line)}
  .cpath{font-family:var(--mono);font-size:11px;color:#9fb0bd;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cbtn{margin-left:auto;font-family:var(--mono);font-size:10px;color:#9fb0bd;background:none;border:1px solid var(--code-line);border-radius:6px;padding:4px 8px;cursor:pointer}
  .cbtn.copied{border-color:var(--green);color:var(--green)}
  .cscroll{overflow:auto;max-height:420px}
  .cblock{display:flex;font-family:var(--mono);font-size:12px;line-height:1.6}
  .gutter{padding:12px 0 12px 12px;text-align:right;color:var(--code-gutter);user-select:none}
  .gutter span{display:block;padding-right:11px}
  .code{padding:12px 14px 12px 0;color:var(--code-text);white-space:pre;flex:1}

  .err{background:rgba(194,73,47,.05);border:1px solid rgba(194,73,47,.3);border-radius:11px;padding:13px 16px;font-size:13px;color:var(--charcoal)}
  .err b{color:var(--rust)}
  .spinner-sm{width:15px;height:15px;border-radius:50%;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;animation:spin .7s linear infinite}
  .skel{background:linear-gradient(90deg,var(--line-soft) 25%,#f1f4f3 37%,var(--line-soft) 63%);background-size:400% 100%;animation:sh 1.3s ease infinite;border-radius:8px}
  @keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}

  /* odoo explorer */
  .ox-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:760px){.ox-grid{grid-template-columns:1fr}}
  .modlist{display:flex;flex-wrap:wrap;gap:6px;max-height:300px;overflow:auto;padding:4px}

  /* toast */
  .toasts{position:fixed;right:18px;bottom:18px;z-index:200;display:flex;flex-direction:column;gap:9px;max-width:340px}
  .toast{background:var(--ink);color:#fff;border-radius:10px;padding:12px 15px;font-size:13px;box-shadow:var(--shadow-lg);display:flex;gap:10px;align-items:flex-start;animation:rise .2s ease both;border-left:3px solid var(--teal)}
  .toast.ok{border-left-color:var(--green)}.toast.bad{border-left-color:var(--rust)}.toast.info{border-left-color:var(--blue)}
  .toast .tx{flex:1;line-height:1.45}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(20,24,26,.5);backdrop-filter:blur(2px);display:grid;place-items:center;z-index:150;animation:rise .15s ease both;padding:20px}
  .modal{background:var(--surface);border-radius:16px;box-shadow:var(--shadow-lg);width:100%;max-width:440px;overflow:hidden}
  .modal-h{padding:18px 20px 0}
  .modal-h h3{font-family:var(--display);font-weight:600;font-size:18px}
  .modal-h p{font-size:12.5px;color:var(--muted);margin-top:3px}
  .modal-b{padding:16px 20px 20px}
  .modal-b .input-block{margin-bottom:13px}
  .modal-f{display:flex;justify-content:flex-end;gap:9px;padding:0 20px 18px}

  /* auth gate */
  .auth-gate{position:fixed;inset:0;background:var(--paper);display:grid;place-items:center;z-index:300;padding:20px}
  .auth-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-lg);width:100%;max-width:400px;padding:28px}
  .auth-tabs{display:flex;gap:6px;margin-bottom:18px}
  .auth-tab{flex:1;text-align:center;padding:8px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);background:var(--paper)}
  .auth-tab.on{background:rgba(0,179,179,.1);color:var(--deep-teal)}

  /* execution board */
  .exec-board{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px}
  .exec-col{min-width:230px;flex:1;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:10px}
  .exec-col-h{font-weight:600;font-size:13px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  .exec-card{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:10px;margin-bottom:8px}

  /* responsive sidebar */
  @media(max-width:860px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed;left:0;top:0;width:var(--sb);z-index:100;transform:translateX(-100%);transition:transform .22s ease}
    .sidebar.open{transform:none}
    .menu-btn{display:inline-flex}
    .scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90;display:none}
    .scrim.open{display:block}
  }
  @media print{
    .sidebar,.topbar .tb-actions,.menu-btn,.run-area,.toasts{display:none!important}
    .app{grid-template-columns:1fr}.content{max-width:none;padding:0}
    .panel,.kpi,.ov-hero{box-shadow:none}
  }

  /* ============================================================= *
   * C2P design system v2 — depth, rhythm, motion & focus polish   *
   * Appended last so it refines the base without restructuring.   *
   * ============================================================= */
  :root{
    --line:#E9EBEF;--line-soft:#F1F3F6;--paper:#F4F6F8;
    --shadow-xs:0 1px 2px rgba(17,24,39,.05);
    --shadow:0 1px 2px rgba(17,24,39,.04),0 2px 6px rgba(17,24,39,.05);
    --shadow-md:0 4px 12px rgba(17,24,39,.07),0 2px 4px rgba(17,24,39,.04);
    --shadow-lg:0 24px 60px -12px rgba(17,24,39,.22),0 8px 24px -8px rgba(17,24,39,.12);
    --ring:0 0 0 3px rgba(0,179,179,.20);
    --grad-teal:linear-gradient(135deg,#00C2C2,#008080);
    --grad-ink:linear-gradient(135deg,#272B31,#15181C);
    --r-sm:9px;--r:13px;--r-lg:16px;
  }
  body{background:
    radial-gradient(1200px 600px at 100% -10%,rgba(0,179,179,.05),transparent 60%),
    radial-gradient(900px 500px at -5% 0%,rgba(83,74,183,.04),transparent 55%),
    var(--paper);
    background-attachment:fixed;letter-spacing:-.05px}

  /* sidebar — quiet depth + crisper brand */
  .sidebar{background:linear-gradient(180deg,#FCFCFD,#F7F8FA 60%,#F4F5F8);border-right:1px solid var(--line);box-shadow:1px 0 0 rgba(17,24,39,.02)}
  .sb-strap b{letter-spacing:-.2px}
  .nav-item{transition:background .14s ease,color .14s ease,transform .14s ease}
  .nav-item:hover{transform:translateX(1px)}
  .nav-item.active{background:linear-gradient(90deg,rgba(0,179,179,.14),rgba(0,179,179,.06))}
  .nav-item.active::before{box-shadow:0 0 10px rgba(0,179,179,.5)}
  .ni-count{box-shadow:inset 0 0 0 1px rgba(17,24,39,.04)}
  .sb-eng{box-shadow:var(--shadow-xs)}

  /* topbar — translucent, blurred, sticky */
  .topbar{background:rgba(255,255,255,.78);backdrop-filter:saturate(1.6) blur(12px);-webkit-backdrop-filter:saturate(1.6) blur(12px);border-bottom:1px solid var(--line)}
  .tb-title{letter-spacing:-.4px}

  /* buttons — tactile lift + gradient accents + focus rings */
  .btn{border-radius:10px;transition:transform .12s ease,box-shadow .14s ease,background .14s ease,border-color .14s ease}
  .btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
  .btn:active{transform:translateY(0);box-shadow:var(--shadow-xs)}
  .btn.primary{background:var(--grad-teal);border-color:transparent;box-shadow:0 1px 2px rgba(0,128,128,.18),0 6px 16px -6px rgba(0,179,179,.5)}
  .btn.primary:hover{background:var(--grad-teal);filter:brightness(1.04);box-shadow:0 2px 4px rgba(0,128,128,.2),0 10px 22px -6px rgba(0,179,179,.55)}
  .btn.dark{background:var(--grad-ink);border-color:transparent}
  .btn.dark:hover{background:var(--grad-ink);filter:brightness(1.12)}
  .btn.sm{border-radius:8px}
  :focus-visible{outline:none;box-shadow:var(--ring);border-radius:8px}
  .btn:focus-visible,select:focus-visible,input:focus-visible,textarea:focus-visible{box-shadow:var(--ring)}

  /* panels & surfaces — softer, layered, gently interactive */
  .panel{border-radius:var(--r-lg);box-shadow:var(--shadow);border-color:var(--line)}
  .panel-head h2{letter-spacing:-.4px}
  .kpi,.doc-card,.req-row,.odoo-rec,.rfi-card,.ov-step,.exec-card{transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease}
  .kpi{border-radius:var(--r)}
  .kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
  .doc-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:rgba(0,179,179,.35)}
  .req-row:hover{border-color:var(--line);box-shadow:var(--shadow-xs)}
  .ov-hero{border-radius:var(--r-lg);box-shadow:var(--shadow)}
  .ov-step.done{box-shadow:inset 0 0 0 1px rgba(31,157,107,.12)}

  /* chips & badges — crisper edges */
  .chip{border-radius:8px;font-weight:500}
  .badge{box-shadow:var(--shadow-xs)}
  .eff{font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;letter-spacing:.3px}

  /* personas — ring + readable initials */
  .pavatar{box-shadow:0 0 0 3px rgba(0,179,179,.12);color:#fff}

  /* run logs — terminal feel */
  .ap-log{background:#0E1622;border-color:#0E1622;color:#cdd6e0;border-radius:var(--r);box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
  .ap-row{border-bottom-color:rgba(255,255,255,.04)}
  .ap-row.ok{color:#cdd6e0}
  .ap-row.head{color:#3fd9d9}
  .ap-row.muted{color:#6b7686}
  .ap-row a{color:#3fd9d9}
  .ap-log b{color:#fff}

  /* refined scrollbars */
  *{scrollbar-width:thin;scrollbar-color:#cfd4dc transparent}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#cfd4dc;border-radius:8px;border:3px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-thumb:hover{background:#b6bcc6;background-clip:content-box}
  .ap-log::-webkit-scrollbar-thumb{background:#2a3646;background-clip:content-box}

  /* inputs — slightly softer */
  select,input[type=text],input[type=password],textarea{border-radius:10px}
  .callout{border-radius:var(--r)}

  /* run-log row colors tuned for the dark terminal */
  .ap-row.warn{color:#f3b53f}
  .ap-row.bad{color:#ff8c70}
  .ap-row.done{color:#3ddc97;font-weight:600}

  /* progress ring — soft glow */
  .ring{filter:drop-shadow(0 4px 14px rgba(0,179,179,.18))}
  .ring .rv b{letter-spacing:-1px}
  .tb-bar i{box-shadow:0 0 8px rgba(0,179,179,.45)}

  /* KPI — hairline top accent + tighter numerals */
  .kpi{position:relative;overflow:hidden}
  .kpi.accent{border-left:none}
  .kpi.accent::after{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:var(--grad-teal)}
  .kpi .v{font-variant-numeric:tabular-nums;letter-spacing:-.6px}

  /* tables — zebra-free hover, tabular figures */
  tbody tr{transition:background .12s ease}
  tbody tr:hover{background:rgba(0,179,179,.025)}
  td.num,th.num{font-variant-numeric:tabular-nums}

  /* empty states — give them presence */
  .placeholder{color:var(--muted);font-size:14px;line-height:1.6;padding:48px 24px;max-width:520px;margin:0 auto}

  /* toasts — elevated glass cards */
  .toast{box-shadow:var(--shadow-lg)!important;border-radius:12px!important;backdrop-filter:blur(8px)}

  /* section headers — a touch more architectural */
  .sec h3,.set-h{position:relative}

  /* persona avatar text must read on the gradient */
  .pavatar{text-shadow:0 1px 1px rgba(0,0,0,.25)}

  /* selection + links */
  ::selection{background:rgba(0,179,179,.22)}
  .linkbtn:hover{color:var(--teal)}

  /* the engagement <select> in the sidebar — crisper */
  .sb-eng select{transition:border-color .15s,box-shadow .15s}
  .sb-eng select:hover{border-color:#D7DAE0}

  /* dropzone hover lift */
  .dropzone{transition:border-color .15s,background .15s,box-shadow .15s}
  .dropzone:hover{box-shadow:var(--shadow-xs)}

  @media(prefers-reduced-motion:reduce){
    .btn,.nav-item,.kpi,.doc-card,.req-row,.odoo-rec{transition:none!important}
    .btn:hover,.kpi:hover,.doc-card:hover,.nav-item:hover{transform:none!important}
  }

  /* ===== professional alignment polish (v3) ===== */
  .panel-head .run-area{flex-shrink:0;align-self:flex-start}
  .panel-head>div:first-child{min-width:0}            /* let titles truncate, not push */
  .run-area{flex-wrap:wrap;justify-content:flex-end;row-gap:8px}
  .btn{white-space:nowrap;line-height:1.25;min-height:32px}
  .btn.sm{min-height:28px}
  .kpis{align-items:stretch}
  .kpi{display:flex;flex-direction:column;min-height:96px}
  .kpi .v{margin-top:auto}                              /* values align to a common baseline */
  .doc-card{align-items:center}
  .req-row{align-items:center;gap:10px}
  .req-row .rq-text{min-width:0;overflow-wrap:anywhere}
  .req-row .chip,.req-row .eff{flex:none}
  .two-col{align-items:start}
  .input-grid{align-items:start}
  .input-block label{font-weight:600;letter-spacing:.1px}
  .sec h3{display:flex;align-items:center;gap:8px}
  .sec h3::after{content:"";flex:1;height:1px;background:var(--line-soft)}   /* tidy section rule */
  .chip,.eff,.badge,.pri{display:inline-flex;align-items:center;line-height:1;white-space:nowrap}
  .placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center}
  .panel-body{padding:20px 22px}
</style>
</head>
<body>

<script>
let API_BASE = localStorage.getItem("c2p_api") || "/api";
let engagements = [];
let eng = null;
let activeView = "overview";          // 'overview' | stage id | 'odoo'
let running = null;
let devFiles = [], devActive = 0, devObj = null, lastFunctional = null;
let odooModules = null, odooModFilter = "";
let pendingCount = 0, approvalPayloads = {}, accountsCache = [];
let clarifyOpen = 0;
let multitenant = false, adminAuth = false, authToken = localStorage.getItem("c2p_token") || "", currentTenant = null;

const STAGES = [
  {id:"presales",  name:"Presales",  ico:"◎", group:"Win the work",  persona:"Presales Consultant", doc:"Discovery & Qualification Brief", desc:"Qualify the opportunity and turn discovery into candidate requirements."},
  {id:"proposal",  name:"Proposal",  ico:"◧", group:"Win the work",  persona:"Solution Architect",  doc:"Solution Proposal",            desc:"Turn discovery into a scoped, costed proposal."},
  {id:"project",   name:"Project",   ico:"◳", group:"Win the work",  persona:"Delivery Lead",       doc:"Implementation Plan",          desc:"Turn the won proposal into an Odoo implementation plan."},
  {id:"functional",name:"Functional",ico:"◮", group:"Do the work",   persona:"Functional Consultant",doc:"Functional Specification",     desc:"Analyse a requirement against standard Odoo and assign a verdict."},
  {id:"developer", name:"Developer", ico:"◆", group:"Do the work",   persona:"Odoo Developer",      doc:"Technical Build Note",         desc:"Build an installable module from a Custom-verdict spec."},
];
const VERDICTS={standard:{label:"Standard",color:"#1f9d6b"},configurable:{label:"Configurable",color:"#00B3B3"},studio:{label:"Studio",color:"#c98a1e"},custom:{label:"Custom build",color:"#c2492f"}};
const LADDER=["standard","configurable","studio","custom"];
const LNAME={standard:"Config",configurable:"Workflows",studio:"Studio",custom:"Module"};

/* C2P Consultants brand — used in the console and generated documents. */
const BRAND={
  name:"C2P Consultants",
  legal:"C2P Consultants FZC LLC",
  tagline:"Beyond the Core.",
  accent:"#00B3B3", accentDark:"#008080", ink:"#2E2E2E",
  contact:"core2plus.com · info@core2plus.com · +971 58 128 2057",
  address:"Ajman Free Zone, UAE · Trade Licence 34241",
  confidential:"Confidential — prepared for the named client only.",
};
function logoSVG(c){return `<svg viewBox="0 0 230 88" xmlns="http://www.w3.org/2000/svg" aria-label="C2P Consultants" style="height:100%;width:auto"><text x="0" y="54" font-family="'Inter',sans-serif" font-weight="700" font-size="56" fill="${c}">C2P</text><text x="3" y="80" font-family="'Inter',sans-serif" font-weight="500" font-size="17" letter-spacing="2" fill="${c}">Consultants</text><g fill="none" stroke="${BRAND.accent||'#00B3B3'}" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"><path d="M168 42 L190 20 L212 42"/><path d="M168 60 L190 38 L212 60"/></g></svg>`;}
const DEFAULT_BRAND=JSON.parse(JSON.stringify(BRAND));
/* light = for dark backgrounds (sidebar); dark = for light backgrounds (documents). */
function brandMark(ctx){
  const logo=ctx==='light'?BRAND.logoLight:BRAND.logoDark;
  if(logo)return `<img src="${logo}" alt="${esc(BRAND.name||'logo')}" style="height:100%;width:auto;display:block;max-width:200px">`;
  return logoSVG(ctx==='light'?'#fff':(BRAND.ink||'#2E2E2E'));
}
function applyBranding(){
  const r=document.documentElement.style;
  if(BRAND.accent)r.setProperty('--teal',BRAND.accent);
  if(BRAND.accentDark)r.setProperty('--deep-teal',BRAND.accentDark);
  if(BRAND.ink)r.setProperty('--charcoal',BRAND.ink);
  const b=document.querySelector('.sb-brand');if(b)b.innerHTML=`<span style="display:block;height:30px">${brandMark('dark')}</span>`;
  const strap=document.querySelector('.sb-strap');if(strap)strap.innerHTML=`<b>Delivery Console</b><span>${esc(BRAND.tagline||'')}</span>`;
  try{document.title='Delivery Console · '+(BRAND.name||'C2P');}catch(e){}
}

function esc(s){return String(s==null?"":s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function aed(n){try{return "AED "+Number(n).toLocaleString("en-AE");}catch(e){return "AED "+n;}}

/* ---------- toast ---------- */
function toast(msg,type){
  const wrap=document.getElementById('toasts');
  const t=document.createElement('div');t.className='toast '+(type||'');
  t.innerHTML=`<span style="flex:none">${type==='ok'?'✓':type==='bad'?'!':'›'}</span><span class="tx">${esc(msg)}</span>`;
  wrap.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},type==='bad'?5200:3200);
}

/* ---------- api ---------- */
async function api(method, path, body){
  const opt={method,headers:{"Content-Type":"application/json"}};
  if(authToken) opt.headers["Authorization"]="Bearer "+authToken;
  if(body) opt.body=JSON.stringify(body);
  const res=await fetch(API_BASE+path,opt);
  if(res.status===401 && (multitenant||adminAuth) && !path.startsWith('/auth')){ logout(); throw new Error("Please log in"); }
  if(!res.ok){let d;try{d=(await res.json()).detail;}catch(e){d=res.statusText;}throw new Error(d||("HTTP "+res.status));}
  return res.json();
}
async function pingHealth(){
  const dot=document.getElementById('apiDot');
  try{const h=await api("GET","/health");dot.className="api-dot ok";document.getElementById('apiLabel').textContent=(h.model||"online");}
  catch(e){dot.className="api-dot bad";document.getElementById('apiLabel').textContent="offline";}
}
function editApi(){
  const chip=document.getElementById('apiChip');
  chip.innerHTML=`<input class="api-input" id="apiEdit" value="${esc(API_BASE)}">`;
  const inp=document.getElementById('apiEdit');inp.focus();inp.select();
  const save=()=>{API_BASE=inp.value.trim().replace(/\/$/,"");localStorage.setItem("c2p_api",API_BASE);renderApiChip();pingHealth();loadEngagements();};
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')save();});
  inp.addEventListener('blur',save);
}
function renderApiChip(){document.getElementById('apiChip').innerHTML=`<span class="api-dot" id="apiDot"></span><span id="apiLabel">delivery-api</span>`;}

/* ---------- engagements ---------- */
async function loadEngagements(notify){
  try{engagements=await api("GET","/engagements");if(notify)toast("Engagements refreshed","info");}
  catch(e){engagements=[];if(notify)toast("Could not reach delivery-api","bad");}
  renderEngSelect();
}
function renderEngSelect(){
  const sel=document.getElementById('engSelect');
  const opts=engagements.map(e=>`<option value="${e.id}" ${eng&&eng.id===e.id?'selected':''}>${esc(e.company)}</option>`).join('');
  sel.innerHTML=`<option value="">${engagements.length?'Select…':'None yet'}</option>${opts}`;
}
async function selectEngagement(id){
  if(!id){eng=null;localStorage.removeItem("c2p_last");renderAll();return;}
  try{eng=await api("GET","/engagements/"+id);localStorage.setItem("c2p_last",id);}
  catch(e){toast("Could not load engagement","bad");return;}
  if(activeView==='odoo')odooModules=null;
  renderAll();
}
async function createEngagement(co,db){
  try{
    const e=await api("POST","/engagements",{company:co,odoo_db:db||null});
    eng={...e,stages:e.stages||{}};localStorage.setItem("c2p_last",eng.id);
    await loadEngagements();activeView='presales';renderAll();
    toast("Engagement created — start with Presales","ok");
  }catch(err){toast("Could not create: "+err.message,"bad");}
}

/* ---------- progress ---------- */
function stageDone(id){
  if(!eng||!eng.stages) return false;
  const v=eng.stages[id];
  return id==="functional" ? Array.isArray(v)&&v.length>0 : !!v;
}
function doneCount(){return STAGES.filter(s=>stageDone(s.id)).length;}

function renderEngDb(){
  const el=document.getElementById('engDb');
  if(!eng){el.innerHTML='';return;}
  el.innerHTML=eng.odoo_db?`<span class="db">⛁ ${esc(eng.odoo_db)}</span>`:`<button class="btn ghost sm" style="padding:3px 9px;font-size:11px" onclick="linkOdooDb()">⛁ Link Odoo</button>`;
}
async function linkOdooDb(db){

    if(/connection first/i.test(e.message)){toast('Set the Odoo Connection first','bad');goView('odooconn');}

}

function odooRecords(){

    {ic:'◎',c:'#1f9d6b',nm:'CRM Lead',id:eng.crm_lead_id},
    {ic:'◧',c:'#534AB7',nm:'Sale Order',id:eng.sale_order_id},
    {ic:'◳',c:'#2f6fc2',nm:'Project',id:eng.project_id},
  ].map(r=>`<div class="odoo-rec"><div class="ic" style="background:${r.c}">${r.ic}</div><div class="nm">${r.nm}</div>${r.id?`<span class="id">#${r.id}</span>`:`<span class="pend">not yet</span>`}</div>`).join('');
  const canSync=stageDone('presales')&&!eng.crm_lead_id;
  return rows+(canSync?`<button class="btn sm" style="margin-top:6px" onclick="syncLead()">Push CRM lead to Odoo now</button>`:'');
}
async function syncLead(){
  try{const r=await api("POST",`/engagements/${eng.id}/sync/lead`);eng.crm_lead_id=r.crm_lead_id;toast("CRM lead created in Odoo · #"+r.crm_lead_id,"ok");renderView();}
  catch(e){toast("Sync failed: "+e.message,"bad");}

function activitySummary(){
  const items=[];
  if(eng.stages?.presales)items.push(['Presales','Qualified — '+(eng.stages.presales.recommendation||'')+' · '+((eng.stages.presales.candidate_requirements||[]).length)+' candidate requirements']);
  if(eng.stages?.proposal)items.push(['Proposal','Scoped — '+(eng.stages.proposal.commercial?.estimate_aed?aed(eng.stages.proposal.commercial.estimate_aed):'priced')]);
  if(eng.stages?.project)items.push(['Project',(eng.stages.project.project_name||'Plan')+' — '+((eng.stages.project.phases||[]).length)+' phases']);
  if((eng.stages?.functional||[]).length)items.push(['Functional',eng.stages.functional.length+' requirement(s) analysed']);
  if(eng.stages?.developer)items.push(['Developer',(eng.stages.developer.files||[]).length+' files generated']);
  if(!items.length)return `<div class="placeholder" style="padding:18px 0">Nothing run yet. Start with Presales.</div>`;
  return items.map(([s,t])=>`<div class="odoo-rec"><div class="ic" style="background:var(--deep-teal)">✓</div><div class="nm"><b>${s}</b> · <span style="color:var(--muted)">${esc(t)}</span></div></div>`).join('');
}
let _apStop=false;
const AP_LABEL={presales:'Pre-sales qualification',ba_discovery:'BA discovery plan',ba_requirements:'BA requirements catalog',proposal:'Proposal & pricing',project:'Project plan',functional:'Functional analysis',developer:'Developer build',document:'Document authoring',config:'Odoo configuration',deploy:'Module deploy'};
function apReview(rv){
  if(!rv||rv.score==null)return '';
  const col=rv.score>=85?'#1f9d6b':rv.score>=70?'#b9770a':'var(--rust)';
  const rev=rv.revisions?` · revised ${rv.revisions}×`:'';
  return ` <span style="color:${col};font-weight:600">QA ${rv.score}</span>${rev}`;
}
function apLog(html,cls){
  const el=document.getElementById('autopilotLog'); if(!el)return;
  const row=document.createElement('div'); row.className='ap-row '+(cls||''); row.innerHTML=html; el.appendChild(row); el.scrollTop=el.scrollHeight;
}
function stopAutopilot(){_apStop=true;apLog('⏹ Stop requested — finishing current step…','warn');}
async function runAutopilot(){
  const btn=document.getElementById('autopilotBtn'); const panel=document.getElementById('autopilotPanel'); const stop=document.getElementById('autopilotStop');
  if(panel)panel.style.display='block'; if(stop)stop.style.display='inline-flex';
  if(btn){btn.disabled=true;btn.textContent='🤖 Autopilot running…';}
  _apStop=false;
  document.getElementById('autopilotLog').innerHTML='';
  apLog('🚀 Autopilot engaged for <b>'+esc(eng.company)+'</b>','head');
  let guard=0, consecErr=0;
  try{
    while(guard++<40){
      if(_apStop){apLog('⏹ Stopped by operator.','warn');break;}
      let r;
      try{ r=await api("POST",`/engagements/${eng.id}/autopilot/step`); }
      catch(e){ apLog('✕ Step call failed: '+esc(e.message),'bad'); break; }
      const label=AP_LABEL[r.ran]||r.ran||'';
      if(r.status==='done'){ apLog('✓ Pipeline complete — nothing left to run.','done'); break; }
      if(r.status==='needs_input'){ apLog('⏸ <b>'+esc(label)+'</b> needs your input — run it from its stage tab, then re-launch Autopilot.','warn'); break; }
      if(r.status==='blocked'){ apLog('🔒 <b>'+esc(label)+'</b> hit an approval gate. Review it in <a href="#" onclick="goView(\'approvals\');return false">Approvals</a>.','warn'); break; }
      if(r.status==='error'){
        consecErr++;
        const rl=/rate.?limit|429|tokens per minute|credit balance|too low/i.test(r.error||'');
        apLog('✕ <b>'+esc(label)+'</b> — '+esc((r.error||'').slice(0,170)),'bad');
        if(rl){apLog('⛔ The model API is unavailable (no credit / rate-limited). Local stages still run; generative stages (writing, code) need API credit — add it at console.anthropic.com/settings/billing.','warn');break;}
        if(consecErr>=3){apLog('⛔ Too many consecutive failures — stopping. Check Agent Activity.','warn');break;}
        try{ const fresh=await api("GET",`/engagements/${eng.id}`); if(fresh&&fresh.id){eng=fresh;} }catch(_){}
        continue;   // skip this step, keep the run going
      }
      consecErr=0;
      const dname=r.doc_name?(' — '+esc(r.doc_name)):'';
      const qp=r.questions_pushed?` · ${r.questions_pushed} questions queued for client`:'';
      apLog('▸ Ran <b>'+esc(label)+'</b>'+dname+qp+apReview(r.review),'ok');
      // refresh engagement state between steps
      try{ const fresh=await api("GET",`/engagements/${eng.id}`); if(fresh&&fresh.id){eng=fresh;} }catch(_){}
    }
    if(guard>=40)apLog('⚠ Reached step limit — re-launch to continue.','warn');
  } finally {
    if(btn){btn.disabled=false;btn.textContent='🤖 Run Autopilot';}
    if(stop)stop.style.display='none';
    // refresh lists/state silently but keep the run log on screen
    try{ engagements=await api("GET","/engagements"); }catch(_){}
    try{ if(typeof refreshSidebar==='function')refreshSidebar(); }catch(_){}
    apLog('— end of run. Switch tabs to see updated stage state. —','muted');
  }
}
function recentList(){
  if(!engagements.length)return '';
  return `<div class="panel" style="margin-top:16px"><div class="panel-head"><div><h2>Recent engagements</h2></div></div><div class="panel-body">${
    engagements.slice(0,8).map(e=>`<div class="odoo-rec" style="cursor:pointer" onclick="selectEngagement('${e.id}')"><div class="ic" style="background:var(--charcoal)">${esc((e.company||'?')[0].toUpperCase())}</div><div class="nm">${esc(e.company)}</div><span class="pend">${(e.stages||[]).length} stage(s)</span></div>`).join('')
  }</div></div>`;
}
function exportEngagement(){
  if(!eng)return;
  const blob=new Blob([JSON.stringify(eng,null,2)],{type:"application/json"});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(eng.company||'engagement').replace(/\s+/g,'_')+'_'+eng.id+'.json';a.click();URL.revokeObjectURL(a.href);
  toast("Engagement exported","ok");
}

function renderStageView(c){

async function runStage(){
  if(running) return;
  const stage=activeView;let body={};
  if(stage==='presales'){const n=val('ps_notes');if(!n){focus('ps_notes');return;}body={notes:n,country:val('ps_country')||'UAE',industry:val('ps_industry')||null};}
  if(stage==='proposal'){body={instructions:val('pr_instr')||null};}
  if(stage==='project'){body={instructions:val('pj_instr')||null};}
  if(stage==='functional'){const r=val('fn_req');if(!r){focus('fn_req');return;}body={requirement:r,odoo_version:val('fn_ver'),country:val('fn_country')||'UAE'};}
  if(stage==='developer'){body={target_version:val('dv_ver'),module_name:val('dv_name')||null};const sp=val('dv_spec');if(sp)body.spec=sp;}
  running=stage;renderNav();renderRunBtn();
  try{
    const out=await api("POST",`/engagements/${eng.id}/${stage}`,body);
    if(!eng.stages)eng.stages={};
    if(stage==='functional'){eng.stages.functional=eng.stages.functional||[];eng.stages.functional.push(out);lastFunctional=out;}
    else eng.stages[stage]=out;
    if(stage==='presales')eng.stages.presales._notes=body.notes;
    running=null;renderNav();renderTopbar();renderRunBtn();
    RENDER[stage](document.getElementById('stageOut'), out);
    toast(STAGES.find(x=>x.id===stage).name+" complete","ok");
  }catch(err){
    running=null;renderNav();renderRunBtn();
    document.getElementById('stageOut').innerHTML=`<div class="err"><b>That stage didn't complete.</b> ${esc(err.message)}<br><br>Check that delivery-api is running and the model key is set.</div>`;
    toast("Stage failed: "+err.message,"bad");
  }
}

/* ---------- document upload (client-side text extraction) ---------- */
if(window.pdfjsLib)pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
async function extractText(file){
  const name=(file.name||'').toLowerCase();
  if(name.endsWith('.pdf')){
    if(typeof pdfjsLib==='undefined')throw new Error('PDF reader still loading — try again');
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    const pages=[];
    for(let p=1;p<=pdf.numPages;p++){const page=await pdf.getPage(p);const tc=await page.getTextContent();pages.push(tc.items.map(i=>i.str).join(' '));}
    return pages.join('\n\n');
  }
  return await file.text();   // txt, md, csv, json, log, html
}
function attachDropzone(taId,dzId,inputId,filesId){
  const dz=document.getElementById(dzId),inp=document.getElementById(inputId),ta=document.getElementById(taId),fl=document.getElementById(filesId);
  if(!dz||dz._wired)return; dz._wired=true;
  const handle=async(files)=>{
    for(const f of files){
      try{
        const txt=(await extractText(f)).trim();
        if(!txt){toast('No text found in '+f.name,'bad');continue;}
        ta.value+=(ta.value.trim()?'\n\n':'')+`--- ${f.name} ---\n`+txt;
        const tag=document.createElement('span');tag.className='dz-file';tag.textContent='📄 '+f.name;fl.appendChild(tag);
        toast('Imported '+f.name+' · '+txt.length.toLocaleString()+' chars','ok');
      }catch(e){toast('Could not read '+f.name+': '+e.message,'bad');}
    }
  };
  inp.addEventListener('change',e=>{handle(e.target.files);e.target.value='';});
  ['dragover','dragenter'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add('drag');}));
  ['dragleave'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove('drag');}));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');handle(e.dataTransfer.files);});
}

  c.innerHTML=`<div class="view"><div class="panel">

async function saveOdooConn(){

async function detectOdooDb(){
  const r=document.getElementById('oc_result');
  const url=val('oc_url');
  if(!url){r.innerHTML=`<span style="color:var(--rust)">Enter the Odoo URL first — paste the address you log in at.</span>`;return;}
  r.textContent='Detecting database…';
  try{
    const o=await api("POST","/odoo/connection/detect-db",{url});
    const cands=o.candidates||[];
    if(o.best){document.getElementById('oc_db').value=o.best;}
    const lbl={connected:'✓ connects',exists_bad_creds:'exists — check user/key',not_found:'not on this server',error:'error',unverified:'guess (save creds to verify)'};
    const list=cands.map(c=>{const col=c.status==='connected'?'var(--green)':c.status==='exists_bad_creds'?'var(--amber)':c.status==='not_found'?'var(--rust)':'var(--muted)';
      return `<div style="display:flex;gap:8px;align-items:center;margin-top:4px"><code style="font-size:11.5px">${esc(c.db)}</code><span style="color:${col};font-size:11.5px">${lbl[c.status]||c.status}</span>${c.db!==val('oc_db')?`<button class="btn ghost sm" style="padding:1px 7px;font-size:11px" onclick="document.getElementById('oc_db').value='${esc(c.db)}'">use</button>`:'<span class="chip">selected</span>'}</div>`;}).join('');
    const hint=o.best?(cands.find(c=>c.db===o.best&&c.status==='connected')?`<span style="color:var(--green)">Filled in <b>${esc(o.best)}</b> — it connects. Save, then Test.</span>`:`<span style="color:var(--amber)">Best guess <b>${esc(o.best)}</b> filled in. ${o.listed?'':'Server hid its database list, so this is derived from the URL host. '}Save your credentials and Detect again to verify.</span>`)
      :`<span style="color:var(--rust)">Couldn’t determine the database. The server hides its list — copy the exact name from your Odoo.sh branch / instance URL.</span>`;
    r.innerHTML=hint+(list?`<div style="margin-top:8px">${list}</div>`:'');
  }catch(e){r.innerHTML=`<span style="color:var(--rust)">✗ ${esc(e.message)}</span>`;}
}
async function testOdooConn(){
  const r=document.getElementById('oc_result');r.textContent='Testing…';
  try{const o=await api("POST","/odoo/connection/test",{db:val('oc_db')||undefined});r.innerHTML=`<span style="color:var(--green)">✓ Connected to ${esc(o.db)} — ${o.modules} installed modules.</span>`;}

}

function renderRFI(r){
  const b=document.getElementById('rfiBody');if(!b)return;

  if(!qs.length){b.innerHTML=`<div class="placeholder">No questions compiled yet. Run the stages, then click <b>Compile questions for client</b> — the PM gathers every open item the agents need answered.</div>`;return;}
  const blocksRank={high:0,medium:1,low:2};
  const sorted=[...qs].sort((a,b)=>(a.status==='answered')-(b.status==='answered')||(blocksRank[a.blocks]??3)-(blocksRank[b.blocks]??3));
  b.innerHTML=(r.summary?`<div class="callout" style="margin-bottom:12px"><b>PM summary.</b> ${esc(r.summary)}</div>`:'')
    +`<div style="margin-bottom:10px;color:var(--muted);font-size:12.5px">${clarifyOpen} open · ${qs.length-clarifyOpen} answered</div>`
    +sorted.map(q=>{

      return `<div class="rfi-card ${ans?'answered':''}">
        <div class="rfi-top"><span class="rfi-q">${esc(q.question)}</span>

        ${ans
          ? `<div class="rfi-answer"><b>Client answer.</b> ${esc(q.answer)}</div>`
          : `<div class="rfi-input"><textarea id="ans_${q.id}" rows="2" placeholder="${esc(q.suggested_default?('Suggested: '+q.suggested_default):'Record the client’s answer…')}"></textarea>

let _pmDelStop=false;
function stopPMDelivery(){_pmDelStop=true;}
async function loadDelivery(){
  try{const plan=await api("GET",`/engagements/${eng.id}/pm/deliver`);if((plan.packages||[]).length)renderDeliveryBoard(plan);}catch(_){}

function delStatusChip(p){
  const s=p.status, v=p.functional_verdict;
  if(s==='done'){const vc=v==='custom'?'var(--rust)':v?'var(--green)':'var(--green)';return `<span class="eff" style="background:${vc};color:#fff">${v?esc(v):'done'}</span>`;}
  if(s==='error')return `<span class="eff" style="background:var(--rust);color:#fff">error</span>`;
  if(s==='in_progress')return `<span class="ni-st running"></span>`;
  return `<span class="eff" style="background:var(--line);color:var(--muted)">pending</span>`;
}
function renderDeliveryBoard(plan){
  const el=document.getElementById('pmDelBoard');if(!el)return;
  const pkgs=plan.packages||[];const pr=_delProgress(pkgs);
  el.innerHTML=`${plan.summary?`<div class="callout" style="margin-bottom:10px"><b>Plan.</b> ${esc(plan.summary)}</div>`:''}
    <div style="margin-bottom:8px;color:var(--muted);font-size:12.5px">${pr.done}/${pr.total} requirements delivered${plan.build&&plan.build.needed?` · build ${esc(plan.build.status||'pending')}`:''}</div>
    ${pkgs.map(p=>`<div class="req-row"><span class="rq-text"><b>${esc(p.id||'')}</b> ${esc(p.requirement||'')}${p.area?` <span style="color:var(--muted-2)">· ${esc(p.area)}</span>`:''}</span>
      <span class="chip">${esc(p.assigned_to||'functional')}</span>${delStatusChip(p)}</div>`).join('')||'<div class="hint">—</div>'}`;
}
function _delProgress(pkgs){return {done:pkgs.filter(p=>p.status==='done').length,total:pkgs.length};}
function pmDelLog(html,cls){const el=document.getElementById('pmDelLog');if(!el)return;el.style.display='block';const r=document.createElement('div');r.className='ap-row '+(cls||'');r.innerHTML=html;el.appendChild(r);el.scrollTop=el.scrollHeight;}
async function runPMDelivery(){
  const btn=document.getElementById('pmDelBtn'),stop=document.getElementById('pmDelStop');
  if(btn){btn.disabled=true;btn.textContent='Delivering…';}if(stop)stop.style.display='inline-flex';
  _pmDelStop=false;
  const logEl=document.getElementById('pmDelLog');if(logEl){logEl.innerHTML='';logEl.style.display='block';}
  try{
    pmDelLog('🗂 PM organising the requirements…','head');
    let plan;
    try{plan=await api("POST",`/engagements/${eng.id}/pm/deliver/plan`,{});}
    catch(e){pmDelLog('✕ '+esc(e.message),'bad');return;}
    renderDeliveryBoard(plan);
    pmDelLog('▸ '+esc(plan.summary||'Plan ready'),'ok');
    let guard=0, consecErr=0, ranAny=false, failed=0;
    while(guard++<60){
      if(_pmDelStop){pmDelLog('⏹ Stopped.','warn');break;}
      let r;
      try{r=await api("POST",`/engagements/${eng.id}/pm/deliver/step`,{});}
      catch(e){pmDelLog('✕ Step call failed: '+esc(e.message),'bad');break;}
      if(r.status==='done'){pmDelLog(`✓ Delivery complete — ${ranAny?'tasks executed':'nothing to run'}${failed?` · ${failed} failed`:''}.`,failed?'warn':'done');break;}
      if(r.status==='error'){
        failed++; consecErr++;
        const rl=/rate.?limit|429|tokens per minute/i.test(r.error||'');
        pmDelLog(`✕ ${esc(r.ran)} <b>${esc(r.package||'')}</b> did not execute — ${esc((r.error||'').slice(0,180))}`,'bad');
        if(rl && consecErr>=2){pmDelLog('⛔ Repeated rate-limit errors — your Anthropic plan is throttling every call. Raise the limit at console.anthropic.com/settings/limits (or set C2P_MAX_OUTPUT_TOKENS). Nothing will execute until then.','warn');break;}
        if(consecErr>=4){pmDelLog('⛔ Too many consecutive failures — stopping. Check Agent Activity for the cause.','warn');break;}
        try{const fresh=await api("GET",`/engagements/${eng.id}/pm/deliver`);renderDeliveryBoard(fresh);}catch(_){}
        continue;   // skip this task, try the next assigned one
      }
      consecErr=0; ranAny=true;
      if(r.ran==='functional'){
        const vc=r.verdict==='custom';
        const loc=r.local?' <span style="color:#3fd9d9">⚡ local · no API</span>':'';
        pmDelLog(`▸ Functional executed <b>${esc(r.package||'')}</b> — ${esc((r.requirement||'').slice(0,60))} · <b>${esc(r.verdict||'')}</b>${loc}${apReview(r.review)}`,vc?'warn':'ok');
      } else if(r.ran==='developer'){
        pmDelLog('🔧 Technical build executed'+apReview(r.review),'ok');
      }
      try{const fresh=await api("GET",`/engagements/${eng.id}/pm/deliver`);renderDeliveryBoard(fresh);}catch(_){}
    }
    if(guard>=60)pmDelLog('⚠ Step limit reached — re-launch to continue.','warn');
  } finally {
    if(btn){btn.disabled=false;btn.textContent='▶ Organise & deliver';}
    if(stop)stop.style.display='none';
    try{const f=await api("GET",`/engagements/${eng.id}`);if(f&&f.id)eng=f;}catch(_){}
  }
}

function renderBAOut(){

  const disc=eng.stages?.ba_discovery, req=eng.stages?.ba_requirements;

  let h='';

    const frs=req.functional_requirements||[];
    const counts={};frs.forEach(r=>{counts[r.odoo_fit]=(counts[r.odoo_fit]||0)+1;});
    h+=`<div class="sec"><h3>Requirements catalog · ${frs.length} requirements</h3>
      ${req.summary?`<div class="callout" style="margin-bottom:10px">${esc(req.summary)}</div>`:''}
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${Object.keys(counts).map(k=>`<span class="chip" style="background:${FITCOL[k]||'var(--muted-2)'};color:#fff">${counts[k]} ${esc(k)}</span>`).join('')}</div>

async function decideApproval(id,decision){
  const reason=val('rsn_'+id)||null;
  let edited=null;
  if(decision==='edited'){
    edited=JSON.parse(JSON.stringify(approvalPayloads[id]||{}));
    const subEl=document.getElementById('sub_'+id),bodyEl=document.getElementById('body_'+id);
    edited.message=edited.message||{};
    if(subEl)edited.message.subject=subEl.value;
    if(bodyEl)edited.message.body=bodyEl.value;
  }
  try{
    await api("POST",`/approvals/${id}/decide`,{decision,reason,edited_payload:edited,decided_by:'owner'});
    toast(decision==='rejected'?'Rejected — nothing sent':'Approved & sent','ok');
    renderApprovals(document.getElementById('content'));
  }catch(e){toast('Decision failed: '+e.message,'bad');}
}

  </div></div>`}
  ${secs||`<div class="page"><p>No completed stages to document yet.</p></div>`}
  <div class="foot"><span>${esc(BRAND.name)} · ${esc(e.company)}</span><span>${esc(BRAND.confidential)}</span></div>
  </body></html>`;
}
function _openDoc(html){
  const w=window.open('','_blank');
  if(!w){toast('Allow pop-ups to generate the document','bad');return;}
  w.document.open();w.document.write(html);w.document.close();w.focus();
  setTimeout(()=>{try{w.print();}catch(e){}},700);
}
function openDossier(){if(!eng)return;if(!doneCount()){toast('Run at least one stage first','bad');return;}_openDoc(buildDossierHTML(eng));toast('Document generated — use your browser’s Save as PDF','ok');}
function openDoc(stage){if(!eng||!stageDone(stage))return;_openDoc(buildDossierHTML(eng,[stage]));}

/* ---------- keyboard ---------- */
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){const b=document.getElementById('runBtn');if(b&&!b.disabled){e.preventDefault();runStage();}}
  if(e.key==='Escape')closeNewEng();
});

/* ---------- multi-tenant auth (Phase 7; only active when MULTITENANT on) ---------- */
function showAuth(mode){
  mode=mode||'login';
  let el=document.getElementById('authGate');
  if(!el){el=document.createElement('div');el.id='authGate';el.className='auth-gate';document.body.appendChild(el);}
  el.innerHTML=`<div class="auth-card">
    <div style="height:32px;margin-bottom:6px">${brandMark('dark')}</div>
    <div style="font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--deep-teal);margin-bottom:18px">${esc(BRAND.tagline||'Delivery Console')}</div>
    <div class="auth-tabs"><div class="auth-tab ${mode==='login'?'on':''}" onclick="showAuth('login')">Log in</div><div class="auth-tab ${mode==='signup'?'on':''}" onclick="showAuth('signup')">Sign up</div></div>
    ${mode==='signup'?`<div class="input-block"><label>Agency name</label><input type="text" id="au_company" style="width:100%"></div>`:''}
    <div class="input-block"><label>Email</label><input type="text" id="au_email" style="width:100%"></div>
    <div class="input-block"><label>Password</label><input type="password" id="au_pw" style="width:100%"></div>
    ${mode==='signup'?`<div class="input-block"><label>Plan</label><select id="au_edition" style="width:100%"><option value="delivery">Delivery</option><option value="growth">Growth</option><option value="agency">Agency</option></select></div>`:''}
    <button class="btn primary" style="width:100%;justify-content:center;margin-top:6px" onclick="doAuth('${mode}')">${mode==='signup'?'Create workspace':'Log in'}</button>
    <div id="au_err" class="hint" style="color:var(--rust);margin-top:10px"></div></div>`;
  setTimeout(()=>{const f=document.getElementById(mode==='signup'?'au_company':'au_email');if(f)f.focus();const pw=document.getElementById('au_pw');if(pw)pw.addEventListener('keydown',e=>{if(e.key==='Enter')doAuth(mode);});},0);
}
async function doAuth(mode){
  const err=document.getElementById('au_err');err.textContent='';
  const email=val('au_email'),pw=val('au_pw');
  if(!email||!pw){err.textContent='Email and password are required';return;}
  try{
    let r;
    if(mode==='signup'){const company=val('au_company');if(!company){err.textContent='Agency name is required';return;}r=await api("POST","/auth/signup",{company,email,password:pw,edition:document.getElementById('au_edition').value});}
    else{r=await api("POST","/auth/login",{email,password:pw});}
    if(r&&r.token){localStorage.setItem('c2p_token',r.token);authToken=r.token;location.reload();}
    else err.textContent='Unexpected response';
  }catch(e){err.textContent=e.message;}
}
function logout(){localStorage.removeItem('c2p_token');authToken='';location.reload();}
/* ---------- single-admin login ---------- */
function showAdminLogin(){
  let el=document.getElementById('authGate');
  if(!el){el=document.createElement('div');el.id='authGate';el.className='auth-gate';document.body.appendChild(el);}
  el.innerHTML=`<div class="auth-card">
    <div style="height:34px;margin-bottom:8px">${brandMark('dark')}</div>
    <div style="font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--deep-teal);margin-bottom:8px">${esc(BRAND.tagline||'Delivery Console')}</div>
    <div style="font-family:var(--display);font-weight:600;font-size:19px;color:var(--charcoal);margin-bottom:16px">Sign in</div>
    <div class="input-block"><label>Username</label><input type="text" id="ad_user" autocomplete="username" style="width:100%"></div>
    <div class="input-block"><label>Password</label><input type="password" id="ad_pw" autocomplete="current-password" style="width:100%"></div>
    <button class="btn primary" style="width:100%;justify-content:center;margin-top:6px" onclick="doAdminLogin()">Sign in</button>
    <div id="ad_err" class="hint" style="color:var(--rust);margin-top:10px"></div></div>`;
  setTimeout(()=>{const u=document.getElementById('ad_user');if(u)u.focus();const pw=document.getElementById('ad_pw');if(pw)pw.addEventListener('keydown',e=>{if(e.key==='Enter')doAdminLogin();});},0);
}
async function doAdminLogin(){
  const err=document.getElementById('ad_err');err.textContent='';
  const user=val('ad_user'),pw=val('ad_pw');
  if(!user||!pw){err.textContent='Username and password are required';return;}
  try{
    const r=await api("POST","/auth/admin/login",{user,password:pw});
    if(r&&r.token){localStorage.setItem('c2p_token',r.token);authToken=r.token;location.reload();}
    else err.textContent='Unexpected response';
  }catch(e){err.textContent=e.message;}
}
function renderTenantFoot(){
  const foot=document.querySelector('.sb-foot');if(!foot)return;
  if(multitenant&&currentTenant){
    foot.insertAdjacentHTML('afterbegin',`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px"><span style="font-size:11px;font-weight:600;color:var(--charcoal)">${esc(currentTenant.name)} · <span style="color:var(--deep-teal);text-transform:capitalize">${esc(currentTenant.edition)}</span></span><button class="btn ghost sm" onclick="logout()" style="padding:3px 8px;font-size:10px">Sign out</button></div>`);
  } else if(adminAuth){
    foot.insertAdjacentHTML('afterbegin',`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px"><span style="font-size:11px;font-weight:600;color:var(--charcoal)">Admin</span><button class="btn ghost sm" onclick="logout()" style="padding:3px 8px;font-size:10px">Sign out</button></div>`);
  }
}
function workspacePanel(){
  if(!multitenant)return '';
  const t=currentTenant||{},cfg=t.config||{};
  return `<div class="panel" style="margin-bottom:16px"><div class="panel-head"><div><h2>Workspace</h2><p>Your tenant's own AI key and Odoo connection — secrets are encrypted on the server.</p></div><div class="run-area"><span class="chip" style="text-transform:capitalize">${esc(t.edition||'delivery')} plan</span></div></div>
    <div class="panel-body">
      <div class="input-block"><label>Anthropic API key</label><input type="password" id="ws_key" placeholder="sk-ant-… (leave blank to keep current)"></div>
      <div class="input-grid"><div class="input-block"><label>Odoo URL</label><input type="text" id="ws_ourl" value="${esc(cfg.odoo_url||'')}"></div>
        <div class="input-block"><label>Odoo user</label><input type="text" id="ws_ouser" value="${esc(cfg.odoo_user||'')}"></div></div>
      <div class="input-block"><label>Odoo password / API key</label><input type="password" id="ws_opw" placeholder="(leave blank to keep current)"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn primary sm" onclick="saveWorkspace()">Save workspace</button>
        ${t.edition==='delivery'?`<button class="btn sm" onclick="upgradePlan('growth')">Upgrade to Growth</button>`:''}
        ${t.edition!=='agency'?`<button class="btn sm" onclick="upgradePlan('agency')">Upgrade to Agency</button>`:''}</div>
    </div></div>`;
}
async function saveWorkspace(){
  const config={};const ou=val('ws_ourl'),us=val('ws_ouser');if(ou)config.odoo_url=ou;if(us)config.odoo_user=us;
  const secrets={};const k=val('ws_key');if(k)secrets.anthropic_key=k;const op=val('ws_opw');if(op)secrets.odoo_password=op;
  try{await api("PUT","/tenant/config",{config,secrets});toast('Workspace saved','ok');}catch(e){toast('Failed: '+e.message,'bad');}
}
async function upgradePlan(edition){try{const r=await api("POST","/billing/checkout",{edition});if(r.checkout_url)window.location.href=r.checkout_url;else toast('Checkout unavailable — Stripe not configured','bad');}catch(e){toast('Failed: '+e.message,'bad');}}

/* ---------- boot ---------- */
(async function boot(){
  renderApiChip();
  let h=null; try{h=await fetch(API_BASE+"/health").then(r=>r.ok?r.json():null);}catch(e){}
  multitenant=!!(h&&h.multitenant);
  adminAuth=!!(h&&h.admin_auth);
  if(multitenant){
    if(!authToken){ showAuth('login'); return; }
    try{const me=await api("GET","/auth/me"); currentTenant=me.tenant; }catch(e){ logout(); return; }
  } else if(adminAuth){
    if(!authToken){ showAdminLogin(); return; }
    try{ await api("GET","/auth/admin/me"); }catch(e){ logout(); return; }
  }
  pingHealth();
  try{const b=await api("GET","/branding");if(b&&typeof b==='object'&&!Array.isArray(b))Object.assign(BRAND,b);}catch(e){}
  applyBranding();
  renderTenantFoot();
  await loadEngagements();
  const last=localStorage.getItem("c2p_last");
  if(last&&engagements.some(e=>e.id===last)){try{eng=await api("GET","/engagements/"+last);}catch(e){}}
  renderAll();
  refreshApprovalsCount();
})();
</script>
