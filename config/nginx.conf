worker_processes auto;
worker_rlimit_nofile 65535;
error_log  /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time rid=$request_id';
    access_log /var/log/nginx/access.log main;

    # ── Security ─────────────────────────────────────────────────────
    server_tokens off;

    # ── Performance ───────────────────────────────────────────────────
    sendfile          on;
    tcp_nopush        on;
    tcp_nodelay       on;
    keepalive_timeout 15;
    gzip              on;
    gzip_types        text/plain text/css application/json application/javascript;
    gzip_min_length   1024;

    # ── Limits ────────────────────────────────────────────────────────
    client_max_body_size   16m;
    client_body_timeout    30s;
    client_header_timeout  10s;
    send_timeout           30s;
    proxy_read_timeout     120s;
    proxy_connect_timeout  10s;

    # ── Rate limiting zones ───────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=auth:10m    rate=5r/m;
    limit_req_zone  $binary_remote_addr zone=api:10m     rate=30r/m;
    limit_req_zone  $binary_remote_addr zone=ai_chat:10m rate=20r/m;
    limit_req_zone  $binary_remote_addr zone=global:20m  rate=120r/m;
    limit_conn_zone $binary_remote_addr zone=connlimit:10m;
    limit_req_status  429;
    limit_conn_status 429;

    # ── Block known scanners ──────────────────────────────────────────
    map $http_user_agent $blocked_agent {
        default 0;
        ~*(sqlmap|nikto|masscan|nmap|zgrab|scrapy) 1;
    }

    # ── Upstream definitions ──────────────────────────────────────────
    upstream odoo_backend    { server odoo:8069;     keepalive 16; }
    upstream platform_backend { server platform:8002; keepalive 8;  }
    upstream zaki_backend    { server zaki-ai:3000;  keepalive 8;  }

    # ── Security headers snippet (reused across servers) ─────────────
    # Applied in each server block individually for control

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location /health { return 200 "ok\n"; add_header Content-Type text/plain; }
        location / { return 301 https://$host$request_uri; }
    }

    # ── Main ERP (mumtaz.digital) ─────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name mumtaz.digital www.mumtaz.digital app.mumtaz.digital;

        ssl_certificate     /etc/ssl/mumtaz/fullchain.pem;
        ssl_certificate_key /etc/ssl/mumtaz/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"    always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        if ($blocked_agent) { return 403; }
        limit_conn connlimit 20;
        limit_req  zone=global burst=50 nodelay;

        location / {
            proxy_pass         http://odoo_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
        }

        location /websocket {
            proxy_pass         http://odoo_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }
    }

    # ── Platform API (api.mumtaz.digital) ─────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.mumtaz.digital;

        ssl_certificate     /etc/ssl/mumtaz/fullchain.pem;
        ssl_certificate_key /etc/ssl/mumtaz/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY"    always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        if ($blocked_agent) { return 403; }
        limit_conn connlimit 10;

        # Auth — strict 5 req/min
        location ~ ^/api/v1/auth/(login|signup|register|forgot|reset) {
            limit_req zone=auth burst=2 nodelay;
            proxy_pass         http://platform_backend;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # Stripe webhook
        location /api/v1/billing/webhook {
            limit_req zone=api burst=5 nodelay;
            proxy_pass         http://platform_backend;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # General API
        location /api/v1/ {
            limit_req zone=api burst=15 nodelay;
            proxy_pass         http://platform_backend;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        location /health { proxy_pass http://platform_backend; }
    }

    # ── Zaki AI (ai.mumtaz.digital) ───────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name ai.mumtaz.digital;

        ssl_certificate     /etc/ssl/mumtaz/fullchain.pem;
        ssl_certificate_key /etc/ssl/mumtaz/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff"    always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        if ($blocked_agent) { return 403; }
        limit_conn connlimit 10;

        # SSE chat stream — disable buffering, extended timeout
        location /api/chat {
            limit_req zone=ai_chat burst=5 nodelay;
            proxy_pass             http://zaki_backend;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_http_version     1.1;
            proxy_set_header       Connection        "";
            proxy_buffering        off;
            proxy_cache            off;
            proxy_read_timeout     300s;
            add_header             X-Accel-Buffering "no" always;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://zaki_backend;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        location /auth/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass         http://zaki_backend;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        location / {
            proxy_pass         http://zaki_backend;
            proxy_set_header   Host $host;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        location /health { proxy_pass http://zaki_backend; }
    }
}
