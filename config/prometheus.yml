global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    project: mumtaz

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: nginx
    static_configs:
      - targets: [nginx:9113]
    metrics_path: /metrics

  - job_name: platform-api
    static_configs:
      - targets: [platform:8002]
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: [db:9187]

  - job_name: redis
    static_configs:
      - targets: [redis:9121]

  - job_name: node-containers
    static_configs:
      - targets:
          - platform:8002
          - zaki-ai:3000
    metrics_path: /health
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
